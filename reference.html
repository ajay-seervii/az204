    code: true,

public static async Task<IActionResult> Run(

    answer: 1,

let current = 0;
let answers = new Array(QUESTIONS.length).fill(null);
let revealed = new Array(QUESTIONS.length).fill(false);
let startTime = Date.now();
let timerInterval;

function formatTime(ms) {
  const total = Math.floor(ms / 1000);
  const m = Math.floor(total / 60);
  const s = total % 60;
  return m + ':' + String(s).padStart(2, '0');
}

function getTimerClass(elapsed) {
  const mins = elapsed / 60000;
  if (mins > 110) return 'timer danger';
  if (mins > 90) return 'timer warn';
  return 'timer';
}

function renderNavDots() {
  return QUESTIONS.map((_, i) => {
    let cls = 'q-dot';
    if (i === current) cls += ' current';
    else if (answers[i] !== null) {
      cls += answers[i] === QUESTIONS[i].answer ? ' answered-correct' : ' answered-wrong';
    }
    return `<div class="${cls}" onclick="jumpTo(${i})" title="Q${i+1}">${i+1}</div>`;
  }).join('');
}

function renderQuestion() {
  const q = QUESTIONS[current];
  const answered = answers[current] !== null;
  const elapsed = Date.now() - startTime;
  const answered_count = answers.filter(a => a !== null).length;
  const progress = (answered_count / QUESTIONS.length * 100).toFixed(0);

  let optionsHtml = q.options.map((opt, i) => {
    let cls = 'option-btn';
    let disabled = '';
    if (answered) {
      disabled = 'disabled';
      if (i === q.answer) cls += ' correct';
      else if (i === answers[current]) cls += ' wrong';
    }
    return `<button class="${cls}" ${disabled} onclick="selectAnswer(${i})">${String.fromCharCode(65+i)}. ${opt.replace(/\n/g, '<br>')}</button>`;
  }).join('');

  let codeBlock = '';
  if (q.q_code) {
    codeBlock = `<div class="q-code">${q.q_code.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>`;
  }

  let explanation = '';
  if (answered) {
    const correct = answers[current] === q.answer;
    const icon = correct ? '✓ Correct' : '✗ Incorrect';
    explanation = `<div class="explanation show"><strong>${icon}</strong> — ${q.explanation}</div>`;
  }

  const allAnswered = answers.every(a => a !== null);

  document.getElementById('quiz-root').innerHTML = `
    <div class="quiz-header">
      <span class="quiz-title">AZ-204 Mock Exam</span>
      <span class="timer ${getTimerClass(elapsed)}" id="timer-display">${formatTime(elapsed)}</span>
    </div>
    <div class="q-nav-grid">${renderNavDots()}</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${progress}%"></div></div>
    <div class="quiz-meta" style="margin-bottom:1rem">${answered_count} of ${QUESTIONS.length} answered</div>
    <div class="q-card">
      <div class="q-number">Question ${current + 1} of ${QUESTIONS.length}</div>
      <div class="q-text">${q.q}</div>
      ${codeBlock}
      ${optionsHtml}
      ${explanation}
    </div>
    <div class="nav-row">
      ${current > 0 ? '<button class="nav-btn" onclick="prevQ()">← Previous</button>' : ''}
      ${current < QUESTIONS.length - 1 ? '<button class="nav-btn primary" onclick="nextQ()">Next →</button>' : ''}
      ${allAnswered ? '<button class="nav-btn primary" onclick="showResults()">View Results</button>' : ''}
    </div>
  `;

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const el = document.getElementById('timer-display');
    if (el) {
      const e = Date.now() - startTime;
      el.textContent = formatTime(e);
      el.className = getTimerClass(e);
    }
  }, 1000);
}

function selectAnswer(i) {
  if (answers[current] !== null) return;
  answers[current] = i;
  renderQuestion();
}

function nextQ() {
  if (current < QUESTIONS.length - 1) { current++; renderQuestion(); }
}
function prevQ() {
  if (current > 0) { current--; renderQuestion(); }
}
function jumpTo(i) { current = i; renderQuestion(); }

function showResults() {
  clearInterval(timerInterval);
  const elapsed = Date.now() - startTime;
  const correct = answers.filter((a, i) => a === QUESTIONS[i].answer).length;
  const wrong = answers.filter((a, i) => a !== null && a !== QUESTIONS[i].answer).length;
  const pct = Math.round(correct / QUESTIONS.length * 100);
  let verdict = '';
  if (pct >= 75) verdict = '<span class="green">✓ Pass range — well done!</span>';
  else if (pct >= 60) verdict = '<span class="amber">⚠ Close — review weak areas</span>';
  else verdict = '<span class="red">✗ Needs more prep — focus on explanations</span>';

  document.getElementById('quiz-root').innerHTML = `
    <div class="score-card">
      <div class="score-big">${pct}%</div>
      <div class="score-label">${correct} / ${QUESTIONS.length} correct &nbsp;|&nbsp; ${formatTime(elapsed)}</div>
      <div style="margin-top:0.75rem;font-size:14px;">${verdict}</div>
      <div class="score-breakdown">
        <div class="scard"><div class="scard-num green">${correct}</div><div class="scard-lbl">Correct</div></div>
        <div class="scard"><div class="scard-num red">${wrong}</div><div class="scard-lbl">Wrong</div></div>
        <div class="scard"><div class="scard-num">${formatTime(elapsed)}</div><div class="scard-lbl">Time taken</div></div>
      </div>
      <div style="margin-top:1.5rem;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <button class="nav-btn" onclick="reviewWrong()">Review wrong answers</button>
        <button class="nav-btn primary" onclick="restart()">Restart exam</button>
      </div>
    </div>
  `;
}

function reviewWrong() {
  const firstWrong = answers.findIndex((a, i) => a !== null && a !== QUESTIONS[i].answer);
  if (firstWrong === -1) return;
  current = firstWrong;
  renderQuestion();
}

function restart() {
  answers = new Array(QUESTIONS.length).fill(null);
  revealed = new Array(QUESTIONS.length).fill(false);
  current = 0;
  startTime = Date.now();
  renderQuestion();
}

renderQuestion();
</script>

{q:"An AKS cluster has 3 nodes and runs 10 pods. One node becomes unavailable. Kubernetes reschedules the pods from the failed node. The remaining 2 nodes cannot fit all 10 pods due to insufficient CPU/memory. What Kubernetes feature handles this?",options:["Kubernetes kills excess pods to fit within available node capacity","The cluster autoscaler detects pending pods (not schedulable) and adds new nodes — it scales out the node pool to accommodate the unscheduled pods","Horizontal Pod Autoscaler (HPA) reduces pod resource requests to fit remaining capacity","Pod Disruption Budget prevents pod rescheduling to protect service availability"],answer:1,explanation:"The AKS cluster autoscaler monitors for pending pods that cannot be scheduled due to insufficient node resources. It automatically scales up the node pool by adding new VMs. Without cluster autoscaler, the pods remain in Pending state indefinitely. HPA scales pod count, not node count.",difficulty:"Hard"},
{q:"A Docker image is built with a Dockerfile that has a COPY instruction followed by a RUN npm install instruction. A developer changes only the application source code (copied by the COPY instruction). What happens during the next build?",options:["Docker rebuilds all layers from scratch regardless of changes","Docker uses the cached layer for all instructions before the COPY instruction, but rebuilds COPY and all subsequent layers (RUN npm install) because the COPY source changed","Docker uses the cached npm install layer because node_modules didn't change","Docker skips the COPY instruction but reruns npm install to detect dependency changes"],answer:1,explanation:"Docker build cache is invalidated for a layer when its instruction changes OR when any preceding layer cache is invalidated. Changing the copied files invalidates the COPY layer, which cascades to invalidate the RUN npm install layer. Best practice: COPY package.json first, run npm install, then COPY the rest of the source — this way source changes don't invalidate the npm install cache.",difficulty:"Hard"},
{q:"Azure Container Apps (ACA) vs AKS — when would you choose Container Apps over AKS?",options:["When you need full Kubernetes control, custom resource definitions (CRDs), and complex networking configurations","Container Apps is better when you want a fully-managed serverless container environment with scale-to-zero, built-in KEDA-based autoscaling, and no Kubernetes cluster management overhead","Container Apps provides faster container startup times than AKS","Container Apps supports Windows containers; AKS does not"],answer:1,explanation:"Container Apps abstracts away Kubernetes management — no node pools, no kubectl access, no cluster upgrades. It's ideal for microservices and event-driven workloads needing KEDA autoscaling and scale-to-zero. AKS is for workloads needing full Kubernetes control: CRDs, node pools, Helm chart deployments, persistent volumes, network policies.",difficulty:"Medium"},
{q:"A Kubernetes Deployment has 3 replicas. You apply a rolling update with maxUnavailable=1 and maxSurge=1. How does the rollout proceed?",options:["All 3 old pods are terminated, then 3 new pods are created","1 new pod starts (4 total pods), then 1 old pod terminates, then another new pod starts (4 total), then another old pod terminates — net effect: minimum 2 old pods available, maximum 4 pods total at any time","1 old pod terminates first, then 1 new pod starts — only 2 pods serve traffic during the transition","All old pods terminate simultaneously and all new pods start simultaneously — 0 downtime transition"],answer:1,explanation:"Rolling update with maxUnavailable=1 and maxSurge=1: max 1 old pod can be down, max 1 extra pod above desired. Starting state: 3 old. 1 new pod starts (4 total). 1 old terminates (3 total: 2 old + 1 new). 1 new starts (4 total: 2 old + 2 new). 1 old terminates. Etc. Ensures minimum 2 pods serve traffic throughout.",difficulty:"Hard"},
{q:"An AKS pod needs to read from an Azure Key Vault secret. The pod should access the secret without storing credentials in Kubernetes Secrets. Which AKS feature enables this?",options:["Mount an Azure File Share with the secrets pre-loaded","Azure Key Vault Provider for Secrets Store CSI Driver — mounts Key Vault secrets/certificates/keys as a volume in the pod using the pod's workload identity","Store the Key Vault connection string in a ConfigMap and read it from the pod","Azure Key Vault Dapr sidecar integration"],answer:1,explanation:"The Azure Key Vault Provider for Secrets Store CSI Driver (via AKS add-on) integrates with Workload Identity to mount Key Vault secrets directly into pods as files or sync them to Kubernetes Secrets, without storing Azure credentials in the cluster. The pod authenticates to Key Vault using its federated workload identity.",difficulty:"Hard"},
{q:"A container image pushed to Azure Container Registry (ACR) is no longer needed. After deletion, a Kubernetes pod tries to pull the same image tag. The pod has the image already on the node (local cache). What happens?",options:["The pod fails to start — it tries to pull the deleted image and receives 404","The pod uses the locally cached image — if imagePullPolicy is 'IfNotPresent' or 'Never', the local image is used without contacting the registry","The pod starts but with degraded functionality due to missing image layer","Kubernetes automatically pulls the latest tag instead of the deleted image"],answer:1,explanation:"Kubernetes imagePullPolicy controls when to pull images. 'IfNotPresent': use local cache if image exists; only pull if missing. 'Always': always pull from registry (failed if deleted). 'Never': only use local cache; fail if missing. If the image is cached locally and pullPolicy is IfNotPresent, the pod starts successfully even if the registry image is deleted.",difficulty:"Hard"},
{q:"An AKS cluster uses Azure CNI networking. What is a key difference from Kubenet networking in AKS?",options:["Azure CNI uses NAT for pod IP addresses, while Kubenet assigns IPs from the VNet directly","Azure CNI assigns each pod a real IP address from the VNet subnet (not NATed), enabling direct routing and VNet-level network policies — but requires pre-allocating IP addresses in the subnet for all potential pods","Kubenet supports Azure Network Policies while Azure CNI does not","Azure CNI is only available in AKS Premium tier"],answer:1,explanation:"Azure CNI assigns each pod a real Azure VNet IP (from the node's subnet). This enables direct pod-to-pod routing across nodes and supports Azure Network Policies. Downside: large subnet IP allocation needed upfront (nodes × max_pods per node). Kubenet uses a private pod CIDR with NAT, requiring fewer subnet IPs but losing direct VNet accessibility.",difficulty:"Hard"},
{q:"You need to run a one-time data migration job in Kubernetes that must complete successfully. If it fails, it should retry up to 5 times. Which Kubernetes resource type is appropriate?",options:["Deployment with a replica count of 1","CronJob with a schedule of '@once'","Job with completions=1 and backoffLimit=5 — retries failed pods up to 5 times","DaemonSet configured to run once per node"],answer:2,explanation:"A Kubernetes Job runs a task to completion. Setting completions=1 means 1 successful completion is required. backoffLimit=5 allows up to 5 retries on failure. Deployments are for long-running services. CronJobs are for scheduled recurring tasks. Jobs are the correct abstraction for one-time batch or migration work.",difficulty:"Medium"},
{q:"A container in an AKS pod consumes more memory than its limit. What happens?",options:["The pod is OOMKilled — the container is terminated and restarted","The container is throttled — memory access slows down until usage drops below the limit","The pod is evicted from the node and rescheduled on a node with more memory","The memory limit is automatically increased by the Vertical Pod Autoscaler"],answer:0,explanation:"CPU limits cause throttling (container runs slower). Memory limits cause OOMKill — the Linux kernel kills the process when it exceeds the memory limit. The container is terminated with OOMKilled status. The pod restarts according to its restartPolicy (default: Always). Configure resource limits carefully to prevent OOMKill loops.",difficulty:"Hard"},
{q:"An AKS deployment needs persistent storage for a database pod. The data must survive pod restarts and node failures. Which Kubernetes/AKS storage option is correct?",options:["emptyDir volume — data persists across container restarts in the same pod","hostPath volume — data persists on the node's local disk across pod restarts","PersistentVolumeClaim (PVC) with Azure Managed Disk or Azure Files — data persists independently of the pod lifecycle and survives node failures","ConfigMap volume — suitable for database file storage"],answer:2,explanation:"emptyDir volumes are pod-lifecycle (lost when pod restarts/moves). hostPath volumes are node-local (lost if pod moves to different node). PersistentVolumeClaims backed by Azure Managed Disks or Azure Files persist data independently of pods and nodes. Azure Files (SMB/NFS) also allows ReadWriteMany access from multiple pods.",difficulty:"Medium"},
{q:"Azure Container Registry (ACR) has geo-replication enabled to 3 regions. A developer pushes an image to the primary region. What happens in the other 2 regions?",options:["Images must be manually pushed to each region — geo-replication only replicates registry metadata","ACR automatically replicates the image to all configured replica regions — clients in those regions pull from their local replica for lower latency","The image is available in other regions after a configurable replication delay of up to 24 hours","Geo-replication only works for public images — private images must be replicated manually"],answer:1,explanation:"ACR geo-replication automatically replicates images to all configured replica regions. Clients in replica regions pull from their local copy (lower latency, no cross-region bandwidth cost for pulls). Push operations can also go to the nearest replica — ACR synchronizes to all replicas. Replication is typically near-instantaneous for normal image sizes.",difficulty:"Medium"},
{q:"A Kubernetes pod's liveness probe fails 3 consecutive times. The probe is configured with failureThreshold=3. What is the result?",options:["The node is marked as unhealthy and the pod is rescheduled to another node","The container within the pod is killed and restarted according to the pod's restartPolicy","The pod is moved to a Terminating state and a new pod is created by the ReplicaSet","The pod is marked as Unhealthy but continues running — the operator is alerted"],answer:1,explanation:"Liveness probes detect whether a container is stuck (deadlocked, hung). When failureThreshold consecutive checks fail, Kubernetes kills (not gracefully stops) the container and restarts it. The pod itself stays on the same node. The pod's restartPolicy (usually Always for Deployments) controls whether/how the container is restarted.",difficulty:"Medium"},
{q:"An Azure Container Instance (ACI) group has 2 containers. Container A must start before Container B (init container pattern). How do you configure this?",options:["Set a dependency: depends-on: [container-a] in the container group YAML","Use an init container in the container group definition — init containers run and complete before the main containers start","Set Container A's restartPolicy to Always and Container B's to OnFailure","Use a Kubernetes Job with dependencies — ACI supports Kubernetes Job semantics"],answer:1,explanation:"ACI supports init containers in the container group. Init containers run sequentially before the main containers start — each must exit with 0 before the next runs. This enables initialization tasks (downloading config, waiting for a service) before the main application container starts. ACI init containers follow the same semantics as Kubernetes init containers.",difficulty:"Hard"},
{q:"You build and push a Docker image with tag 'myapp:latest'. A colleague's AKS pod is already running with 'myapp:latest' and imagePullPolicy: Always. You push a new 'myapp:latest' image. When does the pod see the new image?",options:["Immediately — AKS polls the registry every 5 minutes for tag updates","Never automatically — the pod must be restarted (or the deployment rolled) for imagePullPolicy: Always to pull the new image","The pod detects the tag change via a webhook and restarts automatically","imagePullPolicy: Always pulls on every container start — only pod restarts trigger a new pull"],answer:3,explanation:"imagePullPolicy: Always means Kubernetes pulls the image every time the container STARTS (not periodically). The running pod with an existing container does NOT pull a new image while running. You must trigger a new pod creation (rolling restart, deployment update) for the new image to be used. Using mutable tags like 'latest' in production is an anti-pattern — use immutable digest-based tags.",difficulty:"Hard"},
{q:"An AKS pod uses a Horizontal Pod Autoscaler (HPA) scaling on CPU utilization. The metric shows 90% CPU but no new pods are being created. What is a possible cause?",options:["HPA requires the cluster autoscaler to be enabled before it can scale pods","The pod count may already be at the HPA's maxReplicas limit","HPA scales on memory by default — CPU scaling requires an additional metrics server","The Deployment has a PodDisruptionBudget that prevents scaling"],answer:1,explanation:"HPA respects the maxReplicas limit — it won't scale beyond this value. If pods are at maxReplicas and CPU is still high, the HPA cannot add more pods. Check the HPA status (kubectl describe hpa) to see if it's at max. Increase maxReplicas or investigate why the pods are using so much CPU.",difficulty:"Medium"},
{q:"A Kubernetes ConfigMap stores an application's configuration. A pod references the ConfigMap as a volume mount. You update the ConfigMap. When does the running pod see the update?",options:["Immediately — volume-mounted ConfigMaps update in the pod in real-time","After a short propagation delay (typically 1-2 minutes) — kubelet syncs volume-mounted ConfigMaps periodically. The pod sees the new content without restarting","Only after the pod restarts — ConfigMaps are loaded once on pod startup","The pod never sees updates — ConfigMaps are immutable once referenced by a pod"],answer:1,explanation:"Volume-mounted ConfigMaps are synced by kubelet on a configurable interval (default ~1 minute). The files in the volume are updated in-place. The running application must watch for file changes to pick up updates. ConfigMaps used as environment variables (envFrom) are NOT automatically updated — the pod must restart.",difficulty:"Hard"},
{q:"ACR Tasks allows building container images in the cloud. Which trigger automatically rebuilds an image when its base image (FROM instruction) is updated in ACR?",options:["A webhook trigger on the base image repository","Base image update triggers — configure the ACR Task to monitor the base image; when a new version is pushed, ACR automatically rebuilds all dependent images","A scheduled trigger that checks for base image updates daily","Azure Monitor alert on the base image repository tag creation event"],answer:1,explanation:"ACR Tasks supports base image update triggers. When you build an image from a base image stored in the same ACR (or MCR), ACR tracks the dependency. When the base image is updated (new push), ACR automatically triggers a rebuild of all dependent images. This ensures security patches in base images automatically propagate to derived images.",difficulty:"Hard"},
{q:"A Kubernetes Namespace has a ResourceQuota limiting total CPU requests to 4 cores. Current pods in the namespace use 3.8 cores. A developer tries to deploy a pod requesting 0.5 CPU. What happens?",options:["The pod is scheduled — Kubernetes rounds down fractional CPU requests to fit quota","The pod deployment fails — the quota would be exceeded (3.8 + 0.5 = 4.3 > 4.0 cores) and the pod is rejected with a Forbidden error","The pod is queued until another pod releases CPU","Kubernetes automatically reduces the pod's CPU request to 0.2 to fit the quota"],answer:1,explanation:"Kubernetes ResourceQuota admission controller rejects resource creation that would exceed the namespace quota. Adding a pod requesting 0.5 CPU would require 4.3 cores total, exceeding the 4-core limit. The pod creation fails with a Forbidden/quota exceeded error. Kubernetes does not auto-adjust resource requests.",difficulty:"Medium"},
{q:"Azure Container Apps revisions allow multiple versions to run simultaneously. Which scaling configuration directs 90% of traffic to revision A and 10% to revision B?",options:["Set the Container App's active revision count to 2 with automatic 90/10 load balancing","Configure traffic splitting in the Container App's ingress settings — set revision A to 90% traffic weight and revision B to 10%","Use an Azure Traffic Manager profile in front of two Container Apps","Configure Azure Application Gateway path-based routing for the two revisions"],answer:1,explanation:"Container Apps traffic splitting is configured in the ingress settings of the Container App. Set the revision mode to 'Multiple' and define traffic weights per revision (revision A: 90%, revision B: 10%). This enables canary deployments, A/B testing, and blue-green deployments without external load balancers.",difficulty:"Medium"},
{q:"A Docker multi-stage build has the following stages: stage 1 (builder) compiles the app, stage 2 (runtime) copies only the compiled binary. What is the main benefit of multi-stage builds?",options:["Multi-stage builds allow parallel compilation across multiple CPU cores","The final image contains only the runtime artifacts (compiled binary) without build tools (compiler, SDK, source code) — significantly reducing the image size and attack surface","Multi-stage builds enable image layer caching across different Docker hosts","Multi-stage builds allow different base images per stage, enabling cross-platform builds"],answer:1,explanation:"Multi-stage builds allow you to use a large build image (with full SDK) in early stages and copy only the final artifacts to a minimal runtime image. The final pushed image contains only what's needed to run (e.g., alpine + binary) without compiler toolchains, source code, or intermediate files. This dramatically reduces image size and the attack surface.",difficulty:"Medium"},
{q:"An AKS cluster uses Azure Active Directory integration for Kubernetes RBAC. A developer needs to list pods in the 'production' namespace. The developer has an Azure AD group membership. What must be configured in Kubernetes?",options:["Nothing — Azure AD group membership automatically grants Kubernetes access","A Kubernetes RoleBinding mapping the Azure AD group's object ID to a ClusterRole or Role in the 'production' namespace","A Kubernetes ClusterRoleBinding mapping the developer's email to the ClusterAdmin role","An Azure RBAC role assignment on the AKS cluster resource in Azure portal"],answer:1,explanation:"With AKS Azure AD integration + Kubernetes RBAC: Create a Role or ClusterRole with the required permissions. Create a RoleBinding in the namespace mapping the Azure AD group's object ID to the Role. When the developer runs kubectl, AKS validates the Azure AD token and checks Kubernetes RBAC for authorization. Azure RBAC for Kubernetes (preview) provides an alternative using Azure RBAC directly.",difficulty:"Hard"},
{q:"An ACI container group runs a web API. The container group must scale to handle variable load. What is the limitation of ACI for auto-scaling?",options:["ACI auto-scales based on CPU metrics automatically — no configuration needed","ACI does not have built-in auto-scaling. Scale-out requires manually creating additional container group instances or using KEDA with ACI as a scale target","ACI auto-scales only within a single container group by increasing container count","ACI supports auto-scaling only through Azure Load Balancer health probes"],answer:1,explanation:"ACI container groups are single-instance by default and lack native auto-scaling. For auto-scaling ACI workloads, use KEDA (with ACI KEDA scaler), Azure Container Apps (which uses KEDA internally), or AKS virtual nodes (ACI as a node). For production auto-scaling web APIs, Container Apps or AKS is more appropriate than bare ACI.",difficulty:"Hard"},
{q:"A Kubernetes Service of type LoadBalancer is created in AKS. What Azure resource is provisioned?",options:["An Azure Traffic Manager profile for global load balancing","An Azure Load Balancer (Standard SKU) with a public IP address — AKS provisions these automatically via the cloud provider integration","An Azure Application Gateway for L7 load balancing","An Azure Front Door profile for CDN-backed load balancing"],answer:1,explanation:"When you create a Kubernetes Service of type LoadBalancer in AKS, the cloud provider controller automatically provisions an Azure Standard Load Balancer and a public IP address. The Service's external IP (kubectl get svc) is the public IP. For L7/HTTP routing, use Kubernetes Ingress with the Application Gateway Ingress Controller (AGIC) instead.",difficulty:"Medium"},
{q:"You deploy an AKS workload that must run on nodes with GPU hardware. How do you ensure pods are scheduled only on GPU nodes?",options:["Set the pod's CPU request to a very high value — GPU nodes have more CPU so the scheduler routes to them","Use nodeSelector or nodeAffinity with the nvidia.com/gpu label, and configure GPU node pools with the appropriate VM SKU (e.g., NC-series)","Set the container's environment variable GPU=true — AKS detects this and schedules on GPU nodes","GPU scheduling is automatic — AKS detects GPU workloads from the CUDA libraries in the container image"],answer:1,explanation:"Create a node pool with GPU-enabled VM SKUs (NC/ND series). AKS labels GPU nodes with nvidia.com/gpu (after installing the NVIDIA device plugin). Specify resource limits nvidia.com/gpu: 1 in the pod spec and use nodeSelector or nodeAffinity to target the GPU node pool. Without the resource request, the scheduler won't consider GPU availability.",difficulty:"Hard"},
{q:"A container exits with code 137. What does this exit code indicate?",options:["The process exited normally with a non-zero status code of 137","Exit code 137 = 128 + 9 (SIGKILL). The container was forcefully terminated by the Linux kernel — typically due to OOMKill (out of memory) or explicit SIGKILL","Exit code 137 means the container's entrypoint was not found","Exit code 137 indicates a network timeout during container initialization"],answer:1,explanation:"Linux exit codes: 128 + N where N is the signal number. Exit code 137 = 128 + 9 (SIGKILL). This means the process received SIGKILL — typically the Linux OOM killer (out of memory) or Kubernetes evicting the pod for exceeding memory limits. Check the container's last terminated reason (OOMKilled) and increase memory limits.",difficulty:"Hard"},
{q:"An AKS pod spec sets runAsNonRoot: true and the container image uses USER root in the Dockerfile. What happens when the pod starts?",options:["Kubernetes runs the container as a non-root user by overriding the image's USER instruction","The pod fails to start — Kubernetes enforces the runAsNonRoot security context and rejects containers that would run as root (UID 0)","The container runs as root but is sandboxed in a read-only filesystem","The admission controller ignores runAsNonRoot if the container image requires root"],answer:1,explanation:"runAsNonRoot: true in the pod's security context causes Kubernetes to reject container images that run as root (UID 0). The container fails to start with a 'container is not allowed to run as root' error. Fix the Dockerfile to add a non-root user (adduser/useradd) and set USER to that user, or configure runAsUser in the security context.",difficulty:"Hard"},
{q:"ACR is in a different Azure region from the AKS cluster. What is the recommended way to reduce image pull latency and egress costs?",options:["Enable ACR Premium SKU geo-replication to the AKS cluster's region — pods pull from the local replica","Use Docker Hub as a caching layer between ACR and AKS","Configure AKS to use a local containerd image cache with a PVC","Set up ACR pull-through cache for the remote ACR"],answer:0,explanation:"ACR Premium SKU supports geo-replication. Replicate the registry to the same region as the AKS cluster. Pods pull images from the local replica, reducing pull latency and inter-region egress costs. AKS integration with ACR (az aks update --attach-acr) works across regions but pulls incur egress charges without geo-replication.",difficulty:"Medium"},
{q:"A Kubernetes deployment uses readinessProbe. A new pod fails its readiness probe but passes its liveness probe. What is the outcome?",options:["The pod is killed and restarted because it failed a probe","The pod remains Running but is removed from the Service's Endpoints — no traffic is sent to it until the readiness probe passes","The pod is killed because liveness passed but readiness failed — both must pass for the pod to be healthy","The pod is marked as degraded but traffic is still sent to it at reduced weight"],answer:1,explanation:"Readiness probe failure removes the pod from the Service's endpoint list — traffic stops routing to it. The pod continues Running. Liveness probe failure causes the container to restart. A pod failing readiness but passing liveness is healthy enough to run but not ready to serve traffic (e.g., loading data, waiting for a dependency). When readiness probe passes again, the pod rejoins the Service endpoints.",difficulty:"Hard"},
{q:"You need to run a privileged container in AKS that requires access to the host network. Which pod spec configuration is required?",options:["Set securityContext.privileged: true only — network access is automatic for privileged containers","Set both hostNetwork: true (for host network access) and securityContext.privileged: true (for privileged mode) in the pod spec. Ensure PodSecurityAdmission policies allow this","Set securityContext.allowPrivilegeEscalation: true","Set hostPID: true — this also enables host network access"],answer:1,explanation:"hostNetwork: true shares the host's network namespace with the pod (uses node's IP, ports, DNS). securityContext.privileged: true gives the container full access to the host's devices and capabilities. Both require either PodSecurityAdmission (PSA) to allow privileged mode or a PodSecurityPolicy that permits these settings. These are high-security-risk configurations.",difficulty:"Hard"},
{q:"Azure Container Apps integrates with KEDA for event-driven scaling. A Container App scales to 0 during off-peak hours. An HTTP request arrives. What is the expected behavior?",options:["The request fails with 503 — the app is scaled to 0 and must be manually scaled up","Container Apps has built-in HTTP scaling — it automatically scales from 0 to handle incoming HTTP requests; KEDA's HTTP scaler activates and starts an instance to serve the request","The request is queued for up to 5 minutes until the app scales up","Scale from 0 requires at least 1 always-on replica — configure minReplicas=1 to prevent cold start"],answer:1,explanation:"Azure Container Apps has a built-in HTTP scaler that can scale from 0 to N based on HTTP request queue depth. When a request arrives and the app is at 0, Container Apps automatically starts an instance. There is a cold start latency (typically seconds). For latency-sensitive workloads, configure minReplicas > 0 to avoid cold starts.",difficulty:"Hard"},
{q:"A Kubernetes DaemonSet is used to deploy a log collector agent. A new node is added to the cluster. What happens to the DaemonSet?",options:["The DaemonSet does not automatically deploy to new nodes — you must manually scale it","Kubernetes automatically creates a DaemonSet pod on the new node — DaemonSets ensure exactly one pod runs on every node that matches the DaemonSet's node selector","The DaemonSet must be re-deployed after new nodes are added","A new DaemonSet pod is scheduled on the new node only if the node has sufficient resources for the pod"],answer:1,explanation:"DaemonSets automatically deploy exactly one pod on each eligible node. When a new node joins the cluster (or an existing node becomes eligible via node selectors/tolerations), the DaemonSet controller immediately schedules a pod on it. This is the primary use case: cluster-wide agents like log collectors, monitoring agents, and network plugins.",difficulty:"Medium"},
{q:"An AKS cluster's control plane (API server) needs to be private (not accessible from the internet). Which AKS feature enables this?",options:["Configure network policies to block internet access to the API server","Enable the Private Cluster feature — the API server gets a private IP in the VNet accessible only from within the VNet or via ExpressRoute/VPN; no public IP is assigned","Configure API server authorized IP ranges to 0.0.0.0/0 to block all internet access","Use a Network Security Group to block inbound traffic to the API server"],answer:1,explanation:"AKS private cluster creates the API server with a private endpoint in your VNet. The API server has no public IP — kubectl commands and CI/CD pipelines must run within the VNet or via VPN/ExpressRoute. The API server DNS name resolves to a private IP. For partial restrictions, use 'API server authorized IP ranges' instead.",difficulty:"Hard"},
{q:"A container in AKS has a resource request of 0.5 CPU and a limit of 2 CPU. The node has 1 CPU available. The pod can be scheduled (request fits), but the container tries to use 1.5 CPU. What happens?",options:["The container is OOMKilled for exceeding the CPU limit","The container is throttled via CPU cgroups — it cannot use more than 2 CPU (the limit), and on a node with 1 CPU available, it competes with other containers for the available 1 CPU","The pod is evicted because it's using more CPU than requested","The limit is ignored — containers always get their requested CPU"],answer:1,explanation:"CPU is a compressible resource — containers are throttled (not killed) when exceeding CPU limits. The container gets up to the limit (2 CPU) if available on the node. But with only 1 CPU on the node, the container competes with others for available CPU cycles via Linux cgroups. Requests determine scheduling; limits determine throttling ceilings.",difficulty:"Hard"},
{q:"You need to pass sensitive database credentials to a containerized application in AKS without hardcoding them in the image or ConfigMap. Which Kubernetes resource is appropriate?",options:["ConfigMap — encrypted by default in AKS","Kubernetes Secret — stores sensitive data base64-encoded; integrate with Azure Key Vault via the Secrets Store CSI driver for true encryption at rest","Environment variables in the pod spec — they are encrypted in etcd","Azure App Configuration — mount it as a volume in AKS pods"],answer:1,explanation:"Kubernetes Secrets store sensitive data base64-encoded (not encrypted by default in etcd). For production, enable etcd encryption at rest in AKS or use the Azure Key Vault Provider for Secrets Store CSI Driver to sync Key Vault secrets directly to pods. Never put secrets in ConfigMaps (plaintext) or container images.",difficulty:"Medium"},
{q:"An AKS cluster needs to upgrade from Kubernetes 1.27 to 1.29. AKS supports only N-2 minor version upgrades (you must upgrade through each minor version). What is the upgrade path?",options:["Directly upgrade from 1.27 to 1.29 — AKS supports skipping minor versions","Upgrade 1.27 → 1.28 first, then 1.28 → 1.29 — AKS enforces sequential minor version upgrades","You must create a new AKS cluster at 1.29 and migrate workloads — in-place upgrades only support 1 minor version bump","Upgrade to 1.28 is not required — only patch version upgrades are sequential"],answer:1,explanation:"AKS Kubernetes version upgrades must proceed through each minor version sequentially. To go from 1.27 to 1.29, you must first upgrade to 1.28, then to 1.29. Skipping minor versions is not supported. Plan upgrade windows accordingly, as each minor version upgrade requires testing and may include deprecated API removals.",difficulty:"Medium"},
{q:"An Azure Container Registry (ACR) has the 'Admin user' account disabled. A CI/CD pipeline uses a service principal to push images. The service principal has 'AcrPush' role assignment. Will the push succeed?",options:["No — the Admin account must be enabled for any push operations to succeed","Yes — the 'AcrPush' role on the service principal grants push access independently of the Admin account status. Azure RBAC controls access, not the Admin account","No — service principals require the Admin account to be enabled as a fallback","Yes, but only if the service principal is also assigned 'AcrPull' role"],answer:1,explanation:"ACR supports three authentication methods: Admin account (not recommended for production), service principal with RBAC roles, and managed identity. The Admin account is independent of RBAC-based access. A service principal with 'AcrPush' role can push images regardless of whether the Admin account is enabled or disabled.",difficulty:"Medium"}
]},

{q:"An Azure AD app uses the OAuth 2.0 On-Behalf-Of (OBO) flow. Service A receives a user token and needs to call Service B on behalf of the user. What does Service A do with the user token?",options:["Forward the original user token directly to Service B","Exchange the user token at the Azure AD token endpoint using the OBO flow — receive a NEW token for Service B that contains the user's claims but is issued to Service A as the client","Use client credentials flow to get a Service A token and call Service B","Cache the user token and wait for Service B to request it"],answer:1,explanation:"OBO flow: Service A receives a user's access token. To call Service B on behalf of the user, Service A presents its own credentials + the user's token to Azure AD's token endpoint (grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer). Azure AD returns a new token for Service B that contains the user's identity but is issued to Service A. Service B receives a token it can validate.",difficulty:"Hard"},
{q:"Azure AD app registration vs Enterprise Application — what is the relationship?",options:["They are the same object — registering an app creates both simultaneously","App Registration is the global definition (tenant where the app is created); Enterprise Application (Service Principal) is the local instance created in each tenant where the app is used. RBAC assignments and consent happen on the Service Principal","Enterprise Applications are for Microsoft's own apps; App Registrations are for custom apps","App Registrations define API permissions; Enterprise Applications define who can use the app — they are separate independent objects"],answer:1,explanation:"App Registration is the 'definition' in the home tenant — configures authentication, API permissions, app roles. Service Principal (Enterprise Application) is the 'instance' in each tenant — configures user assignment, consent, and RBAC. When an app is used in another tenant (multi-tenant app), a Service Principal is created there from the Registration.",difficulty:"Hard"},
{q:"A user authenticates to Azure AD and receives an ID token and an access token. An API receives the access token. Should the API validate the ID token or the access token?",options:["Validate the ID token — it contains the user's identity claims","Validate the access token — the API should verify the signature, issuer, audience (aud must match the API's app ID URI), and expiry. The ID token is for the client application's user information only","Both must be validated — API security requires validating both tokens","The API should not validate tokens — Azure API Management handles token validation"],answer:1,explanation:"ID tokens are for the CLIENT APPLICATION to identify the user (OpenID Connect). APIs should validate ACCESS tokens. Key validation steps: verify JWT signature against Azure AD's public keys, check issuer (iss), verify audience (aud) matches the API's App ID URI, check expiry (exp), and check claims like roles/scopes. Never accept an ID token as authorization for an API call.",difficulty:"Hard"},
{q:"Azure AD B2C vs Azure AD B2B: a company wants to allow customers (external users with various email providers like Gmail, Facebook) to sign up and sign in to their consumer app. Which should they use?",options:["Azure AD B2B — invite external users as guests","Azure AD B2C — designed for consumer-facing applications with identity federation to social providers (Google, Facebook, Apple, etc.), custom sign-up/sign-in flows, and customer account management","Azure AD External Identities with Entra ID","Regular Azure AD with self-service sign-up enabled"],answer:1,explanation:"Azure AD B2C is designed for customer-facing (consumer) applications. Features: custom user flows for sign-up/sign-in, federation with social identity providers (Google, Facebook, Apple, Amazon), custom policies (Identity Experience Framework), and consumer-scale account management. B2B is for business partners using their own organizational accounts.",difficulty:"Medium"},
{q:"An Azure AD application defines an Application Permission 'Files.ReadAll' and a Delegated Permission 'Files.Read'. What is the difference when an application uses each?",options:["Application permissions require the user to consent; delegated permissions require admin consent","Application permissions (app roles) allow the app to access resources without a signed-in user (daemon/service scenario). Delegated permissions act on behalf of a signed-in user — the app can only access what the user can access","Application permissions are more restrictive than delegated permissions","Delegated permissions require a client secret; application permissions use certificate authentication"],answer:1,explanation:"Delegated permissions: the app acts on behalf of a signed-in user (user + app permissions intersection). The app cannot do more than the user. Application permissions: the app acts as itself without a user — used for daemon services with client credentials flow. Application permissions (like Files.ReadAll) typically require admin consent because they grant broad access.",difficulty:"Hard"},
{q:"A developer configures an Azure AD app to use token version V2. What is the key difference between V1 and V2 tokens?",options:["V2 tokens have a longer expiry by default — 24 hours vs 1 hour for V1","V2 tokens use different claim names and formats — audience (aud) is the app's client ID for V2 vs application ID URI for V1; issuer uses v2.0 endpoint format; scp (scopes) replaces resource claim","V2 tokens are encrypted; V1 tokens are plain JWTs","V2 tokens are only issued for Microsoft Graph calls; V1 tokens are for Azure AD graph"],answer:1,explanation:"Key V1 vs V2 differences: V2 tokens include scp (space-separated scopes) for delegated permissions; aud is the App ID URI (V1) vs Client ID (V2); issuer includes v2.0 in the URL. V2 supports both Azure AD and MSA (personal Microsoft accounts). V2 endpoint (login.microsoftonline.com/{tenant}/v2.0) is the MSAL default.",difficulty:"Hard"},
{q:"An Azure AD Conditional Access policy requires MFA for access to a specific application. A user with a compliant device tries to access the app from a trusted location. The MFA requirement is still triggered. What could override the trusted location exception?",options:["The application's app registration has MFA hardcoded — app-level MFA overrides Conditional Access","The policy has multiple conditions that must ALL be true to grant access without MFA — the trusted location condition may be configured with AND logic requiring both trusted location AND compliant device","Conditional Access policies cannot grant exceptions — MFA is always required once configured","The user's Azure AD session has no existing token — first-time access always requires MFA"],answer:1,explanation:"Conditional Access policies can have complex grant controls. If a policy requires MFA and has an exception for trusted locations, check whether the exception requires ONLY trusted location or trusted location AND compliant device (AND logic). Multiple grant controls can be configured as 'Require all selected controls' (AND) or 'Require one of the selected controls' (OR).",difficulty:"Hard"},
{q:"A multi-tenant Azure AD application is registered. A user from an external tenant tries to sign in. Azure AD returns AADSTS50020. What does this error typically indicate?",options:["The user's account is disabled in their home tenant","The application has not been configured for multi-tenant access, or admin consent has not been granted in the user's tenant, or the user's tenant is not allowed by the application's accepted tenants configuration","The user needs to complete MFA before accessing the app","The application's client secret has expired"],answer:1,explanation:"AADSTS50020 indicates the user account from the external tenant does not have access. Causes: the app is single-tenant only (acceptedTenantIds not configured for multi-tenant), admin consent not granted in the user's tenant for required permissions, or the user is blocked by app assignment (user assignment required, user not assigned). Check the app's multi-tenant configuration and consent state.",difficulty:"Hard"},
{q:"Azure AD Privileged Identity Management (PIM) is configured for the 'Owner' role on a subscription. An eligible user needs to elevate their access. What is the PIM Just-In-Time access flow?",options:["An admin assigns the Owner role permanently — PIM sends a time-limited token","The user activates the eligible assignment via PIM — they may need to provide MFA, a justification, and the role is granted temporarily (up to the configured max duration). After the duration, the role is automatically removed","PIM automatically grants Owner access during business hours and revokes it outside of hours","The user requests access via email to the subscription owner, who manually assigns the role"],answer:1,explanation:"PIM Just-In-Time activation: the user has an 'eligible' assignment (not permanent). To use the role, they activate it in PIM portal/CLI — this may require MFA, a business justification, and approval (if configured). The role is granted for a configurable period (max 8 hours by default for Azure resources). After expiry, the role is automatically removed.",difficulty:"Hard"},
{q:"An app uses the OAuth 2.0 device code flow to authenticate a user on a device with no browser. What is the user experience?",options:["The user enters their credentials directly in the CLI — no browser required","The device displays a code and URL. The user visits the URL on another device with a browser, enters the code, and authenticates. The CLI polls Azure AD and receives tokens upon completion","The device sends credentials directly to Azure AD via a REST API call","The device authenticates using a pre-shared key stored in Azure Key Vault"],answer:1,explanation:"Device code flow: 1) App requests a device code from Azure AD. 2) Azure AD returns a device_code, user_code, and verification_uri. 3) App displays 'Go to {uri} and enter {code}'. 4) App polls the token endpoint. 5) User visits the URL, enters the code, and authenticates (with MFA if required). 6) Azure AD returns tokens to the polling app.",difficulty:"Medium"},
{q:"You configure an Azure AD application with 'User assignment required'. A user who is NOT assigned to the app tries to sign in. What happens?",options:["The user can sign in but only sees limited functionality","The user receives AADSTS50105 error — they are not assigned to the application. Unassigned users are blocked from signing in","The user is redirected to an Azure AD B2C sign-up page","The user receives a generic 403 error from the application"],answer:1,explanation:"When 'User assignment required' is enabled on an Enterprise Application, only users and groups explicitly assigned to the app can sign in. All other Azure AD users receive AADSTS50105 ('The user is not assigned to a role for the application'). This is an effective allowlist for application access control.",difficulty:"Medium"},
{q:"A service running outside Azure needs to authenticate to Azure AD to access Azure resources. The service uses a certificate (not a client secret). What is the advantage of certificate-based authentication?",options:["Certificates have no expiry date — they never need rotation","Certificates provide stronger security than secrets — they cannot be leaked as plain text (the private key never leaves the service). Certificate rotation uses overlapping validity periods for zero-downtime","Certificates are free; client secrets incur per-authentication costs","Certificate-based authentication supports interactive login flows that secrets do not"],answer:1,explanation:"Client secrets are plaintext strings that can be accidentally logged, included in code, or leaked. Certificate-based authentication uses asymmetric cryptography — the private key never leaves the application; Azure AD only stores the public key. This prevents secret leakage. Zero-downtime rotation: upload the new certificate, update the code/config to use the new thumbprint, then remove the old certificate.",difficulty:"Hard"},
{q:"Azure AD token claims: the 'oid' claim vs the 'sub' claim. When should you use 'oid' to identify a user?",options:["Always use 'sub' — it is globally unique and never changes","Use 'oid' for cross-application user identification — it is the object ID in Azure AD, unique within the tenant, and consistent across all apps in the tenant. 'sub' is app-specific and changes per application","Use 'sub' because 'oid' is only present in V1 tokens","Both are equivalent — use either interchangeably"],answer:1,explanation:"'sub' (subject) claim is unique per user + per application — the same user has different 'sub' values in different apps. Use 'sub' for single-app user identification. 'oid' (object ID) is the Azure AD object ID — consistent across all apps in the tenant for the same user. Use 'oid' when correlating a user's identity across multiple applications or storing the user reference in a multi-app shared database.",difficulty:"Hard"},
{q:"An API is registered in Azure AD with Application ID URI api://myapp.com. A client app requests access to this API. What scope format should the client request?",options:["api://myapp.com (just the URI, no scope suffix)","api://myapp.com/scope-name — e.g., api://myapp.com/user.read (Application ID URI + scope name)","https://myapp.com/.default","myapp.com:user.read"],answer:1,explanation:"For V2 Azure AD tokens, scopes are in the format: {ResourceAppIdUri}/{ScopeDefinedInApp}. For example: api://myapp.com/user.read. The client requests this scope in the authorization request. The .default scope (api://myapp.com/.default) requests all static permissions previously consented by the admin.",difficulty:"Hard"},
{q:"A daemon application (no user) needs to call Microsoft Graph to read all users. It uses client credentials flow. After granting 'User.Read.All' application permission, calls still fail with 403. What is missing?",options:["The application needs a user to sign in and consent — application permissions don't work without a user","Admin consent for the 'User.Read.All' application permission must be explicitly granted by a Global Administrator. Without admin consent, the permission is defined but not activated","The application needs to be assigned the 'Global Reader' Azure AD role","The Microsoft Graph API must be added to the application's 'Authorized client applications' list"],answer:1,explanation:"Application permissions (used in client credentials flow) require admin consent. Defining the permission in the App Registration does not activate it — a Global Administrator must explicitly grant admin consent (via Azure portal, PowerShell, or consent endpoint). Only after admin consent does the permission become effective.",difficulty:"Hard"},
{q:"An Azure AD Group has 'Dynamic Membership' configured. Users matching the rule are automatically added/removed. What is a limitation of dynamic groups compared to assigned groups?",options:["Dynamic groups cannot be used for Azure RBAC role assignments","Dynamic group membership updates are NOT instantaneous — there can be a delay of up to 24 hours for membership to be updated when attributes change","Dynamic groups cannot include service principals — only user accounts","Dynamic groups cannot be nested within other groups"],answer:1,explanation:"Azure AD dynamic group membership updates are processed by a background service. When a user's attribute (department, jobTitle, etc.) changes to match or unmatch the rule, the membership update can take minutes to 24 hours, depending on tenant size and query complexity. For time-sensitive access changes, use assigned groups instead.",difficulty:"Hard"},
{q:"An Azure AD application uses incremental consent — it requests minimal permissions at first, then requests additional permissions as features are used. The user has previously consented to 'User.Read'. Now the app requests 'Calendars.Read'. What happens?",options:["The previous consent is revoked and the user must re-consent to all permissions from scratch","Azure AD presents a consent dialog requesting ONLY the new 'Calendars.Read' permission — the user doesn't need to re-consent to previously granted permissions","The app cannot request additional permissions after initial consent","Incremental consent is only supported for admin consent, not user consent"],answer:1,explanation:"Incremental consent (OpenID Connect incremental authorization) allows apps to request permissions incrementally as features are used. Azure AD tracks consented permissions per user+app. When requesting additional permissions, Azure AD shows a consent dialog for ONLY the new permissions, not already-consented ones. This provides a better user experience than requesting all permissions upfront.",difficulty:"Hard"},
{q:"You need to configure Azure AD authentication for a legacy application that uses SAML 2.0, not OAuth/OIDC. Azure AD can act as the Identity Provider. What must be configured in the App Registration?",options:["App Registrations only support OAuth/OIDC — use Enterprise Applications (non-gallery app) for SAML configuration","Configure the SAML Single Sign-On settings in the Enterprise Application (not App Registration) — set the Entity ID, Reply URL (ACS URL), and sign SAML assertions with Azure AD's certificate","SAML requires Azure AD B2C, not regular Azure AD","Configure a SAML policy in Azure API Management to proxy authentication"],answer:1,explanation:"SAML SSO is configured in the Enterprise Application (not the App Registration) for non-gallery apps. Add a non-gallery Enterprise Application and configure the SAML settings: Identifier (Entity ID) = the app's SAML entity ID, Reply URL (ACS URL) = where SAML responses are posted, optionally configure attribute mappings (claims). Azure AD signs SAML assertions with a certificate the app must trust.",difficulty:"Hard"},
{q:"An Azure AD app registration has 'Access tokens' and 'ID tokens' checkboxes in the Implicit grant settings. What is the security risk of enabling access token in implicit grant?",options:["Access tokens in implicit grant are encrypted and secure","Access tokens in the URL fragment are exposed to browser history, referrer headers, and server logs. Additionally, access tokens cannot be revoked individually — stolen tokens are valid until expiry. Use Authorization Code with PKCE instead","There is no security risk — access tokens in implicit grant are short-lived (5 minutes)","Implicit grant access tokens are only valid from the same origin — cross-origin attacks are prevented"],answer:1,explanation:"Enabling access_token in implicit grant (MSAL 'allow implicit flow') is an anti-pattern. Access tokens in the URL fragment are exposed through browser history, Referrer headers, and proxy logs. They cannot be silently revoked. Microsoft recommends using Authorization Code with PKCE for all SPA scenarios and disabling implicit grant for access tokens. ID tokens in implicit grant are still sometimes needed for legacy OIDC implementations.",difficulty:"Hard"},
{q:"A user successfully authenticates to Azure AD and gets tokens. The user then changes their password. How long before their existing access token is invalid?",options:["Immediately — password changes revoke all existing tokens","The access token remains valid until its expiry (typically 1 hour). The refresh token is immediately revoked — new access tokens cannot be obtained without re-authentication. With CAE, the access token can be revoked earlier","The access token is revoked after 5 minutes — Azure AD has a 5-minute revocation lag","Both the access token and refresh token remain valid until expiry — password changes only affect new logins"],answer:1,explanation:"Password changes revoke refresh tokens (and session tokens) immediately — the user cannot silently get new access tokens. Existing access tokens remain valid until their 1-hour TTL expires. With Continuous Access Evaluation (CAE) for supported resources (Exchange, SharePoint, Teams), the access token can be revoked within seconds of the password change via the CAE critical event flow.",difficulty:"Hard"},
{q:"An app uses the OAuth 2.0 authorization code flow. The state parameter is missing from the authorization request. What security risk does this create?",options:["Without state, the authorization code cannot be validated — the token exchange fails","Without state, the app is vulnerable to CSRF attacks — an attacker can initiate an OAuth flow and trick the user's browser into completing the attacker's authorization request, linking the attacker's account to the victim's","State is only required for PKCE flows — its absence doesn't affect standard auth code flow","State is deprecated in OAuth 2.1 — it has been replaced by PKCE"],answer:1,explanation:"The state parameter is a CSRF protection token. The client generates a random state, sends it in the authorization request, and validates that the same state is returned in the callback. Without it, an attacker can craft an authorization request URL, trick the user's browser into visiting it, and link the attacker's authorization code to the victim's session (OAuth CSRF attack).",difficulty:"Hard"},
{q:"Azure AD Managed Identities: a system-assigned vs user-assigned managed identity. When should you use user-assigned?",options:["Always use system-assigned — user-assigned identities require more configuration","Use user-assigned when multiple Azure resources need to share the same identity (and permissions). System-assigned is tied to a single resource; user-assigned is a standalone Azure resource that can be assigned to multiple VMs, Functions, etc.","User-assigned managed identities support cross-tenant access; system-assigned does not","User-assigned identities provide stronger security — they have a separate credential rotation cycle"],answer:1,explanation:"System-assigned: created with the resource, deleted when the resource is deleted, one-to-one relationship. User-assigned: standalone Azure resource, can be assigned to multiple Azure resources (VMs, Functions, App Services), survives resource deletion. Use user-assigned when: multiple resources need the same permissions, you want to pre-configure permissions before deploying resources, or you need independent lifecycle management.",difficulty:"Medium"},
{q:"An Azure AD Conditional Access policy evaluates when a user accesses an application. The policy uses 'Sign-in risk' as a condition (requires Azure AD Premium P2). What is 'sign-in risk'?",options:["Risk based on the user's account age and password strength","A real-time assessment by Azure AD Identity Protection of the probability that a specific sign-in attempt is not by the account owner — uses ML models detecting anomalies like anonymous IP, atypical travel, password spray","Risk based on whether the user's device is compliant with Intune MDM policies","Risk based on the number of failed login attempts in the last 24 hours"],answer:1,explanation:"Azure AD Identity Protection's sign-in risk is a real-time ML assessment of each sign-in. Risk signals include: anonymous IP address, atypical travel (impossible travel), malware-linked IP, unfamiliar sign-in properties, and credentials found in breach dumps. Conditional Access can require MFA or block sign-ins based on risk level (Low/Medium/High).",difficulty:"Hard"},
{q:"You use the Microsoft Authentication Library (MSAL) in a .NET application. The app calls AcquireTokenForClient (client credentials flow). You observe the same token being returned for 5 minutes without a new Azure AD call. Why?",options:["The application has a bug — client credentials flow always issues a new token","MSAL caches access tokens and returns the cached token until it's within a configurable threshold of expiry (default: 5 minutes remaining). AcquireTokenForClient checks the cache first — only calling Azure AD when the cache is empty or the token is about to expire","Client credentials tokens are shared across all applications in the tenant — Azure AD serves the cached tenant-level token","MSAL has a 5-minute rate limit on token requests to prevent throttling"],answer:1,explanation:"MSAL implements an in-memory token cache for all flow types. For AcquireTokenForClient, MSAL returns the cached token if it's valid and has more than the expiry threshold remaining (default 5 minutes). Only when the cached token expires (or has <5 min remaining) does MSAL call Azure AD for a new token. This reduces latency and load on Azure AD.",difficulty:"Medium"},
{q:"An Azure AD application registers a custom redirect URI 'myapp://auth'. This is a mobile app using a custom URI scheme. What security risk does a custom scheme present compared to https:// redirect URIs?",options:["Custom schemes are more secure than HTTPS — HTTPS redirect URIs can be intercepted","Custom URI schemes can be hijacked — any app on the device can register the same scheme. If a malicious app registers 'myapp://auth', it can intercept authorization codes. HTTPS redirect URIs using 'localhost' or verified domains are more secure","Custom URI schemes do not support PKCE, making them inherently insecure","Custom URI schemes only work on iOS, not Android"],answer:1,explanation:"Custom URI scheme hijacking: multiple apps can register the same custom scheme (myapp://) on a device. If a malicious app registers your scheme first, it intercepts the authorization code returned in the redirect. Mitigation: use PKCE (code verifier prevents stolen codes from being exchanged), use https:// with verified domain (App Links on Android, Universal Links on iOS), or use the system browser with PKCE.",difficulty:"Hard"},
{q:"An app needs to handle token refresh silently for a user who last signed in 90 days ago. The app uses MSAL. Azure AD refresh token max lifetime is 90 days. What happens when MSAL tries AcquireTokenSilent?",options:["MSAL successfully refreshes the token — 90-day refresh tokens never expire","MSAL returns InteractionRequiredException — the refresh token has expired (or is within the expiry window). The user must interactively sign in again","MSAL acquires a new refresh token automatically by calling the device code endpoint","The token is valid for 90 more days — the 90-day clock resets on each use"],answer:0,explanation:"Azure AD refresh token lifetime depends on the configuration (up to 90 days by default for non-persistent sessions, longer for persistent). If the refresh token has expired (90 days without use for non-persistent, 90 days max regardless), AcquireTokenSilent fails with InteractionRequiredException. Note: refresh tokens reset their clock on each use up to the max age — the first sign-in starts the 90-day window.",difficulty:"Hard"},
{q:"An Azure AD app uses the OAuth 2.0 client credentials flow with a client certificate. The certificate is about to expire. What is the zero-downtime rotation procedure?",options:["Delete the old certificate, upload the new one, redeploy the app — brief downtime is unavoidable","Upload the new certificate to the App Registration while keeping the old one — both are valid simultaneously. Update the app to use the new certificate thumbprint, deploy the change, then remove the old certificate","Rotate the certificate directly in Azure Key Vault — the App Registration updates automatically","Reset the client secret in the App Registration to invalidate the old certificate",""],answer:1,explanation:"Zero-downtime certificate rotation: 1) Upload new certificate to the App Registration (both old and new coexist). 2) Update app configuration to reference the new certificate thumbprint. 3) Deploy the updated app. 4) Verify app works with new certificate. 5) Remove the old certificate from the App Registration. This ensures no period where the app has no valid certificate.",difficulty:"Hard"},
{q:"You configure Azure AD External Identities (B2B) self-service sign-up with a user flow. An external user signs up using their Google account. In your Azure AD tenant, what type of account is created?",options:["A full member account with the same permissions as internal users","A guest user account (UserType = Guest) with limited access. The account is linked to the external Google identity — the user authenticates via Google, not your Azure AD","An Azure AD B2C account linked to your tenant","A temporary account that expires after 30 days"],answer:1,explanation:"Azure AD B2B self-service sign-up creates guest user accounts in your tenant. These are UserType=Guest accounts — they can be granted access to your resources via RBAC or app assignments. The user authenticates with their external identity (Google, Facebook, or other Azure AD) — your tenant doesn't manage their credentials. Guest accounts have limited default permissions vs member accounts.",difficulty:"Medium"}
]},

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZ-204 Exam Prep Hub</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --azure:#0078D4;--azure-dark:#005a9e;--azure-xdark:#003f73;--azure-light:#deecf9;--azure-pale:#f0f6ff;
  --bg:#f4f6f9;--surface:#fff;--nav-bg:#1a1f36;--border:#d0d7de;--border-light:#e8ecf0;
  --text:#1a1f36;--text-muted:#6b7280;--text-light:#9ca3af;
  --ok-bg:#ecfdf5;--ok-bdr:#10b981;--ok-txt:#065f46;
  --err-bg:#fef2f2;--err-bdr:#ef4444;--err-txt:#991b1b;
  --warn-bg:#fffbeb;--warn-bdr:#fbbf24;--warn-txt:#92400e;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'Consolas','Cascadia Code','Courier New',monospace;
  --r:10px;--rs:6px;--sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);--shm:0 4px 12px rgba(0,0,0,.12)
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

/* NAV */
#top-nav{background:var(--nav-bg);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.35)}
.nav-brand{display:flex;align-items:center;gap:10px;color:#fff;font-weight:600;font-size:16px;cursor:pointer;text-decoration:none}
.nav-brand-icon{width:30px;height:30px;background:var(--azure);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:17px}
.nav-badge{background:var(--azure);color:#fff;font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600}
.nav-stats{display:flex;gap:18px}
.nav-stat{color:rgba(255,255,255,.55);font-size:12px}.nav-stat strong{color:#fff}
.nav-actions{display:flex;align-items:center;gap:10px}
.btn-nav{height:34px;padding:0 1rem;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-width:148px;white-space:nowrap}
.btn-nav-outline{background:transparent;color:#e2e8f0;border:1px solid rgba(255,255,255,.25)}
.btn-nav-outline:hover{background:rgba(255,255,255,.1);text-decoration:none}
.btn-nav-primary{background:var(--azure);color:#fff;border:1px solid var(--azure)}
.btn-nav-primary:hover{background:var(--azure-dark);text-decoration:none}

/* VIEWS */
.view{display:none}.view.active{display:block}
.fade{animation:fadeIn .22s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* HOME */
#view-home{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem}
.hero{background:linear-gradient(135deg,#1a1f36 0%,#2d3561 100%);color:#fff;border-radius:14px;padding:2.5rem;margin-bottom:2.5rem;position:relative;overflow:hidden}
.hero::before{content:'AZ-204';position:absolute;right:-8px;top:50%;transform:translateY(-50%);font-size:110px;font-weight:900;color:rgba(255,255,255,.04);letter-spacing:-4px;pointer-events:none;user-select:none}
.hero h1{font-size:26px;font-weight:700;margin-bottom:6px}
.hero p{color:rgba(255,255,255,.65);font-size:14px;margin-bottom:1.75rem}
.hero-stats{display:flex;gap:2.5rem;flex-wrap:wrap}
.hstat{text-align:center}
.hstat-n{font-size:30px;font-weight:800;color:#60a5fa;display:block;line-height:1}
.hstat-l{font-size:11px;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
.sec-title{font-size:19px;font-weight:700;margin-bottom:1.25rem;display:flex;align-items:center;gap:10px;color:var(--text)}
.sec-title span{flex:1;height:1px;background:var(--border-light);display:block}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:13px;margin-bottom:3rem}
.topic-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;box-shadow:var(--sh)}
.topic-card:hover{transform:translateY(-2px);box-shadow:var(--shm);border-color:var(--azure)}
.topic-icon{margin-bottom:10px;display:block;width:26px;height:26px}
.topic-icon svg{display:block;width:26px;height:26px}
.topic-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.4}
.topic-meta{font-size:11px;color:var(--text-muted)}
.sec-sub{font-size:13px;color:var(--text-muted);margin:-0.75rem 0 1.25rem}
.test-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:13px}
.test-pills{display:flex;flex-wrap:wrap;gap:4px}
.test-card{backgound:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;box-shadow:var(--sh)}
.test-card:hover{transform:translateY(-2px);box-shadow:var(--shm);border-color:#7c3aed}
.test-num{font-size:22px;font-weight:800;color:#7c3aed;margin-bottom:4px}
.test-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px}
.pill{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;margin-right:4px}
.pill-purple{background:#f5f3ff;color:#7c3aed}
.pill-amber{background:#fef3c7;color:#92400e}

/* BLIND MODE TOGGLE */
.blind-toggle{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.9rem 1.25rem;margin-bottom:2rem;box-shadow:var(--sh)}
.switch{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0;position:absolute}
.switch-track{position:absolute;inset:0;background:#cbd5e1;transition:background .15s;border-radius:22px;cursor:pointer}
.switch-track::before{position:absolute;content:"";height:16px;width:16px;left:3px;top:3px;background:#fff;transition:transform .15s;border-radius:50%;box-shadow:0 1px 2px rgba(0,0,0,.25)}
.switch input:checked+.switch-track{background:var(--azure)}
.switch input:checked+.switch-track::before{transform:translateX(18px)}
.blind-toggle-title{font-size:13px;font-weight:600;color:var(--text)}
.blind-toggle-sub{font-size:12px;color:var(--text-muted);margin-top:1px}
.blind-badge{font-size:11px;font-weight:600;padding:5px 11px;border-radius:20px;background:#f5f3ff;color:#7c3aed;display:inline-flex;align-items:center;gap:5px}

/* QUIZ VIEW */
#view-quiz{max-width:860px;margin:0 auto;padding:1.5rem}
.quiz-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
.back-btn{display:flex;align-items:center;gap:5px;background:none;border:1px solid var(--border);border-radius:var(--rs);padding:6px 13px;font-size:13px;cursor:pointer;color:var(--text-muted);transition:background .15s,border-color .15s,color .15s;font-family:var(--font)}
.back-btn:hover{background:var(--surface);border-color:var(--azure);color:var(--azure)}
.quiz-label{font-size:14px;font-weight:600;color:var(--text)}
.timer-badge{font-family:var(--mono);font-size:14px;font-weight:700;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rs);padding:5px 13px;color:var(--text-muted);transition:color .3s,border-color .3s,background .3s}
.timer-badge.warn{color:var(--warn-txt);border-color:var(--warn-bdr);background:var(--warn-bg)}
.timer-badge.danger{color:var(--err-txt);border-color:var(--err-bdr);background:var(--err-bg);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}
.qdots{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:1rem}
.qdot{width:27px;height:27px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);font-size:10px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:background .12s,border-color .12s}
.qdot:hover{border-color:var(--azure)}
.qdot.cur{border-color:var(--azure);color:var(--azure);font-weight:900;background:var(--azure-pale);border-width:3px}
.qdot.ok{background:var(--ok-bg);border-color:var(--ok-bdr);color:var(--ok-txt);border-style:double;border-width:3px}
.qdot.bad{background:var(--err-bg);border-color:var(--err-bdr);color:var(--err-txt);border-style:dashed}
.qdot.answered{background:var(--azure-pale);border-color:var(--azure);color:var(--azure)}
.prog-wrap{background:var(--border-light);border-radius:4px;height:5px;margin-bottom:.6rem}
.prog-fill{background:var(--azure);border-radius:4px;height:5px;transition:width .4s ease}
.prog-text{font-size:12px;color:var(--text-muted);margin-bottom:1.25rem}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem;box-shadow:var(--sh)}
.q-meta{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap}
.q-num{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted)}
.diff-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}
.diff-medium{background:#fef3c7;color:#92400e}
.diff-hard{background:#fee2e2;color:#991b1b}
.topic-lbl{font-size:10px;color:var(--text-muted);background:var(--bg);padding:2px 8px;border-radius:20px;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-text{font-size:15px;color:var(--text);line-height:1.65;margin-bottom:1rem}
.q-code{background:#1e1e2e;color:#cdd6f4;border-radius:var(--rs);padding:1rem 1.25rem;font-family:var(--mono);font-size:12.5px;white-space:pre;overflow-x:auto;margin-bottom:1rem;line-height:1.6;border:1px solid #313244}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{display:block;width:100%;text-align:left;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rs);padding:.7rem 1rem;cursor:pointer;font-size:14px;color:var(--text);line-height:1.5;transition:background .12s,border-color .12s;font-family:var(--font)}
.opt:hover:not(:disabled){background:var(--azure-pale);border-color:var(--azure)}
.opt.correct{background:var(--ok-bg);border-color:var(--ok-bdr);color:var(--ok-txt);font-weight:500}
.opt.wrong{background:var(--err-bg);border-color:var(--err-bdr);color:var(--err-txt)}
.opt.revealed{background:var(--ok-bg);border-color:var(--ok-bdr);color:var(--ok-txt)}
.opt.selected{background:var(--azure-pale);border-color:var(--azure);color:var(--text);font-weight:500}
.opt:disabled{cursor:default}
.opt-lbl{display:inline-block;width:22px;font-weight:700;color:var(--text-muted)}
.opt.correct .opt-lbl,.opt.revealed .opt-lbl{color:var(--ok-txt)}
.opt.wrong .opt-lbl{color:var(--err-txt)}
.opt-indicator{float:right;font-weight:900;font-size:16px;line-height:1.5;margin-left:8px}
.opt-check{color:var(--ok-txt)}.opt-cross{color:var(--err-txt)}
.expl{background:var(--azure-pale);border-left:3px solid var(--azure);border-radius:0 var(--rs) var(--rs) 0;padding:.85rem 1rem;margin-top:1rem;font-size:13px;color:#334155;line-height:1.65;display:none}
.expl.show{display:block}
.expl-hdr{font-weight:700;font-size:13px;margin-bottom:5px}
.expl-hdr.ok{color:var(--ok-txt)}.expl-hdr.bad{color:var(--err-txt)}
.nav-row{display:flex;gap:9px;flex-wrap:wrap;margin-top:.75rem}
.btn{padding:.5rem 1.25rem;border-radius:var(--rs);font-size:14px;cursor:pointer;font-family:var(--font);font-weight:500;transition:background .12s,transform .08s;border:1.5px solid var(--border);background:var(--surface);color:var(--text)}
.btn:hover{background:var(--bg)}.btn:active{transform:scale(.98)}
.btn-primary{background:var(--azure);color:#fff;border-color:var(--azure)}.btn-primary:hover{background:var(--azure-dark);border-color:var(--azure-dark)}
.btn-purple{background:#7c3aed;color:#fff;border-color:#7c3aed}.btn-purple:hover{background:#6d28d9;border-color:#6d28d9}

/* SCORE */
.score-wrap{padding-bottom:3rem}
.pass-banner{border-radius:var(--r);padding:1.75rem;text-align:center;margin-bottom:1.5rem}
.pass-banner.pass{background:var(--ok-bg);border:1.5px solid var(--ok-bdr)}
.pass-banner.fail{background:var(--err-bg);border:1.5px solid var(--err-bdr)}
.pass-banner.close{background:var(--warn-bg);border:1.5px solid var(--warn-bdr)}
.pb-icon{font-size:38px;margin-bottom:8px}
.pb-pct{font-size:52px;font-weight:900;line-height:1;margin-bottom:6px}
.pass-banner.pass .pb-pct{color:var(--ok-txt)}.pass-banner.fail .pb-pct{color:var(--err-txt)}.pass-banner.close .pb-pct{color:var(--warn-txt)}
.pb-lbl{font-size:15px;font-weight:700}
.pass-banner.pass .pb-lbl{color:var(--ok-txt)}.pass-banner.fail .pb-lbl{color:var(--err-txt)}.pass-banner.close .pb-lbl{color:var(--warn-txt)}
.pb-sub{font-size:13px;color:var(--text-muted);margin-top:4px}
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem}
.sstat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem;text-align:center}
.sstat-n{font-size:26px;font-weight:800;display:block}.sstat-l{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-top:4px}
.sstat.good .sstat-n{color:var(--ok-txt)}.sstat.bad .sstat-n{color:var(--err-txt)}.sstat.neu .sstat-n{color:var(--azure)}
.topic-bkdn{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1.5rem}
.topic-bkdn h3{font-size:13px;font-weight:700;margin-bottom:1rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted)}
.tbrow{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:12px}
.tbrow-name{width:185px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px}
.tbrow-bw{flex:1;background:var(--border-light);border-radius:4px;height:7px}
.tbrow-bar{height:7px;border-radius:4px;transition:width .6s ease}
.tbrow-bar.low{background:#ef4444}.tbrow-bar.mid{background:#f59e0b}.tbrow-bar.hi{background:#10b981}
.tbrow-pct{width:38px;text-align:right;font-weight:700;font-size:11px;color:var(--text)}
.score-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:1.5rem}

/* INLINE SVG SIZING — prevent topic SVGs from expanding to default 300px */
.quiz-label svg{width:18px;height:18px;vertical-align:middle;display:inline-block;flex-shrink:0}
.topic-lbl svg{width:14px;height:14px;vertical-align:middle;display:inline-block;flex-shrink:0}

/* RESPONSIVE */
@media(max-width:640px){
  .hero h1{font-size:20px}.hero-stats{gap:1.5rem}
  .score-grid{grid-template-columns:repeat(3,1fr);gap:8px}
  .tbrow-name{width:110px}
  #view-quiz{padding:1rem}.q-card{padding:1rem}
  .nav-stats{display:none}
  .nav-badge{display:none}
}
</style>
<link rel="icon" type="image/svg+xml" href="svg/favicon.svg"></head><body>
<nav id="top-nav">
  <div class="nav-brand" onclick="goHome()" style="cursor:pointer">
    <div class="nav-brand-icon">Az</div>
    <span>AZ-204 Prep Hub</span>
  </div>
  <div class="nav-actions">
    <a href="learn.html" class="btn-nav btn-nav-outline">Study Notes →</a>
  </div>
</nav>
<div id="app"></div>
<script>
const TOPICS={};
</script>
<script src="data/topic-01-app-service.js"></script>
<script src="data/topic-02-storage.js"></script>
<script src="data/topic-03-cosmosdb.js"></script>
<script src="data/topic-04-apim.js"></script>
<script src="data/topic-05-messaging.js"></script>
<script src="data/topic-06-security.js"></script>
<script src="data/topic-07-containers.js"></script>
<script src="data/topic-08-auth.js"></script>
<script src="data/topic-09-monitoring.js"></script>
<script src="data/topic-10-caching.js"></script>
<script>

// ── App State ──────────────────────────────────────────────────────────────
const topicKeys = Object.keys(TOPICS);
const state = {
  mode: null,       // 'drill' | 'test'
  topicIdx: 0,      // for drills
  testIdx: 0,       // 0-9 for practice tests
  questions: [],    // active question array
  answers: [],      // user answers (-1 = unanswered), stores the ORIGINAL option index
  optionOrder: [],  // optionOrder[i] = shuffled array of original option indices for questions[i]
  current: 0,       // current question index
  revealed: [],     // revealed[i] = true once feedback should be shown for that question
  blind: false,     // blind mode: hide correct/incorrect feedback until the quiz ends
  reviewing: false, // true while reviewing a finished quiz (forces feedback visible)
  timerSec: 0,
  timerInterval: null,
  started: false,
};

// ── Blind mode preference ────────────────────────────────────────────────────
let _blindModeMem = false;
function getBlindMode(){
  try { return localStorage.getItem('az204_blind')==='1'; } catch(e){ return _blindModeMem; }
}
function setBlindMode(v){
  _blindModeMem = v;
  try { localStorage.setItem('az204_blind', v?'1':'0'); } catch(e){}
}

// ── Utility ────────────────────────────────────────────────────────────────
function $(id){ return document.getElementById(id); }
function el(tag, cls, html){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(html !== undefined) e.innerHTML = html;
  return e;
}
function pad(n){ return n < 10 ? '0'+n : ''+n; }
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}
function shuffledIndices(n){
  return shuffle(Array.from({length:n},(_,i)=>i));
}
function fmtTime(sec){
  const m = Math.floor(sec/60), s = sec%60;
  return pad(m)+':'+pad(s);
}
function totalCorrect(){ return state.answers.filter((a,i)=>a===state.questions[i].answer).length; }
function topicScore(tKey){
  const topic = TOPICS[tKey];
  const qs = topic.questions;
  let correct=0, total=0;
  state.questions.forEach((q,i)=>{
    if(qs.indexOf(q)>=0 && state.answers[i]>=0){
      total++;
      if(state.answers[i]===q.answer) correct++;
    }
  });
  return {correct, total};
}

// ── Nav stats ──────────────────────────────────────────────────────────────
function updateNavStats(){
  const span = document.querySelector('.nav-stats');
  if(!span) return;
  if(!state.started){ span.innerHTML=''; return; }
  const tot = state.questions.length;
  const ans = state.answers.filter(a=>a>=0).length;
  span.innerHTML = `<div class="nav-stat">${ans}/${tot} <span>answered</span></div>`;
  if(!state.blind || state.reviewing){
    span.innerHTML += `<div class="nav-stat">${totalCorrect()} <span>correct</span></div>`;
  }
}

// ── Timer ──────────────────────────────────────────────────────────────────
function stopTimer(){
  if(state.timerInterval){ clearInterval(state.timerInterval); state.timerInterval=null; }
}
function startTimer(){
  stopTimer();
  const badge = $('timer-badge');
  if(!badge) return;
  state.timerInterval = setInterval(()=>{
    if(state.mode==='test'){
      state.timerSec--;
      if(state.timerSec<=0){ stopTimer(); showScore(); return; }
    } else {
      state.timerSec++;
    }
    renderTimer();
  },1000);
}
function renderTimer(){
  const badge = $('timer-badge');
  if(!badge) return;
  if(state.mode==='test'){
    badge.textContent = fmtTime(state.timerSec);
    badge.className = 'timer-badge';
    if(state.timerSec<=600) badge.classList.add('danger');
    else if(state.timerSec<=1200) badge.classList.add('warn');
  } else {
    badge.textContent = fmtTime(state.timerSec);
    badge.className = 'timer-badge';
  }
}

// ── Views ──────────────────────────────────────────────────────────────────
function showView(id){
  document.querySelectorAll('.view').forEach(v=>{
    v.classList.remove('active','fade');
    v.style.display='none';
  });
  const v = $(id);
  if(v){ v.style.display='block'; requestAnimationFrame(()=>{ v.classList.add('active'); }); }
}

// ── Home View ──────────────────────────────────────────────────────────────
function renderHome(){
  stopTimer();
  state.started = false;
  updateNavStats();
  $('view-home').innerHTML = `
    <div class="hero">
      <div class="hero-inner">
        <h1>AZ-204 Exam Prep</h1>
        <p>Developing Solutions for Microsoft Azure</p>
        <div class="hero-stats">
          <div class="hstat"><div class="hstat-n">10</div><div class="hstat-l">Topics</div></div>
          <div class="hstat"><div class="hstat-n">${topicKeys.reduce((s,k)=>s+TOPICS[k].questions.length,0)}</div><div class="hstat-l">Questions</div></div>
          <div class="hstat"><div class="hstat-n">10</div><div class="hstat-l">Practice Tests</div></div>
          <div class="hstat"><div class="hstat-n">85 min</div><div class="hstat-l">Per Test</div></div>
        </div>
      </div>
    </div>
    <div class="home-content">
      <div class="blind-toggle">
        <label class="switch">
          <input type="checkbox" id="blind-toggle-input" ${getBlindMode()?'checked':''}>
          <span class="switch-track"></span>
        </label>
        <div>
          <div class="blind-toggle-title"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:3px"><path d="M17.94 17.94A10.94 10.94 0 0112 20c-7 0-11-8-11-8a18.5 18.5 0 015.06-5.94M9.9 4.24A10.94 10.94 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19M14.12 14.12a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>Blind mode</div>
          <div class="blind-toggle-sub">Hide correct/incorrect feedback and explanations while you answer — everything is revealed on the score screen at the end. Applies to the next drill or test you start.</div>
        </div>
      </div>
      <h2 class="sec-title">Topic Drills</h2>
      <div class="topic-grid" id="topic-grid"></div>
      <h2 class="sec-title">Practice Tests</h2>
      <p class="sec-sub">Each test draws a proportional mix of questions from all 10 topics (~30-38 questions) · 85-minute countdown</p>
      <div class="test-grid" id="test-grid"></div>
    </div>`;
  const blindInput = $('blind-toggle-input');
  if(blindInput) blindInput.onchange = ()=> setBlindMode(blindInput.checked);
  // topic cards
  const tg = $('topic-grid');
  topicKeys.forEach((k,i)=>{
    const t = TOPICS[k];
    const card = el('div','topic-card');
    card.innerHTML = `<div class="topic-icon">${t.icon}</div>
      <div class="topic-name">${k}</div>
      <div class="topic-meta">${t.questions.length} questions</div>`;
    card.style.setProperty('--tc',t.color);
    card.onclick = ()=>startDrill(i);
    tg.appendChild(card);
  });
  // test cards
  const pg = $('test-grid');
  for(let i=0;i<10;i++){
    const card = el('div','test-card');
    card.innerHTML = `<div class="test-num">Test ${i+1}</div>
      <div class="test-title">Full Practice Exam</div>
      <div class="test-pills">
        <span class="pill">${testQuestions(i).length} questions</span>
        <span class="pill pill-amber">85 min</span>
        <span class="pill pill-purple">10 topics</span>
      </div>`;
    card.onclick = ()=>startTest(i);
    pg.appendChild(card);
  }
  showView('view-home');
}

// ── Drill ──────────────────────────────────────────────────────────────────
function startDrill(topicIdx){
  state.mode = 'drill';
  state.topicIdx = topicIdx;
  const t = TOPICS[topicKeys[topicIdx]];
  state.questions = shuffle([...t.questions]);
  state.answers = new Array(state.questions.length).fill(-1);
  state.revealed = new Array(state.questions.length).fill(false);
  state.optionOrder = state.questions.map(q=>shuffledIndices(q.options.length));
  state.blind = getBlindMode();
  state.reviewing = false;
  state.current = 0;
  state.timerSec = 0;
  state.started = true;
  renderQuiz();
  startTimer();
}

// ── Test ───────────────────────────────────────────────────────────────────
// Slice each topic's question list into 10 proportional, non-overlapping chunks (one per
// practice test) instead of assuming a fixed 4-per-topic stride — topics don't all have the
// same question count, and a fixed stride left later tests (esp. #8-10) badly short.
function testQuestions(n){
  const qs = [];
  topicKeys.forEach(k=>{
    const tqs = TOPICS[k].questions;
    const start = Math.floor(tqs.length * n / 10);
    const end = Math.floor(tqs.length * (n+1) / 10);
    for(let i=start;i<end;i++){ qs.push(tqs[i]); }
  });
  return qs;
}
function startTest(testIdx){
  state.mode = 'test';
  state.testIdx = testIdx;
  const qs = testQuestions(testIdx);
  state.questions = shuffle(qs);
  state.answers = new Array(state.questions.length).fill(-1);
  state.revealed = new Array(state.questions.length).fill(false);
  state.optionOrder = state.questions.map(q=>shuffledIndices(q.options.length));
  state.blind = getBlindMode();
  state.reviewing = false;
  state.current = 0;
  state.timerSec = 85*60;
  state.started = true;
  renderQuiz();
  startTimer();
}

// ── Quiz Render ────────────────────────────────────────────────────────────
function renderQuiz(){
  updateNavStats();
  const q = state.questions[state.current];
  const topicName = topicKeys[state.topicIdx] || findQuestionTopic(q);
  const label = state.mode==='drill'
    ? `${TOPICS[topicKeys[state.topicIdx]].icon} ${topicKeys[state.topicIdx]}`
    : `Practice Test ${state.testIdx+1}`;

  $('view-quiz').innerHTML = `
    <div class="quiz-topbar">
      <button class="back-btn" id="back-btn">← Home</button>
      <span class="quiz-label">${label}</span>
      ${state.blind && !state.reviewing ? '<span class="blind-badge"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;margin-right:3px"><path d="M17.94 17.94A10.94 10.94 0 0112 20c-7 0-11-8-11-8a18.5 18.5 0 015.06-5.94M9.9 4.24A10.94 10.94 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19M14.12 14.12a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>Blind mode</span>' : ''}
      <span class="timer-badge" id="timer-badge">${fmtTime(state.timerSec)}</span>
    </div>
    <div class="prog-wrap">
      <div class="prog-fill" id="prog-fill" style="width:${((state.current+1)/state.questions.length*100).toFixed(1)}%"></div>
      <div class="prog-text" id="prog-text">${state.current+1} / ${state.questions.length}</div>
    </div>
    <div class="qdots" id="qdots"></div>
    <div class="q-card" id="q-card"></div>
    <div class="nav-row" id="nav-row"></div>`;

  $('back-btn').onclick = ()=>{ stopTimer(); renderHome(); };
  renderDots();
  renderQuestion();
  renderTimer();
  showView('view-quiz');
}

function findQuestionTopic(q){
  for(let k of topicKeys){
    if(TOPICS[k].questions.indexOf(q)>=0) return k;
  }
  return topicKeys[0];
}

function renderDots(){
  const wrap = $('qdots');
  if(!wrap) return;
  wrap.innerHTML='';
  const total = state.questions.length;
  const dots = Math.min(total, 40);
  const step = total > 40 ? total/40 : 1;
  for(let i=0;i<dots;i++){
    const qi = Math.round(i*step);
    const d = el('div','qdot');
    if(qi===state.current){
      d.classList.add('cur');
      d.textContent='*';
    } else if(state.answers[qi]>=0){
      if(state.revealed[qi]){
        const correct=state.answers[qi]===state.questions[qi].answer;
        d.classList.add(correct?'ok':'bad');
        d.textContent=correct?'O':'X';
      } else {
        d.classList.add('answered');
        d.textContent='*';
      }
    } else {
      d.textContent='-';
    }
    d.onclick=(()=>{ const idx=qi; return ()=>jumpTo(idx); })();
    wrap.appendChild(d);
  }
}

function jumpTo(idx){
  state.current = idx;
  renderQuestion();
  renderDots();
  updateProgress();
}

function updateProgress(){
  const pf=$('prog-fill'), pt=$('prog-text');
  if(pf) pf.style.width=((state.current+1)/state.questions.length*100).toFixed(1)+'%';
  if(pt) pt.textContent=`${state.current+1} / ${state.questions.length}`;
}

function renderQuestion(){
  const qc=$('q-card');
  if(!qc) return;
  const q = state.questions[state.current];
  const tKey = findQuestionTopic(q);
  const t = TOPICS[tKey];
  const ans = state.answers[state.current];
  const rev = state.revealed[state.current];

  let html = `<div class="q-meta">
    <span class="q-num">Q${state.current+1}</span>
    <span class="diff-badge ${q.difficulty==='Hard'?'diff-hard':'diff-medium'}">${q.difficulty}</span>
    <span class="topic-lbl">${t.icon} ${tKey}</span>
  </div>
  <div class="q-text">${escapeHtml(q.q)}</div>`;
  if(q.q_code) html+=`<pre class="q-code">${escapeHtml(q.q_code)}</pre>`;
  html+='<div class="opts">';
  const order = state.optionOrder[state.current] || q.options.map((_,i)=>i);
  order.forEach((origIdx,pos)=>{
    const opt = q.options[origIdx];
    let cls='opt';
    if(rev){
      if(origIdx===q.answer) cls+=' correct';
      else if(origIdx===ans && ans!==q.answer) cls+=' wrong';
      cls+=' revealed';
    } else if(ans===origIdx){
      cls+=' selected';
    }
    let indicator='';
    if(rev){
      if(origIdx===q.answer) indicator='<span class="opt-indicator opt-check">[Y]</span>';
      else if(origIdx===ans && ans!==q.answer) indicator='<span class="opt-indicator opt-cross">[N]</span>';
    }
    html+=`<div class="${cls}" data-idx="${origIdx}"><span class="opt-lbl">${String.fromCharCode(65+pos)}</span>${escapeHtml(opt)}${indicator}</div>`;
  });
  html+='</div>';
  if(rev){
    const ok = ans===q.answer;
    html+=`<div class="expl show">
      <div class="expl-hdr ${ok?'ok':'bad'}">${ok?'[Y] Correct':'[N] Incorrect'}</div>
      <p>${escapeHtml(q.explanation)}</p>
    </div>`;
  } else if(ans>=0 && state.blind){
    html+=`<div class="expl show"><p>Answer locked in. Feedback and explanation will be shown when you finish (blind mode).</p></div>`;
  }
  qc.innerHTML=html;
  // option click
  qc.querySelectorAll('.opt').forEach(o=>{
    o.addEventListener('click',()=>{
      if(state.answers[state.current]>=0) return;
      const i=parseInt(o.dataset.idx);
      state.answers[state.current]=i;
      if(!state.blind) state.revealed[state.current]=true;
      renderQuestion();
      renderDots();
      updateNavStats();
      renderNavRow();
    });
  });
  renderNavRow();
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderNavRow(){
  const nr=$('nav-row');
  if(!nr) return;
  const tot=state.questions.length;
  const cur=state.current;
  let html='';
  if(cur>0) html+=`<button class="btn" id="btn-prev">← Prev</button>`;
  else html+=`<span></span>`;
  html+=`<button class="btn btn-primary" id="btn-next">${cur<tot-1?'Next →':'Finish'}</button>`;
  nr.innerHTML=html;
  const bp=$('btn-prev'), bn=$('btn-next');
  if(bp) bp.onclick=()=>{ state.current--; renderQuestion(); renderDots(); updateProgress(); };
  if(bn) bn.onclick=()=>{
    if(cur<tot-1){ state.current++; renderQuestion(); renderDots(); updateProgress(); }
    else { stopTimer(); showScore(); }
  };
}

// ── Score ──────────────────────────────────────────────────────────────────
function showScore(){
  updateNavStats();
  const tot = state.questions.length;
  const cor = totalCorrect();
  const pct = Math.round(cor/tot*100);
  const pass = pct>=70;
  const elapsed = state.mode==='test' ? (85*60-state.timerSec) : state.timerSec;

  let html=`<div class="score-wrap">
    <div class="pass-banner ${pass?'pass':'fail'}">
      <div class="pb-icon">${pass?'PASS':'STUDY'}</div>
      <div class="pb-pct">${pct}%</div>
      <div class="pb-lbl">${pass?'Passed!':'Keep Practicing'}</div>
      <div class="pb-sub">${cor} of ${tot} correct · ${fmtTime(elapsed)} elapsed</div>
    </div>
    <div class="score-grid">
      <div class="sstat good"><div class="sstat-n">${cor}</div><div class="sstat-l">Correct</div></div>
      <div class="sstat bad"><div class="sstat-n">${tot-cor}</div><div class="sstat-l">Incorrect</div></div>
      <div class="sstat neu"><div class="sstat-n">${state.answers.filter(a=>a<0).length}</div><div class="sstat-l">Skipped</div></div>
      <div class="sstat neu"><div class="sstat-n">${pct}%</div><div class="sstat-l">Score</div></div>
    </div>`;

  if(state.mode==='test'){
    html+=`<div class="topic-bkdn">`;
    topicKeys.forEach(k=>{
      const t=TOPICS[k];
      const qs=t.questions;
      let tc=0,tt=0;
      const n=state.testIdx;
      for(let j=0;j<4;j++){
        const qi=state.questions.indexOf(qs[n*4+j]);
        if(qi>=0){ tt++; if(state.answers[qi]===qs[n*4+j].answer) tc++; }
      }
      if(tt===0) return;
      const tp=Math.round(tc/tt*100);
      const cls=tp>=80?'hi':tp>=60?'mid':'low';
      html+=`<div class="tbrow">
        <div class="tbrow-name">${t.icon} ${k}</div>
        <div class="tbrow-bw"><div class="tbrow-bar ${cls}" style="width:${tp}%"></div></div>
        <div class="tbrow-pct">${tc}/${tt}</div>
      </div>`;
    });
    html+=`</div>`;
  }

  html+=`<div class="score-btns">
    <button class="btn btn-primary" id="btn-retry">Retry</button>
    <button class="btn" id="btn-home">Home</button>
    <button class="btn btn-purple" id="btn-review">Review Answers</button>
  </div></div>`;

  $('view-score').innerHTML=html;
  showView('view-score');

  $('btn-home').onclick=()=>renderHome();
  $('btn-retry').onclick=()=>{
    if(state.mode==='drill') startDrill(state.topicIdx);
    else startTest(state.testIdx);
  };
  $('btn-review').onclick=()=>{
    state.current=0;
    state.revealed=state.revealed.map(()=>true);
    state.reviewing=true;
    renderQuiz();
  };
}

// ── Init ───────────────────────────────────────────────────────────────────
(function(){
  const app = document.getElementById('app');
  ['view-home','view-quiz','view-score'].forEach(id=>{
    const d = document.createElement('div');
    d.id = id; d.className = 'view';
    app.appendChild(d);
  });
})();
function goHome(){ renderHome(); }
renderHome();
</script>

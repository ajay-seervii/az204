{q:"Service Bus Premium tier supports JMS 2.0. What does this enable compared to the Standard tier?",options:["Higher message throughput — JMS 2.0 uses binary encoding instead of XML","JMS 2.0 enables shared durable subscriptions (multiple consumers on the same subscription simultaneously), which is not available in Standard tier's JMS 1.1 support","JMS 2.0 enables message sizes up to 100 MB vs 256 KB in Standard tier","JMS 2.0 enables at-most-once delivery semantics"],answer:1,explanation:"Service Bus Premium supports JMS 2.0, which adds shared durable subscriptions. In JMS 1.1, durable subscriptions only allow one consumer per subscription at a time. JMS 2.0 shared durable subscriptions allow multiple consumers to concurrently read from the same subscription, enabling horizontal scaling of topic-based consumers.",difficulty:"Hard"},
{q:"You need Event Grid to filter Azure Blob Storage events (BlobCreated) for blobs whose names start with 'invoices/' and end with '.pdf'. Which Event Grid filter configuration is correct?",options:["Use a subjectBeginsWith filter for 'invoices/' and a separate subscription with subjectEndsWith '.pdf'","Set subjectBeginsWith='/blobServices/default/containers/{container}/blobs/invoices/' and subjectEndsWith='.pdf' on a single subscription","Use an advanced filter on the data.url property with a Contains operator","Apply a schema filter using Event Grid's custom schema validation"],answer:1,explanation:"Event Grid blob events use the subject format: /blobServices/default/containers/{containerName}/blobs/{blobName}. You can combine subjectBeginsWith and subjectEndsWith on a single subscription. Both conditions must match — effectively an AND condition — to filter for blobs starting with 'invoices/' and ending with '.pdf'.",difficulty:"Hard"},
{q:"A consumer reads from a Service Bus queue with ReceiveMode.ReceiveAndDelete. The consumer crashes immediately after receiving a message but before processing it. What happens to the message?",options:["The message is returned to the queue after the lock expires","The message is permanently lost — ReceiveAndDelete removes the message from the queue immediately upon receipt, before the consumer can acknowledge successful processing","The message is moved to the dead letter queue","The message is held in the consumer's buffer and redelivered on reconnect"],answer:1,explanation:"ReceiveAndDelete mode removes the message from Service Bus immediately upon delivery. If the consumer crashes before processing, the message is gone. For at-least-once delivery (where messages survive consumer crashes), use PeekLock mode — the message stays locked in the queue until the consumer explicitly calls Complete(), or the lock expires and the message is redelivered.",difficulty:"Hard"},
{q:"Event Hubs has a retention period configured to 7 days. After 8 days, a consumer group starts reading from the beginning using offset 'earliest'. What happens?",options:["The consumer reads events from 8 days ago (the first available event)","Events older than 7 days have been purged — the consumer starts from the earliest available event (7 days ago), not 8 days ago","The consumer receives an error because the requested offset no longer exists","The consumer reads from the current position (latest events) as a fallback"],answer:1,explanation:"Event Hubs retains events for the configured retention period (1-7 days for Standard, up to 90 days for Premium). Events older than the retention period are automatically purged. When using earliest offset, consumption starts from the oldest available event within the retention window, not from the absolute beginning of time.",difficulty:"Hard"},
{q:"A Service Bus message has a ScheduledEnqueueTimeUtc set to a future time. What happens when that time arrives?",options:["The message is sent to the queue at the scheduled time and becomes visible to consumers","The message was already in the queue but invisible — at the scheduled time it becomes visible (enqueued) for consumers to pick up","ScheduledEnqueueTimeUtc makes the message visible in the portal only, not to consumers","The message TTL starts counting from the ScheduledEnqueueTimeUtc"],answer:1,explanation:"Message scheduling in Service Bus lets you submit a message now with a deferred visibility time. The message is stored in a 'deferred' state and becomes available to consumers only when the ScheduledEnqueueTimeUtc arrives. TTL countdown begins when the message becomes visible.",difficulty:"Medium"},
{q:"You need to process Event Hubs events in real-time to detect anomalies and output alerts to another Event Hub. Which Azure service is BEST for this stateful stream processing?",options:["Azure Logic Apps — triggers on each Event Hubs event with stateful workflow steps","Azure Stream Analytics — processes streaming data with SQL-like queries, windowing functions, and stateful aggregations; inputs and outputs to Event Hubs","Azure Functions with Event Hubs trigger — can maintain state in Durable Functions","Azure Data Factory — processes streaming data in near-real-time pipelines"],answer:1,explanation:"Azure Stream Analytics is designed for real-time stream processing with complex event processing, windowing (tumbling, hopping, sliding), joins across streams, and stateful aggregations. It natively reads from Event Hubs/IoT Hub and writes to Event Hubs, SQL, Storage, etc. Functions work for simple scenarios; Stream Analytics handles complex stateful processing.",difficulty:"Hard"},
{q:"Event Grid has a push delivery model. Which Azure service provides event streaming with a PULL model (consumers control when to read)?",options:["Event Grid's pull delivery API (newer feature) — consumers pull events from Event Grid topics","Event Hubs — consumers pull events from partitions at their own pace using offsets","Service Bus with peek-lock mode","Azure Queue Storage with long-polling"],answer:0,explanation:"Event Grid recently added a pull delivery model (namespace topics) alongside the traditional push model. In pull delivery, consumers call the API to retrieve events at their own pace, similar to Service Bus or Event Hubs. Event Hubs also uses a pull model. The traditional Event Grid (domain/system topics) uses push delivery to subscribers.",difficulty:"Hard"},
{q:"Service Bus Premium tier supports 100 MB message size. Standard tier supports 256 KB. An application sends a 1 MB message to a Standard tier queue. What happens?",options:["The message is split into multiple 256 KB chunks automatically","The operation fails with an error — the message exceeds the Standard tier size limit","The message is stored but only the first 256 KB is delivered to consumers","The 1 MB message is automatically compressed to fit within 256 KB"],answer:1,explanation:"The Standard tier Service Bus queue has a maximum message size of 256 KB. Sending a message larger than this limit causes a MessageSizeExceededException (HTTP 413). The operation fails — messages are not chunked or compressed automatically. Use Service Bus Premium tier (up to 100 MB) or store large payloads in Blob Storage and send a reference in the message.",difficulty:"Medium"},
{q:"An Event Hubs namespace has 10 partitions. The EventProcessorClient has 3 instances running. One instance goes down. How does partition ownership change?",options:["The partitions owned by the crashed instance become unavailable until it restarts","The two remaining instances detect the missing ownership checkpoints (via Blob Storage) and rebalance, distributing the unowned partitions between them","An Azure-managed failover automatically redirects the partitions to a warm standby instance","Partition ownership in Event Hubs requires manual reassignment"],answer:1,explanation:"EventProcessorClient uses Blob Storage for partition ownership leases. When an instance crashes, its partition leases expire (configurable partition ownership expiration interval). The healthy instances detect unclaimed partitions during the next rebalance cycle and acquire them, distributing all 10 partitions between the 2 remaining instances.",difficulty:"Hard"},
{q:"You need to decouple an order processing system where the order service sends messages and the fulfillment service receives them. Order messages must not be lost even if the fulfillment service is down for 24 hours. Which Service Bus feature ensures this?",options:["Configure a queue with AutoDeleteOnIdle set to greater than 24 hours","Configure the queue's message TTL (DefaultMessageTimeToLive) to at least 24 hours and ensure the queue has sufficient storage quota","Enable duplicate detection with a 24-hour window","Use dead letter queue with a 24-hour visibility timeout"],answer:1,explanation:"Service Bus queues durably store messages until consumed or they expire. Set DefaultMessageTimeToLive to at least 24 hours (e.g., P1D) to ensure messages survive the fulfillment service's downtime. The storage quota must be sufficient to hold all messages during the outage. By default, messages last 14 days in Standard/Premium tiers.",difficulty:"Medium"},
{q:"Event Grid Cloud Events schema vs. Event Grid schema — when would you choose Cloud Events 1.0 schema?",options:["Always use Event Grid schema — Cloud Events is a preview feature","Choose Cloud Events 1.0 when you need interoperability with non-Azure systems and open-source tooling that supports the CNCF Cloud Events standard","Cloud Events 1.0 provides higher throughput than Event Grid schema","Use Cloud Events 1.0 only for IoT Hub events — other sources require Event Grid schema"],answer:1,explanation:"Cloud Events 1.0 is a CNCF open standard for event data. Use it when you need interoperability with non-Azure systems, Kubernetes event-driven autoscaling (KEDA), or other cloud providers' services that support Cloud Events. Event Grid natively supports both schemas; Cloud Events is preferred for multi-cloud or open-source ecosystem integration.",difficulty:"Hard"},
{q:"A Service Bus topic has a subscription with no filter rules configured. Which messages are delivered to this subscription?",options:["No messages — subscriptions require at least one filter rule","All messages published to the topic — the default rule (TRUE filter) matches all messages","Only messages with no Label property","Only messages explicitly targeted to this subscription by name"],answer:1,explanation:"A Service Bus subscription with no custom filters uses the default TRUE filter, which matches all messages. Every message published to the topic is delivered to this subscription. When you create a subscription with no rules, an implicit TrueFilter is added.",difficulty:"Medium"},
{q:"Event Hubs Dedicated cluster is required when which of the following conditions is met?",options:["More than 40 throughput units are needed — Dedicated provides unlimited TUs","Dedicated is required when you need predictable latency guarantees under 20ms, customer-managed encryption keys (BYOK), private link, and guaranteed capacity without noisy-neighbor effects","Dedicated is required for Kafka protocol support — Standard tier does not support Kafka","Dedicated is required when retention period exceeds 7 days"],answer:1,explanation:"Event Hubs Dedicated provides single-tenant clusters with: guaranteed capacity (no noisy-neighbor), customer-managed keys (BYOK), private endpoint support, and predictable performance. Standard and Premium tiers share infrastructure. Premium tier actually provides many of these features (BYOK, private link, 90-day retention) at lower cost than Dedicated for most workloads.",difficulty:"Hard"},
{q:"A message has been read from a Service Bus queue using PeekLock mode. The consumer is processing it but the lock expires before completing. What happens?",options:["The message is moved to the dead letter queue after lock expiry","The message becomes visible to other consumers and may be redelivered — the delivery count increments","The message is permanently deleted from the queue","The consumer receives an automatic lock renewal notification"],answer:1,explanation:"In PeekLock mode, the message has a configurable lock duration. If the lock expires before the consumer calls Complete(), the message becomes visible in the queue again and can be redelivered to any consumer. The delivery count increments. To prevent lock expiry, call RenewMessageLockAsync() periodically during long processing, or complete the message quickly and re-enqueue if more processing is needed.",difficulty:"Hard"},
{q:"You need to implement an event-driven workflow where creating a new blob in Azure Storage triggers a VM to be started. Which combination of services is simplest?",options:["Azure Monitor alert on blob creation + Azure Automation runbook","Azure Event Grid (BlobCreated event) + Azure Logic Apps (Start VM action) — no code required","Azure Functions with Blob trigger + Azure SDK to start VM","Azure Storage lifecycle management with an automation task"],answer:1,explanation:"Event Grid monitors Azure Blob Storage for BlobCreated events and delivers them to Azure Logic Apps, which has a built-in Start VM action. This no-code/low-code approach is simpler than writing Functions code. Logic Apps has direct connectors for Azure resources including VM management.",difficulty:"Medium"},
{q:"An Event Hubs namespace in Standard tier has 20 throughput units (TUs). The inbound limit is 1 MB/s per TU. A sudden spike sends 25 MB/s. What happens?",options:["Event Hubs automatically increases TUs to handle the spike via auto-inflate","Event Hubs throttles the excess traffic — the sender receives ServerBusyException (503) for the traffic above the 20 MB/s limit. With auto-inflate enabled, TUs can scale up automatically","Event Hubs drops excess events silently to protect the namespace","Event Hubs queues excess events until TUs become available"],answer:1,explanation:"Each throughput unit supports 1 MB/s inbound. With 20 TUs, the cap is 20 MB/s. Traffic above this is throttled with ServerBusyException (429/503). The Auto-Inflate feature automatically scales TUs up to a configured maximum when the limit is reached. Configure Auto-Inflate with a maximum TU count to handle spikes.",difficulty:"Hard"},
{q:"Service Bus message deferral: a consumer calls Defer() on a message. How does the consumer retrieve the deferred message later?",options:["Deferred messages are automatically redelivered after 5 minutes","The consumer must save the SequenceNumber from the Defer() call and later use ReceiveDeferredMessageAsync(sequenceNumber) to retrieve the specific deferred message","Deferred messages go to the dead letter queue and must be read from there","Call Receive() again — deferred messages are returned in FIFO order with other messages"],answer:1,explanation:"Deferral allows a consumer to temporarily park a message it can't process now without abandoning it. The deferred message is only retrievable by its SequenceNumber via ReceiveDeferredMessageAsync(). Deferred messages DO count against delivery count. This is useful for out-of-order processing (e.g., process message B before message A in a dependency chain).",difficulty:"Hard"},
{q:"You need to fanout an event to 100 different downstream services. Each service needs independent control over which events it receives. Which architecture is BEST?",options:["Create 100 separate Event Grid subscriptions on the same topic, each with different filters — scales to thousands of subscriptions with no management overhead","Use a single Service Bus queue with 100 competing consumers","Deploy 100 Azure Functions each with their own Event Hubs consumer group","Manually loop over 100 HTTP endpoints in your application and call each one"],answer:0,explanation:"Event Grid is designed for fan-out. Create one system or custom topic, then create subscription endpoints for each downstream service with appropriate subject/event type filters. Event Grid handles delivery, retries, and dead-lettering independently per subscription. This is vastly more manageable than manual fan-out or 100 separate Event Hubs consumer groups.",difficulty:"Medium"},
{q:"An Event Hubs partition key is set to the device ID when sending events. Events from device X are being processed by consumer A on partition 2. If consumer A crashes, which partition does the new consumer processing device X's events read from?",options:["The new consumer reads from any available partition — device X's events may now be on a different partition","Partition key ensures all events from device X always hash to partition 2 — the new consumer must read from partition 2 to receive device X's events","The new consumer reads from the DLQ where device X's events are moved","Device X's events are rebalanced to the partition with the fewest events"],answer:1,explanation:"Event Hubs partition keys use consistent hashing — the same key always maps to the same partition. If device X hashes to partition 2, ALL of device X's events go to partition 2 indefinitely. When consumer A crashes and a new consumer takes over partition 2, it continues reading device X's events in order.",difficulty:"Hard"},
{q:"A hybrid application uses Service Bus to communicate between on-premises and Azure. The on-premises firewall only allows outbound HTTPS (port 443). Can it connect to Service Bus?",options:["No — Service Bus requires outbound port 5671 (AMQP) which must be opened in the firewall","Yes — Service Bus supports AMQP over WebSocket (port 443) for environments where AMQP port 5671 is blocked. Configure the client to use WebSocket transport mode","Service Bus requires a VPN or ExpressRoute connection from on-premises — port 443 alone is insufficient","Service Bus uses port 9354 which must be allowed through the firewall"],answer:1,explanation:"Service Bus AMQP protocol normally uses port 5671. For environments with restrictive firewalls that only allow port 443, Service Bus supports AMQP over WebSocket (port 443/HTTPS). Configure the ServiceBusClient with the WebSocket transport option. This has slightly higher overhead than native AMQP but works through standard HTTPS proxies.",difficulty:"Hard"},
{q:"Event Grid system topics vs custom topics: a developer creates a system topic for Azure Blob Storage. Another developer creates a custom topic to publish application business events. What is the key architectural difference?",options:["System topics are managed by Azure (events from Azure services), custom topics accept events you publish programmatically — system topics cannot be modified; custom topics let you define event schemas","System topics support higher throughput than custom topics","Custom topics support dead-lettering; system topics do not","System topics are free; custom topics have per-event pricing"],answer:0,explanation:"System topics are created and managed by Azure for events from Azure services (Blob Storage, Event Grid, etc.). You cannot publish to system topics yourself. Custom topics are user-managed endpoints where your application publishes events using the Event Grid SDK. Both support subscriptions, filtering, delivery retry, and dead-lettering.",difficulty:"Medium"}
]},
"Azure Security":{icon:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='11' width='18' height='11' rx='2'/><path d='M7 11V7a5 5 0 0110 0v4'/></svg>",color:"#e81123",questions:[
{q:"A managed identity needs to read secrets from Key Vault. You assign 'Key Vault Contributor' role. The application still gets 403 errors. Why?",options:["The managed identity needs 'Key Vault Administrator' role instead","'Key Vault Contributor' is a management-plane role — it can manage the Key Vault resource but cannot read secret values. Assign the 'Key Vault Secrets User' data-plane role (or legacy access policy with Get permission) for secret read access","The managed identity must be in the same resource group as the Key Vault","Role assignments take 30 minutes to propagate — wait and retry"],answer:1,explanation:"Azure Key Vault has separate management-plane (Azure RBAC) and data-plane access controls. 'Key Vault Contributor' grants management access (create/delete vaults) but NOT data access (read/write secrets). For data plane operations, assign 'Key Vault Secrets User' (read) or 'Key Vault Secrets Officer' (read/write) roles, or use legacy Key Vault access policies.",difficulty:"Hard"},
{q:"An Azure Function needs to authenticate to a downstream REST API using OAuth 2.0 Client Credentials flow without storing secrets in code or config. Which approach is BEST?",options:["Store the client secret in Azure Key Vault and have the Function fetch it at startup","Use a system-assigned managed identity on the Function and register it as an application in Azure AD — obtain a token using DefaultAzureCredential and the downstream API's resource URI","Hardcode the client secret in application settings encrypted by Azure","Use a SAS token instead of OAuth 2.0"],answer:1,explanation:"Managed identity + DefaultAzureCredential eliminates secret management entirely. The Function's system-assigned managed identity has a service principal in Azure AD. Call DefaultAzureCredential to get a token for the downstream API's resource ID — Azure handles credential rotation. No secrets to store, rotate, or leak.",difficulty:"Hard"},
{q:"A Key Vault has both the RBAC authorization model and legacy access policies configured. A user has 'Key Vault Secrets User' RBAC role but no access policy. Can they read secrets?",options:["No — when both models are configured, access policies take precedence. Without an access policy, access is denied","Yes — when the RBAC authorization model is enabled on the vault, RBAC roles take precedence and access policies are ignored for data plane operations","RBAC and access policies are additive — missing an access policy denies access","Access policies take precedence only for certificates, not secrets"],answer:1,explanation:"A Key Vault has either RBAC authorization model or access policies enabled, not both simultaneously for data plane. When you enable the RBAC authorization model on a vault, RBAC controls data plane access and existing access policies are effectively ignored. The user with 'Key Vault Secrets User' role CAN read secrets.",difficulty:"Hard"},
{q:"You want to ensure that a Key Vault secret cannot be deleted permanently without going through a 90-day soft-delete period, even by an administrator. Which Key Vault feature provides this protection?",options:["Soft delete with the retention period set to 90 days","Purge protection — when enabled, once a vault or secret is soft-deleted, it cannot be purged (permanently deleted) until the soft-delete retention period has elapsed, even by administrators","RBAC with no one having 'Key Vault Administrator' role","Key Vault private endpoint to prevent accidental internet access"],answer:1,explanation:"Purge protection prevents anyone (including administrators) from permanently deleting a soft-deleted vault, key, secret, or certificate until the soft-delete retention period (7-90 days) has passed. Soft delete alone allows purging before the retention period. Purge protection is required for CMK (customer-managed keys) scenarios and compliance requirements.",difficulty:"Hard"},
{q:"An application running in Azure App Service uses a system-assigned managed identity to access Azure SQL Database. What connection string format enables this authentication?",options:["Server=...;Database=...;User ID={managed-identity-client-id};Password={managed-identity-secret}","Server=...;Database=...;Authentication=Active Directory Managed Identity — use the Microsoft.Data.SqlClient package with Azure AD authentication support","Server=...;Database=...;Integrated Security=SSPI (Windows authentication)","Connect using an Azure AD service principal with a certificate stored in Key Vault"],answer:1,explanation:"For managed identity to SQL authentication, use Microsoft.Data.SqlClient with Authentication=Active Directory Managed Identity (or Active Directory Default). The driver calls the managed identity endpoint to get a token, which it exchanges for a SQL access token. No password needed. Ensure the managed identity is added as a user in the SQL database (CREATE USER from EXTERNAL PROVIDER).",difficulty:"Hard"},
{q:"Azure AD Conditional Access policy blocks all access from non-compliant devices. A developer's device loses its compliance status. They try to use an existing access token (not expired). What happens?",options:["The existing token works until it expires — Conditional Access only evaluates at token issuance","If Continuous Access Evaluation (CAE) is enabled, the resource provider is notified of the compliance change and revokes the existing token immediately, even before expiration","Access is blocked only on the next token refresh — existing tokens have a 1-hour grace period","The device must be re-enrolled before the next login — existing tokens are unaffected"],answer:1,explanation:"Continuous Access Evaluation (CAE) allows resource providers (Exchange, SharePoint, Teams) to be notified of critical events (user disabled, password changed, device compliance lost) and revoke tokens in near-real-time, before they expire. Without CAE, a token would remain valid until its expiry (typically 1 hour). CAE reduces the attack window for stolen tokens.",difficulty:"Hard"},
{q:"You need to implement at-rest encryption for an Azure Storage account using keys that your organization manages and can revoke. Which feature should you use?",options:["Azure Storage Service Encryption (SSE) with Microsoft-managed keys — the default setting","Customer-Managed Keys (CMK) with keys stored in Azure Key Vault — you control key rotation and can revoke access by disabling the key in Key Vault","Azure Disk Encryption with BitLocker for storage accounts","Double encryption using the Storage account's infrastructure encryption option"],answer:1,explanation:"Customer-Managed Keys (CMK) let you store and manage encryption keys in Azure Key Vault. You can rotate, revoke, or disable the key at any time. If you revoke (disable) the key in Key Vault, Azure Storage loses access to the key and all encrypted data becomes inaccessible. Microsoft-managed keys (default SSE) are rotated automatically but you cannot revoke them.",difficulty:"Hard"},
{q:"An Azure Function has a system-assigned managed identity. You need it to read blobs from a Storage account in a different subscription. What is required?",options:["Managed identities only work within the same subscription — use a service principal instead","Assign the 'Storage Blob Data Reader' role to the managed identity on the Storage account — RBAC role assignments work across subscriptions","The managed identity must be user-assigned to work cross-subscription","Cross-subscription access requires the Storage account to be in the same Azure AD tenant"],answer:1,explanation:"Azure RBAC role assignments work across subscriptions as long as both resources are in the same Azure AD tenant. Assign 'Storage Blob Data Reader' (or appropriate role) to the Function's managed identity on the target Storage account. The credential acquisition uses the managed identity endpoint — cross-subscription access works transparently.",difficulty:"Hard"},
{q:"A web application uses Azure AD authentication with the MSAL library. After a user authenticates, the access token expires. How does MSAL handle token refresh?",options:["MSAL does not handle token refresh — the application must redirect to the login page","MSAL silently acquires a new access token using the cached refresh token (AcquireTokenSilent). The refresh token is long-lived — users are not prompted for credentials unless the refresh token also expires or is revoked","The application must call the token endpoint directly with the client secret to get a new token","MSAL re-prompts the user for credentials on every access token expiry (typically every hour)"],answer:1,explanation:"MSAL caches the refresh token. When the access token expires, MSAL's AcquireTokenSilent() automatically uses the cached refresh token to get a new access token without user interaction. Refresh tokens are long-lived (typically 90 days for public clients) and can be revoked by Azure AD. Only when the refresh token expires or is revoked does MSAL prompt for re-authentication.",difficulty:"Hard"},
{q:"You configure a Shared Access Signature (SAS) token for a Blob Storage container with Read permission, valid for 24 hours. A security incident requires you to immediately revoke all outstanding SAS tokens for that container. How?",options:["Delete and recreate the storage account","Rotate the storage account access key that was used to sign the SAS tokens — all tokens signed with the old key are immediately invalidated","Set the SAS expiry time to the past using the Azure portal","Add an IP filter to the storage account firewall to block all addresses"],answer:1,explanation:"Account SAS and Service SAS tokens are signed with the storage account access key. Rotating the key invalidates all SAS tokens signed with that key. For granular revocation without rotating keys, use Service SAS with a Stored Access Policy — revoke the policy to invalidate all SAS tokens referencing it. User Delegation SAS are revoked by revoking the user's Azure AD access.",difficulty:"Hard"},
{q:"Azure RBAC uses a deny assignment to restrict access. How does a deny assignment differ from simply not assigning a role?",options:["They have the same effect — no assignment means no access, same as a deny assignment","A deny assignment explicitly blocks specific actions even if a role assignment grants those actions. It takes precedence over any role assignment, including Owner","Deny assignments only apply to subscriptions, not resource groups or individual resources","Deny assignments are deprecated — use Azure Policy instead"],answer:1,explanation:"Not assigning a role means no access (implicit deny). A deny assignment explicitly blocks specific actions regardless of what role assignments grant — even Owner role cannot override a deny assignment (except for certain privileged actions by subscription owners). Deny assignments are created by Azure Blueprints and other managed services to lock down resource configurations.",difficulty:"Hard"},
{q:"An Azure AD App Registration has 'Allow public client flows' enabled. What does this enable?",options:["It allows the app to be accessed by unauthenticated (anonymous) users","It enables device code flow, ROPC (Resource Owner Password Credentials), and other flows that don't require a client secret — used for native/mobile apps where storing a secret securely is impractical","It makes the app registration publicly visible in the Azure AD gallery","It allows the app to skip MFA for all authentication requests"],answer:1,explanation:"Public client flows are for applications that cannot securely store a client secret (mobile apps, desktop apps, CLIs). Enabling 'Allow public client flows' enables device code flow (for devices with no browser), ROPC flow (username/password directly, not recommended), and interactive flows. These flows don't use client secrets — they rely on PKCE or user credentials.",difficulty:"Hard"},
{q:"You need to grant an external partner's company access to your Azure resources. They have their own Azure AD tenant. What is the BEST approach?",options:["Create new user accounts in your Azure AD for each partner user and share credentials","Configure Azure AD B2B collaboration — invite partner users as guest users in your tenant. They authenticate with their own organization's credentials and you assign RBAC roles to the guest users","Set up federation between your Azure AD and the partner's AD using ADFS","Create a separate Azure subscription for the partner and grant them owner access"],answer:1,explanation:"Azure AD B2B (Business-to-Business) collaboration allows external users to be invited as guest users in your Azure AD tenant. They authenticate with their own organization's credentials (or MSA) — you don't manage their passwords. Assign RBAC roles or app permissions to guest users. This maintains the principle of least privilege and doesn't require sharing credentials.",difficulty:"Medium"},
{q:"A developer registers an application in Azure AD and grants it the Microsoft Graph 'User.Read.All' application permission. The app can read all users without a signed-in user context. An admin has NOT granted admin consent. What happens when the app tries to call Graph?",options:["The call succeeds — application permissions don't require admin consent","The call fails with 403 Insufficient Privileges — application permissions (app roles) require admin consent before any user can authorize them","The call fails with 401 — admin consent affects token acquisition, not API calls","The call succeeds but returns only the app's own profile, not all users"],answer:1,explanation:"Application permissions (app roles) that grant access to all users/resources require administrator consent — a global admin must explicitly grant consent. Without admin consent, when the app tries to acquire a token using client credentials flow, or when calling the API, it receives an error. Admin consent is required once per tenant for application permissions.",difficulty:"Hard"},
{q:"Azure Defender for Key Vault detects an anomalous access pattern. A single IP accessed 1,000 secrets in 5 minutes. What does Azure Defender trigger?",options:["Azure Defender automatically revokes the IP's access to the Key Vault","Azure Defender raises a security alert in Microsoft Defender for Cloud — administrators are notified but the access itself is NOT automatically blocked","Azure Defender locks the Key Vault and requires a manual unlock by an administrator","Azure Defender rotates all accessed secrets automatically"],answer:1,explanation:"Microsoft Defender for Key Vault detects anomalous access patterns (mass secret enumeration, unusual IP locations, access from malware-known IPs). It raises security alerts in Defender for Cloud and can send notifications. However, it does NOT automatically block access, revoke permissions, or rotate secrets — those are manual remediation actions.",difficulty:"Medium"},
{q:"A User Delegation SAS for Azure Blob Storage is created using the storage account owner's credentials. The owner's Azure AD account is disabled. Are existing User Delegation SAS tokens still valid?",options:["Yes — once created, SAS tokens are self-contained and do not depend on the issuing user's status","No — User Delegation SAS tokens are backed by the issuing user's Azure AD credentials. Disabling the user invalidates all their User Delegation keys and any SAS tokens created from them","The SAS tokens remain valid until the user's delegation key expires (max 7 days)","Only SAS tokens created in the last 24 hours are invalidated — older ones continue working"],answer:1,explanation:"User Delegation SAS tokens are signed with a user delegation key obtained from Azure AD on behalf of the user. If the user's account is disabled or the user delegation key is revoked (via revokeUserDelegationKeys API), all SAS tokens created from that key are immediately invalidated. This provides better security control than account-key-signed SAS.",difficulty:"Hard"},
{q:"You implement OAuth 2.0 Authorization Code flow with PKCE for a Single Page Application. Why is PKCE required for SPAs?",options:["PKCE adds encryption for the access token, preventing interception in transit","SPAs cannot securely store a client secret (JavaScript is visible to users). PKCE replaces the client secret by using a code verifier/challenge pair — the server validates the code verifier on token exchange, preventing authorization code interception attacks","PKCE is required to support refresh tokens in SPAs","PKCE prevents CSRF attacks by adding a state parameter to the authorization request"],answer:1,explanation:"SPAs run in the browser and cannot keep secrets — JavaScript code and credentials are visible to anyone with browser dev tools. PKCE solves this: the SPA generates a random code_verifier, hashes it to a code_challenge, and sends the challenge with the authorization request. When exchanging the code for a token, it proves possession of the original verifier — an intercepted authorization code is useless without the verifier.",difficulty:"Hard"},
{q:"An Azure App Service is configured with Azure AD authentication (Easy Auth). A request comes in without an authentication token. What is the default behavior?",options:["The request is allowed through to the application — Easy Auth is advisory by default","The request is redirected to the Azure AD login page — the default action for unauthenticated requests is 'Redirect to identity provider'","The request receives a 401 response with a WWW-Authenticate header","The request is allowed but the user context is not set in the request headers"],answer:1,explanation:"The default behavior for Azure App Service Easy Auth when an unauthenticated request arrives is 'Redirect to identity provider' — the user is redirected to the Azure AD login page. You can change this to 'Return HTTP 401/403' for API scenarios where browser redirects are inappropriate. This is configured in the Authentication blade under 'Unauthenticated requests.'",difficulty:"Medium"},
{q:"A key stored in Azure Key Vault is set to expire in 30 days. What happens when the key expires?",options:["The key is automatically rotated — Key Vault generates a new version","The key becomes unusable — operations using the expired key fail with an error","Key Vault sends an alert but the key continues to work","The key is automatically deleted after expiration"],answer:1,explanation:"When a Key Vault key expires (past its expiry date), operations using that key version fail. Key Vault does NOT automatically rotate expired keys (unless you configure Key Vault key rotation policy). Configure a rotation policy or use Event Grid to listen for NearExpiry events and trigger rotation before expiry.",difficulty:"Medium"},
{q:"You need to implement a token cache for a backend service calling Azure AD. Multiple instances of the service run in parallel. Which token cache approach prevents redundant token acquisitions?",options:["In-memory token cache per instance — each instance acquires its own tokens","Distributed token cache (e.g., Redis Cache) shared across all instances — one token acquisition serves all instances until it expires","File-based token cache on a shared network drive","Disable token caching — always acquire a new token for each API call"],answer:1,explanation:"MSAL supports distributed token cache backends (Redis, SQL, etc.). With a distributed cache shared across all service instances, one instance acquires and caches the token. Other instances check the cache first — if a valid token exists, they use it without calling Azure AD. This reduces latency, load on Azure AD, and avoids throttling.",difficulty:"Hard"},
{q:"Azure App Service has both a system-assigned managed identity and a user-assigned managed identity. Code calls DefaultAzureCredential without specifying a client ID. Which identity is used?",options:["DefaultAzureCredential uses both identities and merges their permissions","DefaultAzureCredential uses the system-assigned identity when called without a specific client ID in an App Service environment","DefaultAzureCredential randomly selects one of the identities","DefaultAzureCredential fails if both types of managed identity are assigned"],answer:1,explanation:"When multiple managed identities are assigned to a resource, DefaultAzureCredential (and ManagedIdentityCredential) without a client ID defaults to the system-assigned identity. To use a user-assigned identity, specify its client ID: new ManagedIdentityCredential(clientId) or set AZURE_CLIENT_ID environment variable.",difficulty:"Hard"},
{q:"An Azure AD App Registration's access token lifetime is configured to 1 hour. A user signs in, and 30 minutes later an administrator revokes the user's session (e.g., 'Revoke all sessions'). The user has an existing valid access token. When does access stop?",options:["Immediately — revoking sessions invalidates all existing tokens instantly","With standard OAuth, the access token remains valid until its expiry (30 minutes from now). With CAE enabled and a CAE-capable resource provider, the token can be revoked near-immediately","The access token expires in 5 minutes — Azure enforces a 5-minute grace period after revocation","Revocation only affects future login attempts — existing tokens are unaffected"],answer:1,explanation:"Standard OAuth access tokens are self-contained JWTs valid until expiry — there's no built-in revocation mechanism for short-lived access tokens. Revoking all sessions invalidates refresh tokens, so no new access tokens can be obtained. However, the existing 1-hour access token remains valid until expiry. Continuous Access Evaluation (CAE) changes this for supported resource providers.",difficulty:"Hard"},
{q:"You use Azure AD Pod Identity (or Workload Identity Federation) for an AKS pod to access Azure resources. Which authentication approach is USED?",options:["The pod uses a service principal with a client secret stored in a Kubernetes secret","Workload Identity Federation: the pod uses a Kubernetes service account token, which is federated with Azure AD via OIDC. Azure AD issues an access token without needing a client secret in the pod","The pod acquires a token from the AKS cluster's managed identity","The pod uses certificate-based authentication stored in Azure Key Vault"],answer:1,explanation:"Azure AD Workload Identity (replacing Pod Identity) uses OIDC federation: AKS acts as an OIDC provider. A Kubernetes service account is federated with an Azure AD application. The pod presents a Kubernetes service account JWT to Azure AD (using MSAL), which validates it via the OIDC endpoint and issues an Azure access token. No secrets needed in the pod.",difficulty:"Hard"},
{q:"A client application uses the OAuth 2.0 Implicit flow to get tokens directly in the URL fragment. Microsoft has deprecated the Implicit flow. Why?",options:["Implicit flow does not support refresh tokens — users must log in every hour","Implicit flow exposes access tokens in browser history, referrer headers, and server logs via the URL fragment — it is vulnerable to token leakage. Authorization Code with PKCE is the secure replacement for SPAs","Implicit flow doesn't support Azure AD tenants — only Microsoft personal accounts","Implicit flow has been deprecated because it doesn't support multi-factor authentication"],answer:1,explanation:"Implicit flow returns tokens in the URL fragment (e.g., #access_token=...). Tokens in fragments/URLs are exposed in browser history, referrer headers, server access logs, and debugging proxies. The OAuth 2.0 Security Best Current Practices document recommends abandoning Implicit flow. Authorization Code with PKCE returns an authorization code (not the token) in the URL, and the actual token exchange happens via a secure back-channel POST request.",difficulty:"Hard"},
{q:"An organization requires that Azure Key Vault keys can only be used from specific virtual networks and public IP ranges. Which feature enforces this network-level restriction?",options:["Azure AD Conditional Access policy targeting the Key Vault service","Key Vault network firewall and virtual network service endpoints — restrict data-plane access to specific VNets and IP ranges","Azure Private Endpoint with no public access","Key Vault soft delete with purge protection"],answer:1,explanation:"Key Vault has a network firewall configuration allowing you to restrict data-plane access to specific VNets (via service endpoints or private endpoints) and public IP ranges. Requests from non-allowed network locations are rejected at the network layer. For complete private access, use Private Endpoint and disable public access entirely.",difficulty:"Medium"},
{q:"A service uses Microsoft Graph with delegated permissions. The access token expires. The application tries AcquireTokenSilent, which fails with InteractionRequiredException. What must happen next?",options:["Retry AcquireTokenSilent 3 more times with exponential backoff","Trigger an interactive authentication (login prompt) — the user's refresh token has expired or been revoked, requiring the user to re-authenticate","Call the client credentials flow to get a token without user interaction","Increase the token lifetime in Azure AD to prevent expiry"],answer:1,explanation:"InteractionRequiredException means MSAL cannot silently refresh the token — the refresh token is missing, expired, or revoked. For delegated (user) flows, user interaction is required. The app must call AcquireTokenInteractive() to prompt the user to sign in again. This cannot be bypassed silently — only client credentials flow (application permissions) works without user interaction.",difficulty:"Medium"},
{q:"You need to call an Azure REST API from a GitHub Actions workflow without storing Azure credentials as secrets in GitHub. Which approach eliminates stored credentials?",options:["Store the Azure service principal client secret as a GitHub Actions secret","Use Azure AD Workload Identity Federation (OIDC) — configure GitHub as a federated identity provider in an Azure AD app registration. The GitHub Actions workflow gets a short-lived OIDC token from GitHub and exchanges it for an Azure access token","Use Azure Managed Identity — GitHub Actions supports managed identities natively","Generate a SAS token for the Azure REST API and store it in GitHub secrets"],answer:1,explanation:"Azure AD Workload Identity Federation with GitHub Actions: configure the Azure AD app/managed identity to trust GitHub's OIDC provider. The workflow uses the azure/login action with OIDC — it requests a JWT from GitHub, exchanges it with Azure AD for an access token. No client secret or certificate is stored in GitHub. This is the recommended approach for secretless CI/CD.",difficulty:"Hard"},
{q:"Azure role assignments have a limit per subscription. What is the limit and what happens when it is reached?",options:["The limit is 100 role assignments per subscription — additional assignments fail silently","The limit is 4,000 role assignments per subscription — additional assignments return an error. Use Azure AD groups to consolidate assignments (assign role to group, add users to group)","The limit is unlimited — Azure RBAC scales automatically","The limit is 2,000 assignments and excess assignments are queued"],answer:1,explanation:"Azure supports up to 4,000 role assignments per subscription (including inherited assignments from management groups). When the limit is reached, new role assignments fail. Best practice: assign roles to Azure AD groups rather than individual users, reducing the number of role assignments needed while still granting access to many users.",difficulty:"Hard"},
{q:"An Azure Function processes sensitive data. You configure the Function's application settings to reference a Key Vault secret using the @Microsoft.KeyVault(SecretUri=...) syntax. At runtime, the Function cannot resolve the secret. What is the most likely cause?",options:["Key Vault secret references are only supported in Azure App Service, not Azure Functions","The managed identity on the Function App does not have 'Key Vault Secrets User' role on the Key Vault","The Key Vault URI format must use VaultName instead of SecretUri syntax","Application settings with Key Vault references are only supported in the Premium plan"],answer:1,explanation:"Key Vault references in Azure Functions (and App Service) require the Function App's managed identity (system or user-assigned) to have data-plane access to the Key Vault. Assign 'Key Vault Secrets User' role (RBAC model) or add a Get access policy (legacy model) for the managed identity. Also ensure the Key Vault network firewall allows access from the Function App.",difficulty:"Hard"},
{q:"An Azure AD application needs different levels of access for different users — some users are admins (full CRUD), others are read-only. How do you implement this in Azure AD?",options:["Use separate Azure AD tenants for admin and read-only users","Define App Roles in the App Registration (e.g., 'Admin', 'Reader') and assign users or groups to specific app roles. The roles appear in the roles claim of the access token for authorization checks in the app","Configure Conditional Access policies to restrict admin operations to specific users","Use Azure RBAC custom roles scoped to the application"],answer:1,explanation:"App Roles allow you to define permission levels within your application (e.g., 'Admin', 'Reader') in the App Registration manifest. Users are assigned to roles either directly or via group assignments. The assigned roles appear in the roles claim of the JWT access token. Your API reads this claim to authorize operations, keeping authorization logic in your app rather than Azure infrastructure.",difficulty:"Hard"},
{q:"You need to connect an Azure Virtual Machine to an Azure SQL Database without exposing any credentials or using passwords. The VM has a system-assigned managed identity. What must be configured on the SQL side?",options:["Create a SQL login with the same name as the managed identity and grant it permissions","Add the VM's managed identity as an Azure AD user in the SQL database: CREATE USER [vm-name] FROM EXTERNAL PROVIDER; then grant appropriate SQL permissions","Configure the SQL Server firewall to allow the VM's IP address — this eliminates credential requirements","Use SQL Server authentication with the managed identity's client ID as username"],answer:1,explanation:"For managed identity SQL access: 1) Enable Azure AD authentication on the SQL server (set an Azure AD admin). 2) In the SQL database, create a contained user for the managed identity: CREATE USER [VM-name] FROM EXTERNAL PROVIDER. 3) Grant SQL permissions: ALTER ROLE db_datareader ADD MEMBER [VM-name]. The VM then acquires an Azure AD token for SQL and connects without a password.",difficulty:"Hard"},
{q:"Your company's security policy requires all access tokens to be revoked when an employee leaves. You revoke the user's refresh token in Azure AD. The user has an access token issued 45 minutes ago with 1-hour TTL. How long can they continue accessing APIs?",options:["Access stops immediately — revoking refresh tokens also invalidates all existing access tokens","The user can continue for up to 15 more minutes (until the access token expires) unless CAE is in use with a CAE-capable resource","Access continues for exactly 1 hour from initial token issuance — refresh token revocation only prevents new token issuance","The user can continue indefinitely — access tokens are bearer tokens that cannot be revoked"],answer:1,explanation:"Revoking refresh tokens prevents the acquisition of new access tokens. However, the existing access token (a self-contained JWT) remains valid until its expiry. With 45 minutes elapsed on a 1-hour token, the user has ~15 minutes of continued access. Continuous Access Evaluation (CAE) with capable resources enables near-real-time revocation of active sessions.",difficulty:"Hard"}
]},

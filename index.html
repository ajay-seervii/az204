<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZ-204 Exam Prep Hub</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --azure:#0078D4;--azure-dark:#005a9e;--azure-xdark:#003f73;--azure-light:#deecf9;--azure-pale:#f0f6ff;
  --bg:#f4f6f9;--surface:#fff;--nav-bg:#1a1f36;--border:#d0d7de;--border-light:#e8ecf0;
  --text:#1a1f36;--text-muted:#6b7280;--text-light:#9ca3af;
  --ok-bg:#ecfdf5;--ok-bdr:#10b981;--ok-txt:#065f46;
  --err-bg:#fef2f2;--err-bdr:#ef4444;--err-txt:#991b1b;
  --warn-bg:#fffbeb;--warn-bdr:#fbbf24;--warn-txt:#92400e;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'Consolas','Cascadia Code','Courier New',monospace;
  --r:10px;--rs:6px;--sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);--shm:0 4px 12px rgba(0,0,0,.12)
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

/* NAV */
#top-nav{background:var(--nav-bg);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.35)}
.nav-brand{display:flex;align-items:center;gap:10px;color:#fff;font-weight:600;font-size:16px;cursor:pointer;text-decoration:none}
.nav-brand-icon{width:30px;height:30px;background:var(--azure);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:17px}
.nav-badge{background:var(--azure);color:#fff;font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600}
.nav-stats{display:flex;gap:18px}
.nav-stat{color:rgba(255,255,255,.55);font-size:12px}.nav-stat strong{color:#fff}
.nav-actions{display:flex;align-items:center;gap:10px}
.btn-nav{padding:.4rem 1rem;border-radius:var(--rs);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-nav-outline{background:transparent;color:#e2e8f0;border:1px solid rgba(255,255,255,.25)}
.btn-nav-outline:hover{background:rgba(255,255,255,.1);text-decoration:none}
.btn-nav-primary{background:var(--azure);color:#fff;border:1px solid var(--azure)}
.btn-nav-primary:hover{background:var(--azure-dark);text-decoration:none}

/* VIEWS */
.view{display:none}.view.active{display:block}
.fade{animation:fadeIn .22s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* HOME */
#view-home{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem}
.hero{background:linear-gradient(135deg,#1a1f36 0%,#2d3561 100%);color:#fff;border-radius:14px;padding:2.5rem;margin-bottom:2.5rem;position:relative;overflow:hidden}
.hero::before{content:'AZ-204';position:absolute;right:-8px;top:50%;transform:translateY(-50%);font-size:110px;font-weight:900;color:rgba(255,255,255,.04);letter-spacing:-4px;pointer-events:none;user-select:none}
.hero h1{font-size:26px;font-weight:700;margin-bottom:6px}
.hero p{color:rgba(255,255,255,.65);font-size:14px;margin-bottom:1.75rem}
.hero-stats{display:flex;gap:2.5rem;flex-wrap:wrap}
.hstat{text-align:center}
.hstat-n{font-size:30px;font-weight:800;color:#60a5fa;display:block;line-height:1}
.hstat-l{font-size:11px;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
.sec-title{font-size:19px;font-weight:700;margin-bottom:1.25rem;display:flex;align-items:center;gap:10px;color:var(--text)}
.sec-title span{flex:1;height:1px;background:var(--border-light);display:block}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:13px;margin-bottom:3rem}
.topic-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;box-shadow:var(--sh)}
.topic-card:hover{transform:translateY(-2px);box-shadow:var(--shm);border-color:var(--azure)}
.topic-icon{margin-bottom:10px;display:block;width:26px;height:26px}
.topic-icon svg{display:block;width:26px;height:26px}
.topic-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;line-height:1.4}
.topic-meta{font-size:11px;color:var(--text-muted)}
.sec-sub{font-size:13px;color:var(--text-muted);margin:-0.75rem 0 1.25rem}
.test-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:13px}
.test-pills{display:flex;flex-wrap:wrap;gap:4px}
.test-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;box-shadow:var(--sh)}
.test-card:hover{transform:translateY(-2px);box-shadow:var(--shm);border-color:#7c3aed}
.test-num{font-size:22px;font-weight:800;color:#7c3aed;margin-bottom:4px}
.test-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:8px}
.pill{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;margin-right:4px}
.pill-purple{background:#f5f3ff;color:#7c3aed}
.pill-amber{background:#fef3c7;color:#92400e}

/* QUIZ VIEW */
#view-quiz{max-width:860px;margin:0 auto;padding:1.5rem}
.quiz-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px}
.back-btn{display:flex;align-items:center;gap:5px;background:none;border:1px solid var(--border);border-radius:var(--rs);padding:6px 13px;font-size:13px;cursor:pointer;color:var(--text-muted);transition:background .15s,border-color .15s,color .15s;font-family:var(--font)}
.back-btn:hover{background:var(--surface);border-color:var(--azure);color:var(--azure)}
.quiz-label{font-size:14px;font-weight:600;color:var(--text)}
.timer-badge{font-family:var(--mono);font-size:14px;font-weight:700;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rs);padding:5px 13px;color:var(--text-muted);transition:color .3s,border-color .3s,background .3s}
.timer-badge.warn{color:var(--warn-txt);border-color:var(--warn-bdr);background:var(--warn-bg)}
.timer-badge.danger{color:var(--err-txt);border-color:var(--err-bdr);background:var(--err-bg);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}
.qdots{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:1rem}
.qdot{width:27px;height:27px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface);font-size:10px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:background .12s,border-color .12s}
.qdot:hover{border-color:var(--azure)}
.qdot.cur{border-color:var(--azure);color:var(--azure);font-weight:900;background:var(--azure-pale);border-width:3px}
.qdot.ok{background:var(--ok-bg);border-color:var(--ok-bdr);color:var(--ok-txt);border-style:double;border-width:3px}
.qdot.bad{background:var(--err-bg);border-color:var(--err-bdr);color:var(--err-txt);border-style:dashed}
.prog-wrap{background:var(--border-light);border-radius:4px;height:5px;margin-bottom:.6rem}
.prog-fill{background:var(--azure);border-radius:4px;height:5px;transition:width .4s ease}
.prog-text{font-size:12px;color:var(--text-muted);margin-bottom:1.25rem}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem;box-shadow:var(--sh)}
.q-meta{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap}
.q-num{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted)}
.diff-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em}
.diff-medium{background:#fef3c7;color:#92400e}
.diff-hard{background:#fee2e2;color:#991b1b}
.topic-lbl{font-size:10px;color:var(--text-muted);background:var(--bg);padding:2px 8px;border-radius:20px;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-text{font-size:15px;color:var(--text);line-height:1.65;margin-bottom:1rem}
.q-code{background:#1e1e2e;color:#cdd6f4;border-radius:var(--rs);padding:1rem 1.25rem;font-family:var(--mono);font-size:12.5px;white-space:pre;overflow-x:auto;margin-bottom:1rem;line-height:1.6;border:1px solid #313244}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{display:block;width:100%;text-align:left;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rs);padding:.7rem 1rem;cursor:pointer;font-size:14px;color:var(--text);line-height:1.5;transition:background .12s,border-color .12s;font-family:var(--font)}
.opt:hover:not(:disabled){background:var(--azure-pale);border-color:var(--azure)}
.opt.correct{background:var(--ok-bg);border-color:var(--ok-bdr);color:var(--ok-txt);font-weight:500}
.opt.wrong{background:var(--err-bg);border-color:var(--err-bdr);color:var(--err-txt)}
.opt.revealed{background:var(--ok-bg);border-color:var(--ok-bdr);color:var(--ok-txt)}
.opt:disabled{cursor:default}
.opt-lbl{display:inline-block;width:22px;font-weight:700;color:var(--text-muted)}
.opt.correct .opt-lbl,.opt.revealed .opt-lbl{color:var(--ok-txt)}
.opt.wrong .opt-lbl{color:var(--err-txt)}
.opt-indicator{float:right;font-weight:900;font-size:16px;line-height:1.5;margin-left:8px}
.opt-check{color:var(--ok-txt)}.opt-cross{color:var(--err-txt)}
.expl{background:var(--azure-pale);border-left:3px solid var(--azure);border-radius:0 var(--rs) var(--rs) 0;padding:.85rem 1rem;margin-top:1rem;font-size:13px;color:#334155;line-height:1.65;display:none}
.expl.show{display:block}
.expl-hdr{font-weight:700;font-size:13px;margin-bottom:5px}
.expl-hdr.ok{color:var(--ok-txt)}.expl-hdr.bad{color:var(--err-txt)}
.nav-row{display:flex;gap:9px;flex-wrap:wrap;margin-top:.75rem}
.btn{padding:.5rem 1.25rem;border-radius:var(--rs);font-size:14px;cursor:pointer;font-family:var(--font);font-weight:500;transition:background .12s,transform .08s;border:1.5px solid var(--border);background:var(--surface);color:var(--text)}
.btn:hover{background:var(--bg)}.btn:active{transform:scale(.98)}
.btn-primary{background:var(--azure);color:#fff;border-color:var(--azure)}.btn-primary:hover{background:var(--azure-dark);border-color:var(--azure-dark)}
.btn-purple{background:#7c3aed;color:#fff;border-color:#7c3aed}.btn-purple:hover{background:#6d28d9;border-color:#6d28d9}

/* SCORE */
.score-wrap{padding-bottom:3rem}
.pass-banner{border-radius:var(--r);padding:1.75rem;text-align:center;margin-bottom:1.5rem}
.pass-banner.pass{background:var(--ok-bg);border:1.5px solid var(--ok-bdr)}
.pass-banner.fail{background:var(--err-bg);border:1.5px solid var(--err-bdr)}
.pass-banner.close{background:var(--warn-bg);border:1.5px solid var(--warn-bdr)}
.pb-icon{font-size:38px;margin-bottom:8px}
.pb-pct{font-size:52px;font-weight:900;line-height:1;margin-bottom:6px}
.pass-banner.pass .pb-pct{color:var(--ok-txt)}.pass-banner.fail .pb-pct{color:var(--err-txt)}.pass-banner.close .pb-pct{color:var(--warn-txt)}
.pb-lbl{font-size:15px;font-weight:700}
.pass-banner.pass .pb-lbl{color:var(--ok-txt)}.pass-banner.fail .pb-lbl{color:var(--err-txt)}.pass-banner.close .pb-lbl{color:var(--warn-txt)}
.pb-sub{font-size:13px;color:var(--text-muted);margin-top:4px}
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem}
.sstat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem;text-align:center}
.sstat-n{font-size:26px;font-weight:800;display:block}.sstat-l{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-top:4px}
.sstat.good .sstat-n{color:var(--ok-txt)}.sstat.bad .sstat-n{color:var(--err-txt)}.sstat.neu .sstat-n{color:var(--azure)}
.topic-bkdn{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1.5rem}
.topic-bkdn h3{font-size:13px;font-weight:700;margin-bottom:1rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted)}
.tbrow{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:12px}
.tbrow-name{width:185px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px}
.tbrow-bw{flex:1;background:var(--border-light);border-radius:4px;height:7px}
.tbrow-bar{height:7px;border-radius:4px;transition:width .6s ease}
.tbrow-bar.low{background:#ef4444}.tbrow-bar.mid{background:#f59e0b}.tbrow-bar.hi{background:#10b981}
.tbrow-pct{width:38px;text-align:right;font-weight:700;font-size:11px;color:var(--text)}
.score-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:1.5rem}

/* INLINE SVG SIZING — prevent topic SVGs from expanding to default 300px */
.quiz-label svg{width:18px;height:18px;vertical-align:middle;display:inline-block;flex-shrink:0}
.topic-lbl svg{width:14px;height:14px;vertical-align:middle;display:inline-block;flex-shrink:0}

/* RESPONSIVE */
@media(max-width:640px){
  .hero h1{font-size:20px}.hero-stats{gap:1.5rem}
  .score-grid{grid-template-columns:repeat(3,1fr);gap:8px}
  .tbrow-name{width:110px}
  #view-quiz{padding:1rem}.q-card{padding:1rem}
  .nav-stats{display:none}
  .nav-badge{display:none}
}
</style>

<script>
const TOPICS={"App Service & Azure Functions":{icon:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='3'/><path d='M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42'/></svg>",color:"#0078D4",questions:[
{q:"A company deploys an Azure App Service web app on a Standard S2 plan. Auto-scale is configured with a scale-out rule triggering at 70% CPU for 10 minutes. During a spike, CPU hits 90% for 3 minutes then drops to 40%. Which outcome is correct?",options:["App scales out immediately when CPU hits 90%","App does not scale out because the condition was not sustained for 10 minutes","App scales out after 3 minutes and stays scaled until manually reduced","Auto-scale fails because CPU fluctuated"],answer:1,explanation:"Auto-scale rules require the metric threshold to be sustained for the entire configured duration. Since CPU only stayed above 70% for 3 of the required 10 minutes, no scale-out occurs.",difficulty:"Hard"},
{q:"You have an Azure Function with a ServiceBusTrigger on a queue. The function must process exactly once, but you discover duplicate processing during partition rebalancing. What is the BEST fix?",options:["Set maxConcurrentCalls to 1 in host.json","Use Sessions on the Service Bus queue and enable session support on the trigger","Change to a Storage Queue trigger","Add a Singleton attribute to the function class"],answer:1,explanation:"Service Bus sessions guarantee FIFO and exactly-once processing per session. Enabling sessions ensures messages with the same session ID are processed sequentially by one instance, eliminating duplicates during rebalancing.",difficulty:"Hard"},
{q:"An App Service deployment slot swap is performed between staging and production. After the swap, users report the app is connecting to the staging database instead of production. What is the MOST LIKELY cause?",options:["Connection strings marked as 'Deployment slot setting' stay with the slot and swapped to production","Connection strings NOT marked as 'Deployment slot setting' swapped along with the app code","The swap did not complete successfully","Slot settings require Premium tier to function correctly"],answer:0,explanation:"Settings marked as 'Deployment slot setting' (sticky) stay with the slot they are configured on and do NOT swap with the deployment. If the staging DB connection string was sticky, it traveled with the staging config post-swap, so production now uses the staging DB.",difficulty:"Hard"},
{q:"A Durable Function orchestrator must call ActivityA, then in parallel call ActivityB and ActivityC, then call ActivityD after both complete. What replaces the ??? in the orchestrator?",q_code:"var a = await ctx.CallActivityAsync(\"ActivityA\", null);\n???\nawait ctx.CallActivityAsync(\"ActivityD\", null);",options:["var b = await ctx.CallActivityAsync(\"ActivityB\",null);\nvar c = await ctx.CallActivityAsync(\"ActivityC\",null);","var tasks = new[]{ctx.CallActivityAsync(\"ActivityB\",null),ctx.CallActivityAsync(\"ActivityC\",null)};\nawait Task.WhenAll(tasks);","await ctx.CallActivityAsync(\"ActivityB\",null);\nawait ctx.CallActivityAsync(\"ActivityC\",null);","ctx.StartNewOrchestration(\"ActivityB\"); ctx.StartNewOrchestration(\"ActivityC\");"],answer:1,explanation:"Fan-out/fan-in in Durable Functions uses Task.WhenAll() on a list of activity tasks started without individual awaits. Options A and C await sequentially. Option D is wrong API usage.",difficulty:"Hard"},
{q:"An Azure Function on a Consumption plan has functionTimeout set to 15 minutes in host.json, but the function still times out at 10 minutes. Why?",options:["Consumption plan hard-limits function execution to 10 minutes regardless of host.json","WEBSITE_RUN_FROM_PACKAGE must be enabled to apply timeout changes","You need to restart the Function App after changing host.json","The timeout applies only to HTTP-triggered functions"],answer:0,explanation:"On Consumption plan, the maximum allowed timeout is 10 minutes (600 seconds). Even if you set functionTimeout higher in host.json, the platform enforces the 10-minute cap. Switch to Premium or Dedicated plan to exceed this.",difficulty:"Hard"},
{q:"Your App Service web app needs to read a Key Vault secret using system-assigned managed identity. What is the MINIMUM required Key Vault access configuration?",options:["Assign 'Key Vault Contributor' role to the managed identity","Grant the managed identity 'Get' permission on secrets via access policy, or assign 'Key Vault Secrets User' RBAC role","Add the app's client ID and secret to App Settings","Assign 'Key Vault Administrator' role to the managed identity"],answer:1,explanation:"The minimum is 'Get' on Secrets via access policy or the 'Key Vault Secrets User' RBAC role. 'Key Vault Contributor' is management-plane only — it does NOT grant data plane access to read secrets.",difficulty:"Hard"},
{q:"An HTTP-triggered Azure Function returns inconsistent results under high load. A static HttpClient is being used. A colleague says to create a new HttpClient per request. Is your colleague correct?",options:["Yes — static HttpClient causes thread-safety issues","No — static HttpClient avoids socket exhaustion; the correct fix is IHttpClientFactory","Yes — static HttpClient does not respect DNS changes so recreate it each request","No — HttpClient is thread-safe only when static"],answer:1,explanation:"Creating a new HttpClient per request causes socket exhaustion (TIME_WAIT). Static HttpClient avoids that but can have stale DNS. The correct pattern is IHttpClientFactory, which pools handlers with proper DNS TTL rotation.",difficulty:"Hard"},
{q:"You need a Timer trigger that fires at minute 0, 5, 10, ... of every hour. Which NCRONTAB expression is correct?",options:["0 */5 * * * *","*/5 * * * * *","0 0/5 * * * *","0 5 * * * *"],answer:0,explanation:"Azure Functions NCRONTAB: {second} {minute} {hour} {day} {month} {weekday}. '0 */5 * * * *' fires at second 0, every 5th minute. '*/5 * * * * *' fires every 5 seconds.",difficulty:"Medium"},
{q:"An App Service app running on B1 (Basic) plan needs deployment slots for blue/green deployments. What must you do first?",options:["Enable Always On in the app configuration","Upgrade to Standard S1 or higher — slots require Standard tier or above","Enable ARR Affinity to support multiple slots","Add WEBSITE_SWAP_WARMUP_PING_PATH to app settings"],answer:1,explanation:"Deployment slots are only available on Standard, Premium, and Isolated tiers. Basic (B1) does not support slots.",difficulty:"Medium"},
{q:"A company needs App Service to scale on a custom metric from Application Insights. Which scaling approach supports this?",options:["Built-in auto-scale with App Insights metrics is natively supported in Standard plan","Azure Monitor custom metrics-based auto-scale rules using the custom metric namespace","You must use Azure Functions with KEDA","Custom metric scaling requires AKS"],answer:1,explanation:"Azure Monitor auto-scale supports custom metrics from any Azure Monitor source including Application Insights. Create a scale rule targeting the custom metric namespace. Supported on Standard and above App Service plans.",difficulty:"Hard"},
{q:"You configure VNet Integration on your App Service but the app still cannot reach a VM at 10.0.0.5. DNS resolves correctly. What is the MOST LIKELY missing configuration?",options:["The app needs a private endpoint, not VNet Integration","WEBSITE_VNET_ROUTE_ALL must be set to 1 to route all outbound traffic through the VNet","The App Service plan must be in the same region as the VNet","The managed identity must have Network Contributor role on the VNet"],answer:1,explanation:"By default, VNet Integration only routes RFC-1918 traffic through the VNet. Setting WEBSITE_VNET_ROUTE_ALL=1 forces all outbound traffic through the VNet integration, typically needed for full private access.",difficulty:"Hard"},
{q:"An Azure Durable Function replays history. A developer notices DateTime.UtcNow inside the orchestrator returns a different value than during the original execution. What is wrong?",options:["DateTime.UtcNow is not supported in orchestrators; use DateTimeOffset instead","Orchestrators must use ctx.CurrentUtcDateTime to ensure determinism during replay","The orchestrator should be marked with [Deterministic] attribute","This is expected and does not affect correctness"],answer:1,explanation:"Durable Functions replays orchestrator code using stored history. Calling DateTime.UtcNow returns different values on replay, breaking determinism. Always use ctx.CurrentUtcDateTime which returns the timestamp stored in history.",difficulty:"Hard"},
{q:"An Azure Function uses a Storage Queue trigger. Messages appear more than once due to network retries. You want each message processed exactly once. What is the BEST approach?",options:["Set visibilityTimeout to 0 in host.json","Implement idempotency using a deduplication key in Table Storage or Cosmos DB","Use a Service Bus queue, which guarantees exactly-once delivery","Set maxDequeueCount to 1 in host.json"],answer:1,explanation:"Storage Queues guarantee at-least-once delivery. maxDequeueCount to 1 just dead-letters after first failure, not deduplication. The correct approach is idempotent processing using a deduplication store.",difficulty:"Hard"},
{q:"An App Service web app has a free managed certificate for a custom domain. After 6 months, users report SSL errors. What most likely happened?",options:["Free managed certificates are only valid for 3 months and must be manually renewed","The App Service Plan was scaled down, causing certificate expiry","Free managed certificates auto-renew but require the DNS A/CNAME record to still resolve to the app","Free managed certificates do not support custom domains"],answer:2,explanation:"App Service free managed certificates auto-renew, but renewal requires domain validation — the DNS record must still point to the App Service. If DNS was changed, renewal fails silently and the certificate expires.",difficulty:"Hard"},
{q:"Callers receive empty responses from this Azure Function even though request body has valid JSON. What is wrong?",q_code:"public static async Task<IActionResult> Run(\n  [HttpTrigger(AuthorizationLevel.Function, \"post\")] HttpRequest req) {\n  var body = await new StreamReader(req.Body).ReadToEndAsync();\n  return new OkObjectResult(body);\n}",options:["req.Body can be consumed by binding pipeline before your code; call req.EnableBuffering() and reset Position=0","StreamReader should be wrapped in a using statement","The HttpTrigger binding must specify \"*\" as the route","req.Body is always empty for POST requests in Functions v4"],answer:0,explanation:"In certain Azure Functions middleware configurations, req.Body can be consumed before your code runs. Call req.EnableBuffering() and reset req.Body.Position = 0 before reading, or use the binding-provided deserialized model.",difficulty:"Hard"},
{q:"A company needs containerized apps with per-second billing, no infrastructure management, and multiple containers sharing a network. Which service is MOST appropriate?",options:["Azure App Service with Docker","Azure Container Instances with a container group","AKS with a node pool","Azure Container Apps with a container app environment"],answer:1,explanation:"ACI supports per-second billing, zero infrastructure management, and container groups where multiple containers share the same network namespace. AKS has infrastructure overhead. App Service Docker does not offer per-second billing.",difficulty:"Medium"},
{q:"An Azure Function reads a Cosmos DB document and writes to a Storage Queue using output bindings. Under heavy load, duplicate queue messages appear. What is the root cause?",options:["Cosmos DB and Queue output bindings cannot be used together","Functions retry on transient failures after partial execution — if the function crashes after the queue write but before completion, the runtime retries, writing a second queue message","The Cosmos DB change feed trigger causes duplicate invocations by design","Queue output bindings do not guarantee delivery under load"],answer:1,explanation:"Functions guarantee at-least-once execution. If a function crashes after the queue message is written but before Azure marks it complete, the runtime retries the function, causing the queue write to execute again.",difficulty:"Hard"},
{q:"You need to route 10% of traffic to a new App Service deployment slot for canary testing. Which feature enables this?",options:["Application Gateway weighted routing rules","App Service Traffic Routing (slot percentage split) in deployment slot configuration","Azure Front Door origin group weights","Azure Traffic Manager weighted routing"],answer:1,explanation:"App Service has built-in traffic splitting via the Traffic Routing feature on deployment slots. You can direct a percentage of production traffic to a staging slot without an external load balancer.",difficulty:"Medium"},
{q:"After deploying a new version of a Function App using Cosmos DB trigger, events from the past 2 days are reprocessed. What caused this?",options:["Cosmos DB container TTL expired causing events to reappear in the change feed","The leases container was deleted or recreated, so the trigger lost its checkpoint and started from the beginning","Cosmos DB change feed has a 2-day replay window by default","The new version used a different FunctionName causing a new lease group"],answer:1,explanation:"The Cosmos DB trigger stores checkpoint state in a leases container. If deleted or recreated, the trigger loses its position and replays from the start. Always preserve the leases container across deployments.",difficulty:"Hard"},
{q:"You need to implement a retry policy for an HTTP call inside an Azure Durable Function orchestrator. Which approach is correct?",options:["Wrap the HttpClient call in try/catch with Task.Delay for retries inside the orchestrator","Use ctx.CallActivityWithRetryAsync() with a RetryOptions object","Add a Polly retry policy to the HttpClient in DI","Set retry in the host.json retryOptions section"],answer:1,explanation:"In Durable Functions, retries using Task.Delay violate determinism rules. ctx.CallActivityWithRetryAsync() handles retries durably, storing each attempt in history, with configurable backoff via RetryOptions.",difficulty:"Hard"},
{q:"An App Service plan hosts 5 apps. One app has a memory leak consuming all available RAM, degrading all apps. What is the BEST mitigation without changing app code?",options:["Enable Always On for all apps","Move the leaking app to its own App Service plan","Scale out the App Service plan to add more instances","Enable auto-heal with a memory trigger to restart the leaking app process"],answer:3,explanation:"Auto-heal lets you configure triggers (e.g., private bytes threshold) that automatically restart the worker process. This directly addresses the leak without code changes or increased cost.",difficulty:"Hard"},
{q:"A .NET 6 Azure Function using the isolated worker model runs in Azure. The function uses DefaultAzureCredential and calls a downstream API returning 401. Local testing works fine. What is the MOST LIKELY cause?",options:["DefaultAzureCredential is not supported in isolated worker model","The Function App does not have a managed identity enabled, so DefaultAzureCredential falls back to environment credentials which are not configured in Azure","AZURE_CLIENT_ID must be set even when using system-assigned managed identity","The isolated worker model requires explicit AzureCliCredential in production"],answer:1,explanation:"DefaultAzureCredential tries credentials in order: environment, managed identity, Visual Studio, Azure CLI, etc. Locally it uses Azure CLI. In Azure, if no managed identity is enabled and no env vars are set, it finds no valid credential. Enable system-assigned managed identity on the Function App.",difficulty:"Hard"},
{q:"You need an App Service app to access an on-premises SQL Server securely without exposing the server to the internet. Which is correct?",options:["VNet Integration + ExpressRoute or VPN Gateway","Hybrid Connections (Azure Relay) installed on the on-premises machine","Private Endpoint on the App Service + VPN Gateway","Service Endpoint on the subnet + Azure Route Table"],answer:1,explanation:"Hybrid Connections use Azure Relay (outbound HTTPS port 443 from on-premises) to create a secure tunnel with no VPN or firewall changes on-premises. The Hybrid Connection Manager agent runs on the on-premises machine.",difficulty:"Hard"},
{q:"A Function App has FUNCTIONS_WORKER_RUNTIME='dotnet' and runtime ~4. A function uses .NET 7. What happens?",options:["It runs normally since .NET 7 is backward compatible with the ~4 runtime","The function fails to load — in-process dotnet ~4 runtime supports .NET 6 LTS only; .NET 7 requires the isolated worker model","You must set FUNCTIONS_EXTENSION_VERSION to ~7 to run .NET 7","Consumption plan does not support .NET 7"],answer:1,explanation:"Azure Functions v4 in-process model ('dotnet') is locked to .NET 6. To run .NET 7 or .NET 8, use the isolated worker model by setting FUNCTIONS_WORKER_RUNTIME to 'dotnet-isolated'.",difficulty:"Hard"},
{q:"A Service Bus-triggered function has maxConcurrentCalls=16 and prefetchCount=100 in host.json. Messages are processed out of order and some are abandoned. What is the MOST LIKELY cause?",q_code:"\"serviceBus\": { \"maxConcurrentCalls\": 16, \"prefetchCount\": 100 }",options:["prefetchCount greater than maxConcurrentCalls causes lock expiry on prefetched messages before they are processed","maxConcurrentCalls must equal prefetchCount for correct operation","Service Bus triggers do not support prefetchCount in host.json","Out-of-order processing happens because the queue is not partitioned"],answer:0,explanation:"When prefetchCount (100) greatly exceeds maxConcurrentCalls (16), 84 messages are locked but waiting. If processing is slow, lock duration expires before those messages are processed, causing them to reappear — leading to out-of-order processing and apparent abandonment.",difficulty:"Hard"},
{q:"You want to use Azure App Configuration with feature flags and reload configuration without restarting the app. What is the RECOMMENDED approach?",options:["Poll App Configuration every 30 seconds using a background timer","Use the App Configuration provider with sentinel key refresh — register UseAzureAppConfiguration middleware with a sentinel key","Read App Configuration values via HttpClient in each controller action","Use Event Grid to trigger a Function that updates App Settings on change"],answer:1,explanation:"App Configuration supports dynamic refresh via a sentinel key pattern. The middleware checks the sentinel key on each request (cached with TTL). When the sentinel changes, the full config refreshes with no restart needed.",difficulty:"Hard"},
{q:"A Premium plan Azure Function processes video files taking 25-40 minutes each. What is the MINIMUM configuration change required?",options:["Set functionTimeout to 00:40:00 — Premium plan supports up to 60 minutes by default","Set functionTimeout to -1 in host.json for unlimited execution time on Premium plan","Upgrade to Dedicated plan — Premium plan has a 30-minute hard cap","Enable WEBSITE_RUN_FROM_PACKAGE and set functionTimeout to 2400"],answer:1,explanation:"On Premium and Dedicated plans, functionTimeout can be set to -1 for unlimited execution. Premium plan does NOT have a 30-minute hard cap — the default is 30 minutes but it can be extended to unlimited.",difficulty:"Hard"},
{q:"You deploy an App Service app with WEBSITE_RUN_FROM_PACKAGE=1. A developer FTP-uploads changed .dll files to wwwroot. The change has no effect. Why?",options:["FTP is disabled when WEBSITE_RUN_FROM_PACKAGE is enabled","WEBSITE_RUN_FROM_PACKAGE mounts the app as a read-only zip package; direct wwwroot changes are ignored","The developer must restart the app after FTP upload","FTP uploads only work with the Kudu endpoint, not direct wwwroot"],answer:1,explanation:"WEBSITE_RUN_FROM_PACKAGE=1 mounts the deployment package as a read-only virtual filesystem. Any direct writes to wwwroot are ignored. To update the app, redeploy a new package.",difficulty:"Hard"},
{q:"An orchestrator calls a sub-orchestration 100 times in a loop. The history table grows extremely large and replay becomes slow. What pattern should be applied?",options:["Use ContinueAsNew() after every 10 sub-orchestrations to truncate history","Replace sub-orchestrations with direct activity calls","Increase the Storage account performance tier","Set maxQueuePollingInterval lower in host.json"],answer:0,explanation:"ctx.ContinueAsNew() restarts the orchestrator with fresh history, discarding completed history entries. This prevents unbounded history growth and keeps replay fast for eternal orchestrators or large fan-out loops.",difficulty:"Hard"},
{q:"A Function returns results from Cosmos DB. Under high load, Cosmos DB returns 429 throttle errors, but the function returns 500 to callers. You want the function to return 429 to callers instead. What is the BEST approach?",options:["Set MaxRetryAttemptsOnRateLimitedRequests=0, catch CosmosException with StatusCode 429, return ObjectResult(429)","Add a Polly policy to retry indefinitely until Cosmos DB succeeds","Increase Cosmos DB RU/s to prevent throttling","Return HTTP 503 instead — 429 is not a valid Azure Functions response"],answer:0,explanation:"Set MaxRetryAttemptsOnRateLimitedRequests=0 to disable SDK retries so 429s surface immediately. Catch CosmosException where StatusCode==TooManyRequests and return a 429 ObjectResult to propagate backpressure to callers.",difficulty:"Hard"},
{q:"An App Service app needs 64-bit processes and WebSockets. Both are configured in General Settings. WebSocket connections are rejected with a 403. What is the MOST LIKELY cause?",options:["64-bit mode is incompatible with WebSockets in App Service","WebSockets are blocked at the networking layer by default; add an inbound IP restriction rule for WS protocol","The App Service Plan is on Basic tier which does not support WebSockets","The app is behind an Application Gateway that has WebSocket support disabled"],answer:3,explanation:"App Service supports WebSockets when enabled. However, if the app is behind Application Gateway or Front Door, WebSocket support must be explicitly enabled on those services too. A 403 (not 101 Switching Protocols) indicates an intermediary is blocking it.",difficulty:"Hard"},
{q:"A developer gets a compilation error when creating a Function with both HTTP trigger and Blob output binding using 'out string blobContent' parameter. What is wrong?",q_code:"public static async Task<IActionResult> Run(\n  [HttpTrigger] HttpRequest req,\n  [Blob(\"uploads/{rand-guid}\")] out string blobContent)",options:["out parameters are not supported with async methods in C#","The Blob binding must specify FileAccess.Write explicitly","rand-guid token is only valid with IAsyncCollector","The function return type must be void when using out parameters"],answer:0,explanation:"C# does not allow 'out' parameters in async methods — a language constraint, not an Azure Functions limitation. For async blob output, use IAsyncCollector<string> or the [return: Blob(...)] attribute.",difficulty:"Hard"},
{q:"A company wants to alert when Azure Function cold start p95 exceeds 3 seconds. Which approach is correct?",options:["Use the FunctionExecutionCount metric with a threshold filter in Azure Monitor","Cold start is not a native Azure Monitor metric; use Application Insights custom telemetry or analyze FunctionAppLogs in Log Analytics correlated with host startup events","Query Application Insights for requests where operation_Name contains 'coldstart' and duration > 3000ms","Use Live Metrics stream and set a smart detection rule"],answer:1,explanation:"Azure Monitor does not expose a dedicated cold start metric. Track first-request latency via Application Insights custom events, or analyze FunctionAppLogs filtering for host startup events correlated with high first-invocation latency.",difficulty:"Hard"},
{q:"You configure App Service IP restrictions to allow only 203.0.113.0/24. Requests from that CIDR return 403. What is the issue?",options:["App Service IP restrictions only support /32 CIDR masks","The Deny All rule takes precedence; you need an explicit Allow All fallback","When you add an Allow rule, App Service implicitly adds Deny All. If the app is behind a proxy/CDN, App Service sees the proxy IP, not the client IP — failing the Allow rule","IP restrictions require Premium plan"],answer:2,explanation:"Adding an Allow rule causes App Service to implicitly add Deny All with lowest priority. If the app is behind a reverse proxy or CDN, App Service sees the proxy's IP, not the original client IP. The request fails the Allow rule. Fix: add the proxy IP range, or configure X-Forwarded-For handling.",difficulty:"Hard"},
{q:"A Durable Function must wait for human approval for up to 72 hours, auto-rejecting if none arrives. Which implementation is correct?",options:["var approval = await ctx.WaitForExternalEvent<bool>(\"Approval\"); if (!approval) { /* reject */ }","var timeout = ctx.CreateTimer(ctx.CurrentUtcDateTime.AddHours(72), cts.Token);\nvar approval = ctx.WaitForExternalEvent<bool>(\"Approval\");\nvar winner = await Task.WhenAny(approval, timeout);\nif (winner == timeout) { cts.Cancel(); /* auto-reject */ }","await Task.Delay(TimeSpan.FromHours(72));","await ctx.WaitForExternalEvent<bool>(\"Approval\");"],answer:1,explanation:"The correct pattern races ctx.CreateTimer() against WaitForExternalEvent() using Task.WhenAny(). Task.Delay is not deterministic in orchestrators. Always cancel the timer if the event arrives first.",difficulty:"Hard"},
{q:"A Function App in East US uses a Storage Account in West US for its trigger and bindings. What is the impact and recommendation?",options:["No impact; Azure Functions routing handles cross-region transparently","Cross-region Storage access increases trigger polling latency and incurs egress charges; keep the Storage Account in the same region as the Function App","The Function App will fail to trigger because Storage triggers require same-region accounts","Storage Account for triggers must always be in the paired region"],answer:1,explanation:"Azure Functions uses the Storage Account for trigger state (queue messages, blob leases, timer state). Cross-region adds latency to every trigger poll and incurs egress charges. Best practice: same region for Function App and Storage Account.",difficulty:"Hard"},
{q:"You need to deploy a containerized Azure Function that scales to zero when idle. Which hosting option supports this?",options:["AKS with KEDA","Azure Container Apps with Consumption workload profile","Azure Container Instances with a timer-based scaler","App Service with Docker on Basic plan"],answer:1,explanation:"Azure Container Apps with Consumption workload profile supports scale-to-zero for containerized Azure Functions. AKS with KEDA can scale to zero but requires infrastructure management.",difficulty:"Medium"},
{q:"An App Service with Application Insights auto-instrumentation has manual TrackEvent() calls added. Under load, custom events are missing while standard request telemetry is present. What is the MOST LIKELY cause?",options:["TrackEvent() is not supported with auto-instrumentation","The TelemetryClient is not flushed before request completes","Application Insights sampling is configured and dropping custom events while keeping request telemetry","Auto-instrumentation overrides the InstrumentationKey used by the manual TelemetryClient"],answer:2,explanation:"Application Insights adaptive sampling can selectively drop telemetry types. By default, sampling affects custom events and traces more aggressively than requests. Fix: configure sampling exclusions for EventTelemetry.",difficulty:"Hard"},
{q:"A Function App on a Dedicated App Service plan needs to continue running during platform maintenance (OS patching). What setting achieves this?",options:["Enable Always On in the Function App configuration","Set WEBSITE_DISABLE_OVERLAPPED_RECYCLING=1","Upgrade to Premium plan with zone redundancy enabled","Enable Health Check with a custom endpoint"],answer:2,explanation:"Zone redundancy distributes instances across availability zones. During platform maintenance (zone-by-zone), other zones continue serving traffic. Always On only prevents idle timeouts; WEBSITE_DISABLE_OVERLAPPED_RECYCLING affects deployment, not platform maintenance.",difficulty:"Hard"}
]},
"Azure Storage":{icon:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><ellipse cx='12' cy='5' rx='9' ry='3'/><path d='M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5'/><path d='M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3'/></svg>",color:"#00b294",questions:[
{q:"You configure a lifecycle policy with daysAfterLastAccessTimeGreaterThan=30 to move blobs to Cool tier. After 45 days with no access, blobs are NOT being tiered. What is the most likely cause?",options:["Last access time tracking must be explicitly enabled on the storage account before lifecycle policies can use it","The policy only applies to blobs larger than 1 MB","Lifecycle policies using last access time require Premium block blob accounts","The minimum value for daysAfterLastAccessTimeGreaterThan is 90"],answer:0,explanation:"Last access time tracking is not enabled by default. It must be explicitly enabled under Data Management > Lifecycle management before lifecycle policies can use the lastAccessTime condition. Enabling it incurs a small additional cost per read operation tracked.",difficulty:"Hard"},
{q:"You issued a 24-hour SAS token using storage account key1. 6 hours later, you rotate key1 due to a security incident. Can the third party still access storage using the SAS token?",options:["Yes — the SAS has its own expiry and is independent of the signing key","No — rotating the signing key immediately invalidates all SAS tokens signed with that key","Yes — the SAS is valid until its expiry but new tokens must use key2","No — but only after a 15-minute propagation delay"],answer:1,explanation:"Account SAS tokens are signed using an account key. When you regenerate that key, all SAS tokens signed with it are immediately invalidated regardless of their stated expiry. Key rotation is an effective way to mass-revoke SAS tokens.",difficulty:"Hard"},
{q:"You issued 500 SAS tokens to partners, all linked to a stored access policy named 'ReadPolicy'. You need to immediately revoke access for all of them. What is the most efficient approach?",options:["Rotate the storage account key used to sign the SAS tokens","Modify or delete the stored access policy 'ReadPolicy'","Call Delete on each individual SAS token","Set the container to private access to override the SAS tokens"],answer:1,explanation:"SAS tokens linked to a stored access policy inherit the policy's settings. Modifying (e.g., setting expiry to the past) or deleting the stored access policy immediately revokes all linked SAS tokens without rotating the account key or tracking individual tokens.",difficulty:"Hard"},
{q:"A blob is in Archive access tier. An application tries to read it and receives an error. What is the correct way to make the blob readable, and what is the expected wait time with Standard priority for a 5 GB blob?",options:["Archive blobs auto-rehydrate on first read — retry after a few seconds","Set the blob tier to Hot or Cool; Standard priority rehydration can take up to 15 hours","Set the blob tier to Hot or Cool; Standard priority takes 1-3 minutes","Copy the blob to a new container — the copy triggers immediate rehydration"],answer:1,explanation:"Archive blobs cannot be read directly. You must rehydrate by changing the tier to Hot/Cool (tier change operation) or by copying to a new Hot/Cool blob. Standard priority rehydration can take up to 15 hours; High priority under 1 hour for blobs under 10 GB.",difficulty:"Hard"},
{q:"A container has a time-based immutable retention policy set for 7 years with purge protection enabled. A compliance officer needs to delete a blob that was incorrectly uploaded. What are the options?",options:["Delete using the Storage Account key — account keys bypass immutability","Disable the policy, delete the blob, then re-enable","Neither the blob nor container can be deleted until the retention period expires — even Microsoft cannot forcibly delete it","Use Azure Data Box to extract and re-upload a corrected version"],answer:2,explanation:"When purge protection is enabled, the immutable policy cannot be unlocked or deleted until the retention period expires. This applies to the account owner and Microsoft Support. Immutable storage is designed for WORM regulatory compliance where deletion must be provably impossible.",difficulty:"Hard"},
{q:"Container soft delete is enabled with a 14-day retention. A developer accidentally deletes a blob container. How can the container and its blobs be recovered?",options:["Use Azure Backup to restore from a backup","List deleted containers in the portal or SDK, then call Restore — this recovers the container and all blobs within the soft-delete window","Container soft delete does not apply to full containers — only individual blobs","Submit a support ticket to Microsoft"],answer:1,explanation:"Container soft delete retains deleted containers for the configured retention period. You can restore a soft-deleted container via the portal (Storage Account > Containers > Show deleted containers) or programmatically. All blobs within the container are also recovered.",difficulty:"Hard"},
{q:"You try to configure object replication between two storage accounts and the wizard shows an error. What prerequisite is MOST LIKELY missing?",options:["Both storage accounts must be in the same region","Blob versioning must be enabled on both source and destination storage accounts","The storage accounts must be in the same subscription","Object replication requires Premium block blob accounts"],answer:1,explanation:"Object replication requires blob versioning enabled on both source and destination storage accounts. Without versioning, the replication cannot track which blobs need to be replicated. Additionally, change feed must be enabled on the source. Accounts can be in different regions and subscriptions.",difficulty:"Hard"},
{q:"You enable blob change feed to audit all operations. After a week, bulk read operations by the analytics team do not appear in the change feed. Is this expected?",options:["No — change feed should capture all read operations; check if the analytics team uses a different endpoint","Yes — change feed only captures create, modify, delete, and copy operations; read operations are not included","No — read operations appear in change feed with a 1-hour delay due to batching","Yes — change feed only captures Azure portal operations, not SDK operations"],answer:1,explanation:"The blob change feed records creation, modification, deletion, and copy operations. Read operations are NOT captured. For read auditing, use Storage Analytics logging or Azure Monitor diagnostic settings.",difficulty:"Hard"},
{q:"You enable static website hosting and upload SPA files to the $web container. When users navigate to /dashboard directly, they receive a 404 from the storage account. Your app handles routing client-side. What configuration resolves this?",options:["Configure a CDN with a URL rewrite rule to redirect all paths to index.html","Set the 404 error document path in static website settings to 'index.html' so the client-side router handles the path","Enable HTTPS on the storage account to allow deep linking","Use Azure DNS to CNAME /dashboard to /index.html"],answer:1,explanation:"For SPAs with client-side routing, set both the index document and 404 error document to 'index.html'. When a user navigates to /dashboard (no matching file), the 404 handler serves index.html, and the client-side router handles the route.",difficulty:"Hard"},
{q:"A data engineering team needs to atomically rename a directory containing 10 million files. On standard Blob Storage this takes hours. What feature resolves this?",options:["Enable blob versioning to track the rename atomically","Enable hierarchical namespace (ADLS Gen2) — directory renames are O(1) metadata operations regardless of file count","Use Azure Data Factory to move files in parallel","Enable blob change feed to track the rename operation"],answer:1,explanation:"Standard Blob Storage simulates directories with prefixes. Renaming 'scratch/' requires copying every blob to the new prefix then deleting originals — O(n) in file count. ADLS Gen2 with hierarchical namespace implements true directories, making directory renames an O(1) atomic metadata operation.",difficulty:"Hard"},
{q:"A critical application uses ZRS storage in East US. A natural disaster destroys the entire East US region, affecting all three availability zones. What happens to the data?",options:["ZRS replicates across three Azure regions, so data is available from another region","ZRS replicates synchronously across three availability zones within ONE region — if the entire region is lost, data in a ZRS-only account is unrecoverable","ZRS automatically promotes the secondary region to primary when the primary region fails","Microsoft recovers ZRS data within 48 hours under the uptime SLA"],answer:1,explanation:"ZRS replicates data synchronously across three availability zones within ONE Azure region. It protects against zone failure but NOT complete regional failure. For cross-region protection, use GRS, RA-GRS, GZRS, or RA-GZRS.",difficulty:"Hard"},
{q:"You create a Premium block blob storage account for high-throughput workloads. Later, you want to move most blobs to Cool tier to reduce costs. Which statement is correct?",options:["Set blob access tier to Cool using Set Blob Tier API","Create a lifecycle policy to move blobs to Cool after 30 days","Premium block blob storage accounts only support the Hot access tier — Cool and Archive tiers are not available","Use AzCopy to migrate blobs from Premium to a Standard StorageV2 account"],answer:2,explanation:"Premium block blob storage accounts are optimized for high-transaction workloads and only support the Hot access tier. They do not support Cool, Cold, or Archive tiers. For tiering, use Standard general-purpose v2 accounts.",difficulty:"Hard"},
{q:"Azure App Service fails to mount an Azure Files share from an on-premises machine, even though Hybrid Connections to the same machine work fine. What is the most likely cause?",options:["Azure Files requires a Premium storage account for on-premises access","SMB (TCP port 445) is required to mount Azure Files. Many ISPs and corporate firewalls block outbound port 445, preventing mounting from on-premises","Azure Files cannot be accessed from on-premises — use Azure File Sync instead","Hybrid Connections do not support file share protocols"],answer:1,explanation:"Azure Files uses SMB on TCP port 445. Unlike Hybrid Connections (which use outbound HTTPS port 443), Azure Files requires port 445 open outbound from the on-premises network. Azure File Sync uses HTTPS and can work around this port 445 restriction.",difficulty:"Hard"},
{q:"An Azure Function processes Storage Queue messages. Processing a single message takes 45 seconds. Messages are being processed multiple times by different function instances. What configuration causes this?",options:["maxDequeueCount is set too low, causing messages to go to the dead-letter queue","The default message visibility timeout for Storage Queue triggers is 30 seconds; if processing exceeds this, the message reappears and another instance picks it up","The function is on Consumption plan which has a 30-second execution limit","Storage Queues do not support concurrent processing"],answer:1,explanation:"The Azure Functions Storage Queue trigger has a default visibility timeout of 30 seconds (configurable via visibilityTimeout in host.json). If function execution exceeds this, the message becomes visible again, causing duplicate processing. Set visibilityTimeout to exceed your maximum processing time.",difficulty:"Hard"},
{q:"A developer designs Table Storage with PartitionKey set to the customer's city. 80% of operations target the 'London' partition. What problem does this cause and what is the BEST resolution?",options:["Table Storage automatically distributes load across partitions — no action needed","The London partition becomes a hot partition limiting throughput. Use a higher-cardinality partition key such as a hash of customer ID or the customer ID itself","Increase Table Storage throughput units to handle the London partition load","Enable RA-GRS to spread read load across regions"],answer:1,explanation:"Azure Table Storage scales throughput at the partition level. A hot partition limits overall throughput to a single partition's capacity. A better partition key distributes operations evenly — customer ID (high cardinality) distributes traffic across many partitions.",difficulty:"Hard"},
{q:"Worker A acquires a 60-second exclusive lease on a blob. Worker B tries to write to the blob without providing a lease ID. What HTTP status code does Worker B receive?",options:["409 Conflict — the blob is in read-only state due to the lease","412 Precondition Failed — writes without a valid lease ID on a leased blob return 412","403 Forbidden — Worker B does not have write permissions","503 Service Unavailable — the service throttles concurrent access"],answer:1,explanation:"When a blob has an active exclusive lease, write operations without a valid lease ID return HTTP 412 Precondition Failed. This allows Worker A to safely update the blob as a critical section.",difficulty:"Hard"},
{q:"A storage account uses a customer-managed key (CMK) in Azure Key Vault. A security engineer disables the CMK. What immediately happens to the storage account?",options:["The storage account continues working normally — changes take effect at next rotation","The storage account becomes inaccessible — all read and write operations fail until the key is re-enabled","Microsoft automatically switches to a Microsoft-managed key as fallback","The storage account is locked to read-only mode until the key is restored"],answer:1,explanation:"If the CMK is disabled or deleted, Azure Storage loses the ability to decrypt the storage encryption key, making all data inaccessible. Both reads and writes fail. There is no fallback to Microsoft-managed keys — this is intentional for compliance scenarios.",difficulty:"Hard"},
{q:"A storage account has key1 (in use by all apps) and key2 (unused). You need to rotate key1 without downtime. What is the correct sequence?",options:["Regenerate key1, then update all applications","Update all applications to use key2, then regenerate key1","Regenerate both keys simultaneously, then update all applications","Delete key1 and create a new key1 in the Azure portal"],answer:1,explanation:"Zero-downtime key rotation: Step 1 — update all applications to use key2. Step 2 — once confirmed, regenerate key1 (invalidating the old key1). Step 3 — optionally switch back to key1 for the next rotation cycle. Regenerating key1 while apps still use it causes immediate downtime.",difficulty:"Hard"},
{q:"An admin enables cloud tiering on Azure File Sync with a 20% free space policy. Users report that opening certain files (shown with a cloud icon) takes 5-10 seconds. What is happening?",options:["Files with the cloud icon are corrupted","Tiered files are replaced with reparse points on the local server. Opening a tiered file triggers File Sync to recall it from Azure Files, causing the delay","The File Sync agent needs to be restarted to apply tiering settings","Cloud tiering only applies to new files — existing files are migrated with a delay"],answer:1,explanation:"Cloud tiering replaces rarely accessed files with sparse reparse points (stubs) on the local disk. The file metadata is visible, but content is in Azure Files. Opening a tiered file triggers automatic recall (download) from Azure Files, causing a delay proportional to file size and network speed.",difficulty:"Hard"},
{q:"You add a new index tag 'priority=high' to 10,000 blobs and immediately query Find Blobs by Tags — the results return 0 blobs. Why?",options:["Tags are only indexed on blobs created after indexing was enabled","The blob index tag system is eventually consistent — newly added tags may take seconds to minutes to appear in tag queries","Find Blobs by Tags only searches metadata, not index tags","The query syntax for the new tag is incorrect"],answer:1,explanation:"Blob index tags are queryable via Find Blobs by Tags using a secondary index that is eventually consistent. After adding or modifying tags, there may be a propagation delay before new tags appear in queries. Design applications to handle this eventual consistency.",difficulty:"Hard"},
{q:"A container's public access level is set to 'Blob' (anonymous read access for blobs only). Which operations can an unauthenticated user perform?",options:["List blobs in the container and read individual blob content","Read individual blobs by URL only — listing the container requires authentication","Read and write blobs — 'Blob' access level grants read/write","List containers in the storage account and read all blob content"],answer:1,explanation:"'Blob' public access allows unauthenticated users to read individual blobs by URL but NOT list the container contents. 'Container' access additionally allows listing blobs anonymously. 'Private' (default) requires authentication for all operations.",difficulty:"Medium"},
{q:"A developer tries to upload a 200 GB file using a single Put Blob HTTP PUT request. The upload fails with 413. What is the correct approach?",options:["Enable the large file upload feature on the storage account","Use Put Block to upload in chunks, then call Put Block List to commit. Block blobs support up to 190.7 TiB total","Increase the maximum blob upload size in storage account settings","Compress the file to stay under the 200 GB limit"],answer:1,explanation:"Put Blob has a maximum single-request size of ~5 GiB. For larger files, use the block blob upload protocol: split into up to 50,000 blocks (each up to 4,000 MiB), upload blocks with Put Block, then commit with Put Block List. Azure SDKs handle this automatically.",difficulty:"Medium"},
{q:"An application writes audit log entries as Storage Queue messages, but messages longer than 64 KB are silently truncated. What is the CORRECT approach for larger payloads?",options:["Upgrade to Premium Queue storage which supports 256 KB messages","Store the full payload in Blob Storage and write a queue message containing the blob reference URL (claim-check pattern)","Enable message compression in Storage Queue settings","Use Base64 encoding to increase effective message size beyond 64 KB"],answer:1,explanation:"Azure Storage Queue messages are limited to 64 KB. For larger payloads, use the claim-check pattern: store full data in Blob Storage and put only the blob URL in the queue message. The consumer retrieves full data from Blob Storage.",difficulty:"Medium"},
{q:"An enterprise security policy requires all Azure storage to use AES-256 encryption at rest. What configuration steps are required for a new storage account?",options:["Select AES-256 as the encryption algorithm in Encryption settings","Enable the 'Advanced encryption' option in security settings","No configuration needed — Azure Storage automatically encrypts all data at rest using AES-256 by default and cannot be disabled","Install the Azure Storage encryption extension"],answer:2,explanation:"Azure Storage automatically encrypts all data (blobs, files, tables, queues) at rest using AES-256 by default, for all storage accounts. This cannot be disabled. No configuration is required to enable it.",difficulty:"Medium"},
{q:"A storage account uses GRS. LastSyncTime is 3 hours behind current time. A complete regional outage forces a failover to the secondary region. What data is lost?",options:["No data is lost — GRS maintains a synchronous replica","Data written in the last 3 hours (since LastSyncTime) may not have replicated and will be lost after failover","Data written in the last 15 minutes is lost — GRS guarantees a maximum 15-minute RPO","Microsoft recovers any data written after LastSyncTime during failover"],answer:1,explanation:"GRS replication is asynchronous. LastSyncTime shows when all data was guaranteed replicated to the secondary. Data written after LastSyncTime may not be in the secondary. After failover, any data written after the last sync time is potentially lost — this is the RPO.",difficulty:"Hard"},
{q:"A developer wants to back up VM disk data by downloading blobs from the storage account backing a managed disk. Where is the storage account?",options:["Navigate to the VM's storage account > Disks container","Look for a storage account named 'md-...' in the resource group","Managed disks are abstracted Azure resources and do not correspond to blobs in a customer-visible storage account — use snapshots or Azure Backup instead","Download via the VM's boot diagnostics storage account"],answer:2,explanation:"Managed disks are fully managed by Azure and do not back onto a customer-visible storage account. Unlike legacy unmanaged disks, there is no storage account blob to directly access. Export a managed disk via snapshot + SAS URL, or use Azure Backup.",difficulty:"Medium"},
{q:"You call Delete Blob on a blob that has 3 active snapshots without passing the include=snapshots parameter. What is the result?",options:["The blob and all its snapshots are deleted","The blob's content is deleted but snapshots become root blobs","The operation fails with HTTP 409 Conflict — you cannot delete a blob with snapshots without including them in the delete request","The most recent snapshot is promoted to the current version"],answer:2,explanation:"Deleting a blob that has snapshots without include=snapshots returns HTTP 409 Conflict. You must explicitly pass include=snapshots to delete the blob and all snapshots, or delete snapshots individually first.",difficulty:"Hard"},
{q:"In a Data Lake Storage Gen2 account, what permissions does a new file created inside a directory get by default?",options:["The new file inherits the parent directory's default ACL if one is set; otherwise it gets permissions based on the process umask","New files always get full permissions (rwx) in ADLS Gen2","New files inherit the owning user's RBAC role rather than POSIX ACLs","New files get no permissions — the owner must explicitly set them after creation"],answer:0,explanation:"In ADLS Gen2, new files inherit permissions from the parent directory's DEFAULT ACL (not the access ACL). If no default ACL is set, permissions derive from the process umask. Default ACLs must be explicitly set to ensure consistent permission inheritance.",difficulty:"Hard"},
{q:"You need to grant a third-party app access to both Blob Storage and Queue Storage in the same storage account for 24 hours. Which SAS type should you use?",options:["Create two Service SAS tokens — one for Blob and one for Queue","Create one Account SAS token — Account SAS can target multiple storage services in a single token","Create a User Delegation SAS — it supports multi-service access","Use a Stored Access Policy that applies to both services simultaneously"],answer:1,explanation:"Service SAS is scoped to a single service (e.g., Blob only). Account SAS can target multiple services (Blob + Queue) simultaneously in one token. User Delegation SAS is Blob/Data Lake only and requires Azure AD.",difficulty:"Hard"},
{q:"You investigate a security incident. You check Storage Analytics logs but see no entries for the time period. What is the most likely reason?",options:["Storage Analytics logs are only available for Premium accounts","Storage Analytics logging is not enabled by default — it must be explicitly turned on per service (Blob, Queue, Table)","Storage Analytics logs are deleted after 7 days by default","Only failed authentication attempts are logged by Storage Analytics"],answer:1,explanation:"Storage Analytics logging must be explicitly enabled per service — it is off by default. You also need to configure a log retention period. For new accounts, enable diagnostic logging during setup or use Azure Policy to auto-configure it.",difficulty:"Medium"},
{q:"A storage account uses standard GRS. The primary region becomes inaccessible during an outage. An application tries to read blob data. What happens?",options:["GRS automatically promotes the secondary to primary — reads succeed from the new primary","GRS makes the secondary readable — use the -secondary endpoint to read data","The application cannot read any data — GRS is only for recovery, not active read access during outage","The application is automatically redirected to the secondary endpoint"],answer:2,explanation:"Standard GRS does not allow reading from the secondary region during normal operation or an outage — the secondary is only accessible after you initiate a failover. RA-GRS (Read-Access GRS) provides a readable secondary endpoint at all times. Without RA-GRS, data is inaccessible until failover completes.",difficulty:"Hard"},
{q:"A Linux-based big data cluster needs to mount Azure Files using NFS 4.1 protocol for POSIX-compliant access. What storage account configuration is required?",options:["Standard GPv2 with NFS 4.1 enabled in preview settings","Premium FileStorage account — NFS 4.1 for Azure Files requires the Premium FileStorage SKU","Standard GPv2 with hierarchical namespace enabled","Any storage account type — NFS support is enabled at the file share level"],answer:1,explanation:"Azure Files NFS 4.1 is only supported on Premium FileStorage accounts. Standard GPv2 accounts with Azure Files only support SMB. The Premium FileStorage account also requires network configuration (private endpoint or selected networks) since NFS 4.1 Azure Files does not support public internet access.",difficulty:"Hard"},
{q:"Some blobs need to be stored for infrequent access (once per quarter) but must be retrieved in milliseconds, not hours. Hot tier is too expensive; Archive is too slow. Which tier best fits?",options:["Cool tier — blobs are online and accessible immediately; 30-day minimum storage duration","Cold tier — lower storage cost than Cool, higher access cost; 90-day minimum storage duration; blobs are online and immediately accessible","Archive tier — use High Priority rehydration which completes in under 1 hour","Premium block blob — fastest access with low latency even for infrequent access"],answer:1,explanation:"The Cold tier (introduced 2023) is designed for data accessed approximately once per 90 days. Cold tier blobs are online and accessible immediately with no rehydration. It has lower storage costs than Cool but higher access costs, with a 90-day minimum storage duration.",difficulty:"Hard"},
{q:"A developer queries Azure Table Storage with OData filter: $filter=City eq 'London' and Name like 'John%'. The query fails. What is the cause?",options:["OData filters in Table Storage must use double quotes around string values","Azure Table Storage does not support the LIKE operator or wildcard string matching in OData filters","The AND operator in OData should be written as && not 'and'","Filtering on non-indexed columns requires enabling full-text search"],answer:1,explanation:"Azure Table Storage OData supports comparison operators (eq, ne, gt, ge, lt, le) and logical operators (and, or, not) but does NOT support LIKE, wildcards, or full-text search. For string prefix matching, use range queries with gt/lt on PartitionKey/RowKey.",difficulty:"Hard"},
{q:"You initiate a CopyFromUri of a 500 GB blob between storage accounts. The method returns immediately. How do you determine when the copy has completed?",options:["CopyFromUri blocks until copy completes","Call GetProperties() on the destination blob and check the CopyStatus property — it transitions from Pending to Success or Failed","Subscribe to an Event Grid 'BlobCopied' event","The copy triggers an Azure Function via blob trigger when complete"],answer:1,explanation:"Copy Blob (CopyFromUri) is asynchronous for cross-account copies. Poll the destination blob's properties and check BlobProperties.CopyStatus (Pending, Success, Failed, Aborted). Azure Storage SDKs provide WaitForCompletionAsync helpers.",difficulty:"Hard"},
{q:"A storage account has its default network action set to 'Deny All'. Azure Data Factory fails to read from the account. What is the BEST resolution maintaining maximum security?",options:["Add Data Factory's outbound IP range to the IP rules","Enable the 'Allow trusted Azure services' exception — Data Factory is on the trusted services list","Grant Data Factory's managed identity Storage Blob Data Reader role and change network rules to Allow All","Deploy Data Factory in a VNet and add that VNet to storage account network rules"],answer:1,explanation:"Azure Storage has a 'trusted Microsoft services' bypass that allows specific Azure services to access the account regardless of network rules. Azure Data Factory is on this trusted list. This is simpler and more secure than managing IP ranges or VNet configurations.",difficulty:"Hard"},
{q:"You have a lifecycle policy to delete blobs not modified in 365 days. After 6 months, blobs with old snapshots are not being deleted even though the base blob was last modified over 365 days ago. Why?",options:["Lifecycle policies only apply to blobs created after the policy was created","Lifecycle policy rules targeting baseBlob do not automatically process associated snapshots — you need separate rules specifying the snapshot tier","Blobs with snapshots are exempt from lifecycle policies","The policy requires at least 2 years of retention before deletion rules activate"],answer:1,explanation:"Lifecycle management rules targeting 'baseBlob' apply only to the current blob, not its snapshots. To manage snapshots, add separate rules that specify 'snapshot' in the filter set — e.g., delete snapshots older than 30 days separately from base blobs.",difficulty:"Hard"},
{q:"An order management system requires strict FIFO processing. Which Azure storage/messaging service guarantees FIFO ordering?",options:["Azure Storage Queues guarantee FIFO ordering by default","Azure Service Bus Standard queues guarantee FIFO ordering","Azure Service Bus queues with sessions enabled guarantee FIFO ordering per session ID","Neither Storage Queues nor Service Bus guarantee FIFO — use Event Hubs"],answer:2,explanation:"Storage Queues offer best-effort FIFO but no strict guarantee. Standard Service Bus queues also do not guarantee strict FIFO in general. Service Bus sessions enable strict FIFO ordering per session ID — assign an order ID as the session key to process messages for each order in sequence.",difficulty:"Hard"},
{q:"You try to configure GRS on a Premium block blob storage account. What happens?",options:["GRS is configured successfully — Premium accounts support all redundancy options","The configuration fails — Premium block blob accounts only support LRS and ZRS; GRS and RA-GRS are not available","You can enable GRS by upgrading to the Premium Large Block Blob tier","Use Azure Site Recovery to replicate Premium storage to another region"],answer:1,explanation:"Premium block blob storage accounts only support LRS and ZRS. GRS, RA-GRS, GZRS, and RA-GZRS are not available. For geo-redundancy with Premium performance, architect application-level dual writes or object replication from a separate standard account.",difficulty:"Hard"},
{q:"A legacy application requires random read/write access to a virtual disk with 512-byte sector alignment. Which Azure Blob Storage blob type is designed for this?",options:["Block blobs — they support random access and are most performant","Append blobs — designed for high-frequency small writes like a virtual disk","Page blobs — designed for random read/write with 512-byte page granularity, used for Azure VM disks (VHDs)","Premium block blobs — lower latency than page blobs for VHD operations"],answer:2,explanation:"Page blobs are organized in 512-byte pages and support reading or writing to specific page ranges within the blob — ideal for virtual disk (VHD) scenarios. Azure VM unmanaged disks use page blobs. Block blobs are optimized for sequential upload/download.",difficulty:"Medium"}
]},
"Azure Cosmos DB":{icon:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='10'/><path d='M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20'/></svg>",color:"#5c2d91",questions:[
{q:"You are designing a Cosmos DB container for an e-commerce platform with millions of orders. You need to support fast lookups by orderId and efficient queries for all orders belonging to a customer. Which partition key strategy is BEST?",options:["Use orderId as the partition key for maximum cardinality","Use customerId as the partition key — it distributes data by customer and supports efficient per-customer queries","Use orderDate as the partition key for time-based queries","Use a composite key of customerId + orderDate for maximum flexibility"],answer:1,explanation:"customerId as the partition key provides high cardinality (millions of customers), distributes data evenly, and enables efficient in-partition queries for all orders per customer. orderId is high cardinality but does not enable customer-scoped queries efficiently. Date-based partition keys cause hot partitions.",difficulty:"Hard"},
{q:"Your application requires that all reads always see the most recent committed write, regardless of which region the read comes from. Which Cosmos DB consistency level should you use, and what is the cost?",options:["Session consistency — reads always see the latest write within a client session","Bounded staleness — reads are always within a configurable staleness window","Strong consistency — reads always see the latest committed write globally, but only available for single-region accounts or multi-region accounts where only one write region exists","Eventual consistency — the cheapest option with the eventual guarantee of seeing the latest write"],answer:2,explanation:"Strong consistency guarantees globally consistent reads — reads always return the most recently committed write. However, it is only available for single-region accounts or multi-region accounts without multi-region writes enabled. It incurs 2x read RU cost due to quorum reads across regions.",difficulty:"Hard"},
{q:"A point read (ReadItem by partition key + id) on a 1 KB Cosmos DB item costs 1 RU. You replace the ReadItem call with a SQL query: SELECT * FROM c WHERE c.id='123' AND c.pk='abc'. What is the RU cost comparison?",options:["Both cost the same — Cosmos DB optimizes the SQL query to a point read automatically","The SQL query costs at least 2.5x more RU than the point read — queries have higher overhead even when targeting a specific partition","The SQL query is cheaper because it uses the SQL index","SQL queries targeting a single partition cost exactly 1 RU just like ReadItem"],answer:1,explanation:"A point read (ReadItem with both partition key and id) is the cheapest Cosmos DB operation at approximately 1 RU for 1 KB. A SQL query — even targeting the same item with an equality filter — uses a query engine that costs significantly more RU (typically 2-3+ RU for simple equality queries). Always use ReadItem when you have both id and partition key.",difficulty:"Hard"},
{q:"Your Cosmos DB container uses the change feed push model (Azure Functions trigger). After deleting 10,000 items, you notice the deletions do not appear in the change feed. How should you track deletes?",options:["Enable change feed in 'all operations' mode in the Azure portal","Use the change feed pull model instead — the push model only captures inserts and updates","Set a TTL on items instead of deleting them — TTL expirations appear in the change feed as deletions","Create a Cosmos DB trigger with the includeDeletes=true option in the function binding"],answer:2,explanation:"The Cosmos DB change feed does NOT capture deletes in the standard model. The workaround is soft-deleting items by setting a TTL field, combined with a custom 'deleted' flag. Items expiring via TTL do appear in the change feed (as modifications before deletion). The change feed pull model also does not natively capture hard deletes.",difficulty:"Hard"},
{q:"A Cosmos DB container has multi-region writes enabled across 3 regions. Two clients in different regions simultaneously write conflicting values to the same item. The conflict resolution policy is 'Last Writer Wins' using the _ts property. What happens?",options:["The conflict is rejected — multi-region writes do not allow concurrent writes to the same item","The write with the higher _ts value (later timestamp) wins, and the other write is discarded","Both writes are retained and the application must manually resolve the conflict","The first write received by the Cosmos DB service wins, regardless of _ts"],answer:1,explanation:"'Last Writer Wins' conflict resolution uses the _ts (timestamp) property by default. The write with the highest _ts value wins. The conflicting write is moved to the conflicts feed. You can also specify a custom property instead of _ts for the LWW comparison.",difficulty:"Hard"},

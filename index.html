{q:"An Azure Function runs for 15 minutes and its Application Insights telemetry shows gaps in the timeline. The sampling rate is set to 100%. What is the likely cause?",options:["Application Insights telemetry is only recorded for the first and last 5 minutes of a function execution","The Function App's AI SDK uses adaptive sampling by default — even with a 100% fixed-rate setting, the in-memory buffer may drop telemetry under high throughput before it's flushed","Diagnostic logs are not configured — Application Insights only shows timing gaps for cold starts","Application Insights only records telemetry every 5 minutes for long-running functions"],answer:1,explanation:"Application Insights telemetry is batched and flushed periodically. In long-running processes with high telemetry volume, the in-memory channel can drop items if not flushed frequently enough. For Azure Functions, use the Azure Functions host's Application Insights integration which handles flushing on completion. Also verify adaptive sampling isn't reducing telemetry despite the 100% setting in host.json.",difficulty:"Hard"},
{q:"You configure a Log Analytics workspace query alert. The alert fires when the query returns more than 0 rows. The query takes 5 minutes to execute. What is the minimum alert evaluation frequency you should configure?",options:["1 minute — more frequent checks are always better","Set the evaluation frequency to at least equal to the query execution time — if the query takes 5 minutes, evaluating every 1 minute wastes compute and may result in overlapping evaluations","The evaluation frequency must equal the query window size — both must be 5 minutes","10 minutes — Log Analytics queries require at least 10 minutes between evaluations"],answer:1,explanation:"Alert evaluation frequency determines how often the Log Analytics query runs. If a query takes 5 minutes but you check every 1 minute, queries overlap and may produce inconsistent results. Set frequency ≥ query execution time. Also consider: the alert 'window size' (how much data the query scans) must be ≥ frequency to avoid data gaps.",difficulty:"Hard"},
{q:"Application Insights is configured for a web app. A request fails with HTTP 500. Application Insights shows the exception in Exceptions but the request is NOT correlated to the exception. What is missing?",options:["HTTP 500 responses are not automatically tracked — you must add custom exception tracking","The request and exception need a shared operation ID (correlation ID) — ensure the Application Insights SDK's built-in correlation (via W3C Trace Context or Request-Id headers) is enabled and not stripped by middleware","Application Insights requires Application Map to be configured for request-exception correlation","Exception sampling must be disabled separately from request sampling"],answer:1,explanation:"Application Insights uses distributed tracing correlation. Each request generates an operation_Id, and all telemetry (exceptions, dependencies, traces) within that request must share the same operation_Id. If custom middleware or reverse proxies strip correlation headers, or if exceptions are thrown outside the request context, they won't correlate. Ensure W3C Trace Context (traceparent header) is propagated.",difficulty:"Hard"},
{q:"An Azure Monitor metric alert is configured with a threshold of CPU > 80% for 5 minutes. The CPU spikes to 90% for 3 minutes then drops to 70%. Does the alert fire?",options:["Yes — the CPU exceeded 80% so the alert fires immediately","No — the alert does not fire because the CPU did not exceed 80% for the full 5-minute evaluation window. The condition must be true for the entire window duration","Yes, but with a 5-minute delay","No — CPU metric alerts require Application Insights, not Azure Monitor"],answer:1,explanation:"Azure Monitor metric alerts with aggregation period of 5 minutes and threshold > 80% check whether the aggregated metric over the window exceeds the threshold. A 3-minute spike that drops before the window completes depends on the aggregation type (avg/max). With Average: 3 min at 90% + 2 min at 70% = avg ~82% → might fire. With the condition 'greater than for all of the evaluation': 3 min spike doesn't trigger. The answer depends on the aggregation — verify configuration.",difficulty:"Hard"},
{q:"You need to track custom business metrics (e.g., orders processed per minute) in Application Insights. Which approach is correct?",options:["Use Application Insights Performance Counters for custom metrics","Use the Application Insights SDK's TrackMetric() or custom dimensions on events. Pre-aggregated metrics (GetMetric().TrackValue()) are preferred for high-frequency metrics to reduce data volume","Use Azure Monitor Metrics with a custom namespace","Log the metric value to Application Insights Trace telemetry and query it in Log Analytics"],answer:1,explanation:"TrackMetric() sends individual data points (verbose, higher cost). For high-frequency metrics, use GetMetric(metricId).TrackValue() which pre-aggregates in the SDK and sends only aggregate values per minute — significantly reducing data volume and cost. Custom events with numeric properties are also queryable but higher volume.",difficulty:"Hard"},
{q:"A Log Analytics workspace query returns results up to 15 minutes old for a streaming data source. The data collection rule is configured to send data every 1 minute. What is the most likely cause of the 15-minute delay?",options:["Log Analytics has a fixed 15-minute ingestion SLA for all data sources","The Log Analytics ingestion pipeline has variable latency (typically 2-5 minutes for most sources). 15-minute delay may indicate a processing backlog, an inefficient DCR transformation query, or the workspace is in a region experiencing higher latency","The data collection rule sends data in batches — the 1-minute setting is approximate","Log Analytics only indexes data every 15 minutes for storage efficiency"],answer:1,explanation:"Log Analytics ingestion latency is typically 2-5 minutes but can vary. Causes of higher latency include: DCR transformation queries that are computationally expensive, ingestion backlog (during spikes), workspace in a region with higher latency, or large batch sizes. Monitor ingestion latency using the Heartbeat table or the _LogOperation table.",difficulty:"Hard"},
{q:"Azure Monitor Action Group is configured with an email notification and a Logic App webhook. An alert fires. The email fails to deliver. Does the Logic App webhook still execute?",options:["No — Action Groups execute all actions atomically; if one fails, all fail","Yes — Action Group actions are executed independently. Email failure does not prevent other actions (webhook, SMS, ITSM, etc.) from executing","Only if the Logic App is configured as a fallback action for email failure","The Logic App executes only after a 5-minute retry period for the email"],answer:1,explanation:"Action Group actions (email, SMS, webhook, Logic App, Automation Runbook, ITSM, Azure Function, Voice) execute independently. One action's failure does not block others. The Action Group reports which actions succeeded or failed. For critical alerts, configure multiple notification channels to avoid single points of failure.",difficulty:"Medium"},
{q:"Application Insights Live Metrics Stream shows real-time telemetry from a running application. A developer uses it to debug a production issue. What is a consideration when using Live Metrics in production?",options:["Live Metrics permanently increases the Application Insights ingestion rate and costs","Live Metrics Stream uses a separate streaming channel with minimal overhead only while actively monitored (browser connection open). When closed, overhead drops to zero — it does NOT increase billable telemetry","Live Metrics requires Application Insights Premium tier","Live Metrics shows data with a 5-minute delay for production workloads"],answer:1,explanation:"Live Metrics Stream (QuickPulse) uses a separate streaming channel that only operates when someone is actively viewing the stream. The telemetry shown in Live Metrics is NOT included in the standard Application Insights ingestion billing. When the browser tab is closed, overhead drops to zero. This makes it safe to use for real-time debugging without cost concerns.",difficulty:"Medium"},
{q:"You set up a diagnostic setting on an Azure Storage account to send logs to Log Analytics. You then query StorageBlobLogs in Log Analytics but find no data. What is the most likely issue?",options:["Storage account logs require Azure Monitor Agent, not diagnostic settings","Storage account diagnostic settings require you to enable specific log categories (StorageRead, StorageWrite, StorageDelete) in the diagnostic setting — if no categories are selected, no logs flow","Log Analytics takes 30 minutes to index storage logs after diagnostic settings are enabled","Storage account logs are not supported in Log Analytics — use Azure Storage Analytics instead"],answer:1,explanation:"Azure diagnostic settings for Storage accounts require explicitly selecting which operation types to log: StorageRead, StorageWrite, StorageDelete (for each service: blob, file, queue, table). If no categories are checked, no logs are sent even though the diagnostic setting exists. Verify the diagnostic setting has the appropriate categories enabled.",difficulty:"Hard"},
{q:"Application Insights sampling is configured at 10% (only 10% of telemetry is sent). A user reports an issue that happened at 2:31 PM. You query Application Insights for that time. What must you account for?",options:["The issue data was definitely captured — sampling only applies to successful requests, not errors","The specific request/exception for that user may have been among the 90% that was sampled out (not sent). Sampling ensures statistical representation but does not guarantee every individual transaction is captured","Application Insights always captures 100% of exceptions — sampling only applies to successful requests","Increase the sampling rate retroactively using the Application Insights Sampling settings"],answer:1,explanation:"Adaptive/fixed-rate sampling reduces telemetry volume by sending a percentage of requests and correlating their dependent telemetry (the entire operation is included or excluded together). The user's specific request at 2:31 PM has only a 10% chance of being captured. For critical error tracking, configure sampling exclusion for exceptions or use the 'sampling override' to always capture errors.",difficulty:"Hard"},
{q:"An Azure resource emits a diagnostic metric 'RequestsTotal'. The metric's granularity is 1-minute. You create a 5-minute average alert. The alert evaluates every 1 minute. How much data does each evaluation use?",options:["Each evaluation uses the last 1 minute of data","Each evaluation uses the last 5 minutes of data — the aggregation window is 5 minutes (configured granularity)","Each evaluation uses the last 60 minutes of data — metric alerts look back 1 hour","Each evaluation uses the last 5 data points regardless of their timestamps"],answer:1,explanation:"Azure Monitor metric alerts with a 5-minute aggregation period average (or max/min/count) the metric values from the last 5 minutes on each evaluation. Each 1-minute evaluation checks the 5-minute window ending at the current time. This provides a rolling 5-minute average, reducing false alerts from momentary spikes.",difficulty:"Hard"},
{q:"You use Azure Monitor Workbooks to create a shared operational dashboard. The workbook references a Log Analytics query that takes 2 minutes to execute. What is the impact on dashboard load time?",options:["Workbooks cache all queries — the dashboard loads in under 1 second","Each time the Workbook is opened (or refreshed), the Log Analytics query executes live — load time is at least 2 minutes. Optimize the query or use the Workbook's time range caching to reduce frequency","Workbooks execute all queries in parallel — maximum load time is 2 minutes regardless of query count","Workbooks have a 30-second timeout — the query is killed and returns empty results"],answer:1,explanation:"Azure Monitor Workbooks execute Log Analytics queries live on load/refresh. Slow queries directly impact load time. Best practices: optimize KQL queries (reduce time ranges, use summarize instead of scanning all rows, leverage column projections), pin frequently-used data to a summary view, use workbook parameters to limit data scope.",difficulty:"Medium"},
{q:"You configure Azure Monitor Alerts for an AKS cluster. The alert must fire when ANY pod in a specific namespace restarts more than 5 times in 10 minutes. Which data source and query approach is correct?",options:["Use Azure Kubernetes Service metrics — pod restart count is a standard AKS metric","Use Container Insights data in Log Analytics — query the KubePodInventory or KubeEvents tables for RestartCount > 5 in the target namespace within a 10-minute window","Use Prometheus metrics with a custom alert rule — Azure Monitor cannot access pod restart counts","Use AKS diagnostics logs filtered by namespace name"],answer:1,explanation:"Container Insights populates the Log Analytics workspace with Kubernetes telemetry including KubePodInventory (current pod state + RestartCount) and KubeEvents (OOMKill events, etc.). A Scheduled Query Rule alert can run a KQL query against KubePodInventory filtering by Namespace and RestartCount > 5 within a 10-minute window.",difficulty:"Hard"},
{q:"Application Insights tracks dependencies (SQL, HTTP calls, Redis). A SQL call shows duration of 5000ms. The called database shows the query ran in 200ms. What explains the discrepancy?",options:["Application Insights measurements are approximate — 5000ms vs 200ms is within normal variance","The 5000ms includes: wait time for connection pool availability + connection establishment + network round trip + query execution (200ms) + result set transfer. Application Insights measures end-to-end client-side duration including all overhead","SQL Server reports parse time only; Application Insights measures total execution time","Application Insights has a 5-second minimum resolution for dependency tracking"],answer:1,explanation:"Application Insights dependency tracking measures the total client-side duration from calling the dependency to receiving the result. This includes: connection pool wait, connection establishment (TCP + TLS), network round trip, server execution (200ms), and data transfer. A 4.8-second overhead often indicates connection pool exhaustion — too many concurrent requests, not enough connections in the pool.",difficulty:"Hard"},
{q:"You need to monitor Azure resources across 5 subscriptions from a single dashboard. What Azure Monitor feature supports cross-subscription queries?",options:["Azure Monitor can only query within a single subscription — use separate dashboards per subscription","Log Analytics supports cross-workspace queries using workspace() function. Azure Monitor Workbooks can combine data from multiple Log Analytics workspaces (one per subscription)","Use Azure Lighthouse to enable cross-subscription monitoring in a single workspace","Cross-subscription queries require Azure Monitor SIEM integration"],answer:1,explanation:"Log Analytics cross-workspace queries use the workspace() function to reference other workspaces: union workspace('subscription2-workspace').TableName, TableName. Azure Monitor Workbooks can visualize data from multiple workspaces. Azure Lighthouse enables service providers to manage multiple customer subscriptions from a single tenant, consolidating monitoring.",difficulty:"Hard"},
{q:"An Application Insights availability test is configured to run from 5 global locations every 5 minutes. The test URL returns HTTP 200. However, availability is showing 80% (1 of 5 locations fails). What is the most likely issue?",options:["Application Insights has a 20% false failure rate for availability tests","One geographic region's Azure test infrastructure is blocking the endpoint (e.g., geo-blocked IP ranges). Check which location is failing and verify the endpoint is accessible from that region","The test frequency (5 minutes) causes false failures — decrease to 1-minute intervals","HTTP 200 responses always pass — the 80% availability is a misconfiguration"],answer:1,explanation:"Application Insights availability tests run from specific Azure test agent IP ranges per region. If the monitored endpoint has geo-restrictions, IP allowlists, or WAF rules that block Azure's test agent IPs, tests from that region fail. Check the 'Availability' tab to see which location fails. The fix: allowlist Application Insights test agent IPs or adjust geo-restrictions.",difficulty:"Medium"},
{q:"Azure Monitor Alerts supports 'Alert processing rules' (formerly action rules). What can alert processing rules do?",options:["Alert processing rules can modify the alert condition thresholds during maintenance windows","Alert processing rules can suppress notifications during maintenance windows (add no-action override) or reroute notifications to different Action Groups without modifying the original alert rules","Alert processing rules can auto-resolve alerts that last less than 5 minutes","Alert processing rules can escalate alerts to Azure Support automatically"],answer:1,explanation:"Alert processing rules apply additional logic to fired alerts: Suppress notifications (add no-action to suppress email/SMS/webhook during scheduled maintenance), add Action Groups (route alerts to additional groups without modifying the original rule), or filter which alerts are affected using scope (subscription, resource group, resource) and alert conditions (severity, monitor service).",difficulty:"Hard"},
{q:"You need to diagnose a memory leak in an Azure App Service application. The application is running in production and cannot be restarted. Which Azure diagnostic tool allows profiling without code changes or restarts?",options:["Enable Application Insights Profiler — it captures performance traces for slow requests without code changes or restarts","Use Azure Monitor metrics to track memory usage over time — no profiling needed","Download a memory dump using the App Service Diagnose and Solve Problems tool or the Kudu console — no restart required","Enable verbose logging in the App Service diagnostic settings"],answer:0,explanation:"Application Insights Profiler can be enabled on a running App Service without code changes or restarts (configured in the App Service's Application Insights blade). It samples execution traces for a few minutes per hour (or continuously when enabled). The App Service Diagnose and Solve Problems blade also allows capturing memory dumps and CPU profiles without restarts using the Kudu (advanced tools) endpoint.",difficulty:"Hard"},
{q:"A Log Analytics query uses a time range of 'Last 7 days'. The table has 1 TB of data. Which KQL optimization reduces query cost and execution time?",options:["Use SELECT instead of project to reduce columns","Filter by time range first using the 'where TimeGenerated > ago(7d)' predicate — Log Analytics uses TimeGenerated as the primary partition key and prunes partitions before scanning data","Use the 'take 1000' operator to limit results","Join with another table first to reduce the primary table's row count"],answer:1,explanation:"Log Analytics partitions data by TimeGenerated. Using 'where TimeGenerated > ago(7d)' as an early filter allows the query engine to skip all data outside the time range, dramatically reducing data scanned and cost. Other optimizations: use project to select only needed columns, use summarize instead of scanning full rows, avoid using has_any on large tables.",difficulty:"Hard"},
{q:"Application Insights is configured with a 1 GB/day data cap. At 2 PM, the cap is reached. What happens to telemetry for the rest of the day?",options:["Application Insights sends a warning email and continues ingesting data, billing for overages","Telemetry ingestion is stopped for the rest of the calendar day (UTC). Telemetry generated after the cap is reached is dropped — gaps appear in availability tests, requests, and exceptions until midnight UTC","Telemetry is queued and ingested the next day within the 1 GB cap","The data cap only stops custom events — requests and exceptions continue regardless"],answer:1,explanation:"The Application Insights daily data cap (data volume cap) stops all telemetry ingestion when reached. ALL telemetry types (requests, exceptions, dependencies, custom events, availability) are dropped for the remainder of the calendar day (UTC midnight). This creates monitoring blind spots. Set alerts to notify when approaching the cap and review whether to increase it or reduce telemetry volume via sampling.",difficulty:"Hard"},
{q:"You need to archive Azure Activity Log data for 2 years to meet compliance requirements. The default Activity Log retention is 90 days. Which approach is correct?",options:["Increase the Activity Log retention to 2 years in the Azure Monitor settings","Configure a diagnostic setting on the subscription to route Activity Log entries to an Azure Storage account — configure the storage account's blob lifecycle management policy to retain blobs for 730 days (2 years)","Use Azure Backup to archive Activity Log data","Activity Log data can only be retained for 90 days — compliance requires exporting to a separate SIEM"],answer:1,explanation:"Activity Log default retention in Azure Monitor is 90 days. For longer retention, create a subscription-level diagnostic setting to route Activity Log to: Azure Storage (for archive), Log Analytics workspace (for querying), or Event Hub (for streaming to SIEM). Configure the storage account lifecycle policy to retain blobs for the required period.",difficulty:"Medium"},
{q:"An Azure resource's metric stops being emitted. A metric alert configured for that resource does not fire. Why?",options:["Metric alerts only fire on positive metric values — no data is treated as 0","By default, Azure Monitor metric alerts have an 'ignore' behavior for missing data — if no metric is emitted, the alert condition is not evaluated and the alert does not fire. Configure 'treat missing data as' to change this behavior","Metric alerts automatically adjust their threshold when data is missing","Azure Monitor retries metric collection every 5 minutes for missing data"],answer:1,explanation:"Azure Monitor metric alerts have a configurable 'missing data' behavior: 'NotDefined' (ignore, default), 'Zero', 'Ignore', or 'LastKnownValue'. With default 'NotDefined', a resource that stops emitting metrics doesn't trigger any alert — the condition simply doesn't evaluate. For resources where missing data should be an alert condition (e.g., silent failure), set 'treat missing data as: zero'.",difficulty:"Hard"},
{q:"You configure Azure Monitor to send alerts to an IT Service Management (ITSM) tool using the ITSM connector. Alerts appear in Azure Monitor but not in the ITSM tool after 30 minutes. What should you check first?",options:["ITSM connectors have a built-in 30-minute delay for alert batching","Check the ITSM connector's authentication credentials and connection status in Azure Monitor — if the refresh token has expired (typically every 90 days), the connector silently fails to create tickets","Azure Monitor ITSM connector only works with Azure Logic Apps, not direct ITSM integration","ITSM connectors require the alerts to be resolved before creating tickets"],answer:1,explanation:"ITSM Connector (ITMC) in Azure Monitor uses OAuth tokens to authenticate to the ITSM tool. These tokens expire (typically every 90 days). When they expire, the connector silently fails — alerts show in Azure Monitor but no tickets are created in ITSM. Check the connector's health and re-authenticate/refresh the connection periodically.",difficulty:"Hard"},
{q:"Application Insights is integrated with Azure DevOps (formerly called Application Insights Smart Detection). A new regression is detected 30 minutes after deployment. What does Smart Detection do?",options:["Smart Detection automatically rolls back the deployment in Azure DevOps","Smart Detection sends a proactive alert via email/webhook notifying the team that an anomaly was detected (e.g., failure rate increase, response time degradation) compared to the baseline. No automatic remediation occurs","Smart Detection increases the sampling rate to capture more data about the regression","Smart Detection creates a bug in Azure DevOps automatically"],answer:1,explanation:"Application Insights Smart Detection (now called 'Proactive Detectors' or 'Intelligent Detectors') uses ML to detect anomalies like failure rate changes, response time degradation, and unusual memory usage. It sends email notifications to configured recipients. It does NOT automatically roll back deployments or take remediation actions — it alerts your team to investigate.",difficulty:"Medium"},
{q:"A Log Analytics workspace query joins two large tables. The query is slow. Which optimization typically has the highest impact?",options:["Use 'order by' to sort both tables before joining","Filter both tables to reduce row count BEFORE the join using where clauses. Apply time range and other filters early in the query pipeline — join on small, filtered datasets","Use project to remove columns before joining","Enable query acceleration in the workspace settings"],answer:1,explanation:"Join operations on large tables are expensive. The primary optimization: filter each table (with where TimeGenerated > ago(1d), where columnName == 'value') BEFORE the join to reduce row counts. KQL applies filters lazily but explicitly filtering before join ensures the query engine reduces data first. Also: join on the smallest possible key set and use join kind=inner when appropriate.",difficulty:"Hard"},
{q:"You enable Azure Monitor for VMs on a Windows VM. The VM agent collects performance counters. You notice the Processor(_Total)\\% Processor Time counter is missing from Log Analytics. What is the likely cause?",options:["This counter is not available for Windows VMs in Azure","Azure Monitor for VMs collects a predefined set of performance counters. The '% Processor Time' counter must be explicitly enabled in the Data Collection Rule (DCR) — verify it's listed in the Performance Counters section of the DCR","Performance counter data takes 30 minutes to appear in Log Analytics after enabling VM insights","Windows VMs report CPU via Azure Monitor metrics, not Log Analytics performance counters"],answer:1,explanation:"Azure Monitor Agent collects performance counters defined in a Data Collection Rule (DCR). If a specific counter is not in the DCR, it's not collected. Default VM Insights DCRs include common counters, but you must verify '\\Processor(_Total)\\% Processor Time' is included. If not, edit the DCR to add it under the Performance Counters section.",difficulty:"Hard"},
{q:"You need to detect when a specific Azure resource is deleted and automatically notify a team. Which Azure service combination achieves this?",options:["Azure Monitor metric alert on the resource + email action group","Azure Activity Log alert on 'Delete {ResourceType}' operation + Action Group with email/webhook — Activity Log captures all Azure control plane operations including deletes","Azure Policy in audit mode + email notification","Azure Resource Graph scheduled query + Azure Monitor alert"],answer:1,explanation:"Azure Activity Log records all Azure control plane operations (create, update, delete). Create an Activity Log alert scoped to the subscription or resource group, filtered on Operation Name = 'Microsoft.{Provider}/delete' and Status = 'Succeeded'. Add an Action Group to notify the team via email, SMS, or webhook.",difficulty:"Medium"},
{q:"Application Insights is used for a microservices application with 10 services. Each service has its own Application Insights resource. Distributed traces show a request spanning 3 services but the trace is incomplete. What is the likely cause?",options:["Application Insights only supports distributed tracing for up to 2 services","One of the services in the chain is not forwarding the W3C Trace Context (traceparent/tracestate) headers to downstream calls. The trace ID breaks at that service — subsequent services start a new trace","Distributed traces require Application Insights Premium tier","Services must be in the same region for distributed traces to correlate"],answer:1,explanation:"Distributed tracing in Application Insights uses W3C Trace Context (traceparent header) to correlate telemetry across services. If one service doesn't forward the traceparent header to downstream HTTP calls, the trace chain breaks. Each downstream service starts a new trace ID. Ensure all HTTP client calls include the header (MSAL/Application Insights SDK does this automatically if configured).",difficulty:"Hard"},
{q:"You create an Azure Monitor alert with Dynamic Thresholds instead of static. What is the advantage of Dynamic Thresholds for a seasonal workload?",options:["Dynamic Thresholds cost less than static thresholds","Dynamic Thresholds use ML to learn the metric's baseline pattern (including daily/weekly seasonality) and set thresholds automatically — reducing false alerts during expected high-traffic periods (e.g., Monday morning spikes)","Dynamic Thresholds require Azure Monitor Premium tier","Dynamic Thresholds only apply to CPU and memory metrics"],answer:1,explanation:"Azure Monitor Dynamic Thresholds use ML to analyze historical metric patterns and establish normal baselines accounting for: time-of-day patterns (e.g., high CPU every Monday morning), weekly seasonality, and trend changes. This reduces false alerts during predictable load spikes. Static thresholds must be set high enough for peak load, potentially missing real anomalies.",difficulty:"Medium"},
{q:"You need to understand how long Azure resource deployments take using the Activity Log. The log shows 'Microsoft.Resources/deployments/write' operations. Each deployment has 'Accepted', 'In Progress', and 'Succeeded' events. How do you calculate deployment duration?",options:["Subtract the 'Accepted' event timestamp from the 'Succeeded' timestamp for each deployment","Use Activity Log's built-in duration metric — it calculates deployment time automatically","Calculate the average of all deployment start times","Use Azure Resource Manager deployment history which tracks start and end times directly"],answer:0,explanation:"Activity Log events for a deployment include initial (Accepted/In Progress) and completion (Succeeded/Failed) events with timestamps. Duration = Succeeded.timestamp - initial.timestamp. The Azure Resource Manager deployment history (via portal or az deployment sub show) also provides duration directly. For Log Analytics queries, correlate events by their correlationId.",difficulty:"Medium"},
{q:"An Application Insights alert is configured to fire when dependency failure rate > 5%. The query returns 'dependency failures / total dependencies * 100'. The dependency table has 10 million rows per day. How do you optimize the alert query to avoid timeout?",options:["Increase the alert evaluation timeout to 10 minutes","Pre-aggregate the data: use a time range of 15 minutes (the alert's evaluation window), summarize failures and total counts in the query using summarize count() by bin(timestamp, 1min) before calculating the ratio — reduce data scanned to only the evaluation window","Disable the alert and check logs manually","Increase the Log Analytics workspace's query concurrency limit"],answer:1,explanation:"For high-volume tables, keep alert query time ranges small (match the alert window, e.g., 15 minutes), use early filters (TimeGenerated > ago(15m)), and use summarize with bin() to pre-aggregate. Avoid full table scans. The query should return a single aggregated row with the failure rate — not scan all 10M rows.",difficulty:"Hard"}
]},

{q:"Azure Cache for Redis is configured with eviction policy 'allkeys-lru'. The cache reaches maximum memory. A new key is written. What happens?",options:["The write fails with OutOfMemoryException","The cache evicts the least recently used (LRU) key across ALL keys (not just keys with TTL) to make room for the new key","The cache evicts the key with the earliest expiry time","The cache doubles its memory allocation automatically"],answer:1,explanation:"Redis eviction policies control what happens when maxmemory is reached. 'allkeys-lru' evicts the least recently used key from ALL keys. Other policies: 'volatile-lru' (LRU among keys with TTL only), 'allkeys-random' (random key), 'volatile-ttl' (key with shortest remaining TTL). Understanding eviction policies is critical for cache sizing.",difficulty:"Hard"},
{q:"An application uses Azure Cache for Redis in a distributed cache scenario. Multiple app instances write to the same cache key. Race conditions cause stale data. Which Redis feature prevents this?",options:["Redis transactions using MULTI/EXEC provide optimistic concurrency","Use Redis pessimistic locking with the SETNX (SET if Not eXists) command — SETNX atomically sets a key only if it doesn't exist, implementing a distributed lock. Use SET with NX and EX flags for the same effect with timeout","Configure Redis replication to resolve write conflicts automatically","Set the cache TTL to 0 to prevent stale data"],answer:1,explanation:"Redis distributed lock pattern: SET lock-key unique-value NX EX timeout. NX: only set if key doesn't exist. EX: set expiry to prevent deadlock. The holder of the lock can safely write, then DEL lock-key when done. For production, use the Redlock algorithm or a library like StackExchange.Redis.Extensions for proper distributed locking.",difficulty:"Hard"},
{q:"Azure Cache for Redis Premium tier supports Redis Cluster mode. A cluster has 3 shards. Keys are distributed across shards using hash slots (16384 total). You run a MGET for 10 keys that are on different shards. What happens?",options:["MGET works transparently — Redis Cluster routes the multi-key operation across all shards","In Redis Cluster, multi-key operations (MGET, MSET, EVAL) that span multiple shards fail with CROSSSLOT error. Keys must be on the same shard (same hash slot range) for these operations","MGET in cluster mode is serialized — it queries each shard sequentially","Redis Cluster automatically groups the keys by shard and returns combined results"],answer:1,explanation:"Redis Cluster distributes keys across shards based on hash slots. Multi-key commands (MGET, MSET, transactions) must target keys in the same hash slot. Cross-slot operations fail with CROSSSLOT error. Workaround: use hash tags {} in key names to force keys to the same slot (e.g., {user:123}:profile, {user:123}:settings both hash on 'user:123').",difficulty:"Hard"},
{q:"Your application uses StackExchange.Redis to connect to Azure Cache for Redis. After a Redis failover (primary → secondary), the application receives connection errors for 30 seconds. How do you minimize connection disruption?",options:["Use the Standard tier instead of Basic — Standard tier has 2 nodes","Configure retry logic with abortConnect=false and reasonable retry/timeout settings in StackExchange.Redis. Set syncTimeout and asyncTimeout to account for reconnection time. Enable retry logic in your application layer","Disable Redis clustering to prevent failovers","Use multiple Redis instances and implement client-side sharding"],answer:1,explanation:"During Redis failover (typically 15-30 seconds for Standard/Premium), connections fail. Best practices: set abortConnect=false (don't abort if initial connection fails), configure ReconnectRetryPolicy, set connectTimeout and syncTimeout appropriately, use retry policies in your application. The StackExchange.Redis ConnectionMultiplexer handles reconnection automatically.",difficulty:"Hard"},
{q:"An Azure CDN is configured with a custom caching rule: cache all responses for 1 hour. A backend API returns dynamic JSON with Cache-Control: no-cache, max-age=0. What does Azure CDN do?",options:["Azure CDN always respects origin Cache-Control headers — the response is not cached","If the CDN caching rule is set to 'Override' origin headers, the CDN caches the response for 1 hour regardless of the Cache-Control: no-cache header from the origin. 'Use origin cache settings' would respect no-cache","Azure CDN caches the response and ignores all Cache-Control headers","Azure CDN serves the response but adds its own 30-second cache window"],answer:1,explanation:"Azure CDN caching rules have three behaviors: 'Bypass cache' (never cache), 'Override' (use CDN rule, ignore origin headers), 'Set if missing' (use CDN rule only if origin doesn't specify). When set to 'Override' with 1 hour TTL, CDN caches even responses with no-cache headers. This is the intended behavior for forcing CDN caching of dynamic API responses that are actually static.",difficulty:"Hard"},
{q:"A web application uses Azure CDN to serve static assets. Users in Asia report slower load times than users in Europe, where the origin server is hosted. What is the expected CDN behavior after initial user requests from each region?",options:["CDN always routes requests to the origin server — it doesn't cache in edge nodes by default","After the first request from a region warms up the CDN edge node cache, subsequent requests from that region are served from the edge PoP. Asian users should see low latency after cache warm-up — if they still see high latency, check if the CDN PoP closest to them has the content cached","CDN caches content only in the origin region — Asian users always connect to Europe","CDN performance is not location-based — all users get the same latency"],answer:1,explanation:"Azure CDN caches content in edge Points of Presence (PoP) globally. The first request to a PoP fetches from origin (cache miss). Subsequent requests from users served by that PoP are served from the edge cache. If Asian users report ongoing high latency after initial requests, check cache hit ratio for the Asian PoP, ensure Cache-Control headers allow caching, and verify the content is being cached (not bypassed).",difficulty:"Medium"},
{q:"Redis data persistence: you need Azure Cache for Redis to survive a complete node restart without data loss. Which configuration is required?",options:["Standard tier has built-in persistence — no configuration needed","Premium tier with RDB (snapshot) or AOF (append-only file) persistence enabled. RDB takes periodic snapshots; AOF logs every write operation. Both survive node restarts","Configure Redis replication (Standard tier) — replicas automatically persist data","Data persistence in Azure Cache for Redis is managed by Microsoft — you cannot configure it"],answer:1,explanation:"Azure Cache for Redis persistence is only available in the Premium tier. RDB: periodic snapshots (point-in-time recovery, may lose writes since last snapshot). AOF: logs every write command (minimal data loss, but larger files and slower recovery). Basic and Standard tiers are in-memory only — a restart or failover loses all data.",difficulty:"Hard"},
{q:"Azure Cache for Redis Standard tier has a primary and a secondary replica. Which operation is automatically handled by the Standard tier?",options:["Automatic data sharding across multiple nodes","Automatic failover — if the primary becomes unavailable, the secondary is promoted to primary and the connection endpoint remains the same","Automatic geo-replication to another Azure region","Automatic memory scaling when the cache reaches capacity"],answer:1,explanation:"Standard tier (and Premium) includes a primary-secondary replica pair with automatic failover. If the primary is unavailable, the secondary is promoted with minimal downtime (typically 15-30 seconds). The cache connection string/hostname doesn't change — DNS automatically updates. Basic tier has no replica — a node failure causes cache loss.",difficulty:"Medium"},
{q:"A .NET application uses IDistributedCache with Azure Cache for Redis as the backend. Cached objects are serialized to JSON. The serialized size of 1 object is 10 KB. The cache hit rate is 40%. What performance optimization should you investigate?",options:["Upgrade to Premium tier for faster serialization","Investigate whether the cached objects can be compressed before storage — 10 KB JSON may compress to 2-3 KB, reducing memory consumption and bandwidth. Also investigate why hit rate is only 40% — this suggests TTL is too short or cache key design is fragmented","Increase Redis connection pool size to improve throughput","Reduce the number of cached fields using protobuf instead of JSON"],answer:1,explanation:"For Redis optimization: 1) Compress large values (GZip + JSON can reduce 10 KB to 2-3 KB, increasing effective cache capacity). 2) 40% hit rate is low — investigate TTL settings (are items expiring too quickly?), cache key design (too many unique keys that rarely repeat?), and whether the cache size is sufficient. 3) Consider MessagePack instead of JSON for smaller serialized size.",difficulty:"Hard"},
{q:"Azure CDN Verizon Premium supports URL rewrite and redirect rules. A CDN endpoint is serving a SPA (single-page application). Requests for /app/dashboard return 404 from the CDN because the route doesn't exist as a file on the origin. How do you fix this?",options:["Add a 404 error page to the origin server","Configure a URL rewrite rule in the CDN to map all /app/* requests to /index.html — the SPA's client-side routing then handles the path","Configure CORS headers on the CDN endpoint","Enable the CDN's static website hosting mode"],answer:1,explanation:"SPAs use client-side routing — paths like /app/dashboard exist only in the browser, not as files on the server. Direct navigation to these URLs hits the CDN, which forwards to the origin, finds no file, and returns 404. Fix: URL rewrite rule at the CDN level to map all routes under the SPA's base path to /index.html. Azure Static Web Apps handles this automatically.",difficulty:"Hard"},
{q:"Redis pub/sub is used in an application. A subscriber disconnects momentarily. Messages published during the disconnect are lost. How does Redis handle this?",options:["Redis buffers pub/sub messages for disconnected subscribers and delivers them on reconnect","Redis pub/sub is fire-and-forget — messages are NOT persisted or buffered. If a subscriber is disconnected, messages published during the disconnect are permanently lost","Redis delivers missed messages up to the channel's retention period (default 60 seconds)","Redis buffers the last 100 pub/sub messages per channel"],answer:1,explanation:"Redis pub/sub uses a fire-and-forget model — messages are delivered to currently-connected subscribers only. There is no message persistence or delivery guarantee. Disconnected subscribers miss all messages published while disconnected. For reliable messaging, use Redis Streams (which persist messages and support consumer groups) or Azure Service Bus instead.",difficulty:"Hard"},
{q:"An Azure CDN endpoint has a 'query string caching' setting. The origin URL is /api/products?category=electronics. How does 'Ignore query strings' differ from 'Cache every unique URL'?",options:["No difference — CDN always caches by full URL including query strings","'Ignore query strings': CDN treats all requests to /api/products as the same cache key regardless of query string — returns the same cached response. 'Cache every unique URL': each unique query string (category=electronics vs category=clothing) gets its own cache entry","'Cache every unique URL' is the default — 'Ignore query strings' requires Premium tier","'Ignore query strings' is more secure — it prevents cache poisoning via query string manipulation"],answer:1,explanation:"Azure CDN query string caching modes: 'Ignore query strings' (bypass): cache key is only the path, ignores query string — all variations of /api/products get the same cached response. 'Cache every unique URL': full URL including query string is the cache key — /api/products?category=electronics and /api/products?category=clothing are cached separately. Choose based on whether query strings affect the response content.",difficulty:"Medium"},
{q:"An Azure Function uses OutputCache backed by Azure Cache for Redis. The cache key is generated from the user's ID. The cache has 500 MB max memory and stores 10 KB per user. How many concurrent users can be cached before eviction starts?",options:["50,000 users — 500 MB / 10 KB per user","Approximately 50,000 entries — but Redis overhead (key metadata, expiry tracking, ~50-100 bytes per key) means effective capacity is slightly lower; also account for Redis internal data structures","Unlimited — Azure Cache for Redis scales memory automatically","10,000 users — Redis limits cache entries to 10,000 by default"],answer:0,explanation:"Capacity calculation: 500 MB / 10 KB per user ≈ 50,000 users. In practice, Redis stores metadata overhead (~50-100 bytes per key plus the hash slot/bucket overhead), so effective capacity is slightly less. Use the Redis INFO memory command to monitor used_memory and fragmentation ratio. When approaching capacity, eviction policy determines which items are removed.",difficulty:"Medium"},
{q:"Azure CDN Standard from Microsoft (formerly Azure CDN Standard) has a feature called 'Rules Engine'. Which CDN tier includes a full Rules Engine for advanced URL manipulation?",options:["All tiers include the full Rules Engine","Azure CDN Standard from Microsoft (Standard Microsoft) includes the Rules Engine. Verizon Premium had an advanced Rules Engine. Azure Front Door includes the most comprehensive rules engine with WAF integration","Rules Engine is only available with Azure Front Door Premium tier","Rules Engine requires purchasing an add-on for all CDN tiers"],answer:1,explanation:"CDN Rules Engine availability differs by provider: Azure CDN Standard from Microsoft has a Standard Rules Engine. The Verizon-based CDN tiers had more advanced Rules Engines. Azure Front Door (which has largely replaced Azure CDN Standard) includes a comprehensive Rules Engine with WAF, caching rules, URL rewrite, and redirect. Review the current CDN SKU options as they have evolved.",difficulty:"Hard"},
{q:"Redis Transactions using MULTI/EXEC: which of these statements is correct?",options:["MULTI/EXEC transactions provide ACID compliance similar to SQL databases","Redis MULTI/EXEC queues commands and executes them atomically — no other client's commands interleave during execution. However, if a command in the transaction fails (e.g., wrong type operation), other commands in the transaction still execute — there is no rollback","MULTI/EXEC automatically retries failed transactions","Redis transactions support rollback using the DISCARD command before EXEC"],answer:1,explanation:"Redis MULTI/EXEC transactions are atomic in the sense that no other client commands interleave. However, unlike SQL transactions, command execution errors within EXEC do NOT rollback the entire transaction — other commands still execute. DISCARD cancels a queued transaction (before EXEC). For optimistic locking, use WATCH to monitor keys and abort the transaction if they change.",difficulty:"Hard"},
{q:"An application uses Azure Cache for Redis for session state. The session serializer uses default BinaryFormatter (deprecated). Users report session loss after app restarts. What is the BEST fix?",options:["Increase the Redis TTL to prevent session loss","Replace BinaryFormatter with a supported serializer (e.g., JSON via System.Text.Json or protobuf). BinaryFormatter deserialization fails when the assembly version changes between deployments — causing session deserialization failures. Cleared sessions appear as lost","Enable Redis persistence to prevent session data loss on restart","Use Azure SQL Database for session state instead of Redis"],answer:1,explanation:"BinaryFormatter serialization includes assembly version information. When a new version of the application deploys with changed class versions, Redis returns bytes that BinaryFormatter cannot deserialize — resulting in null sessions (appearing as 'lost'). Use a version-neutral serializer like JSON. Also, BinaryFormatter is deprecated in .NET 5+ due to security vulnerabilities.",difficulty:"Hard"},
{q:"You configure Azure Front Door as a CDN for a global e-commerce site. Traffic is split between two origin groups (primary: East US, failover: West US). The primary origin returns HTTP 500 for 3 consecutive health probes. What does Front Door do?",options:["Front Door continues sending all traffic to the primary — health probes do not affect routing","Front Door marks the primary origin as unhealthy and routes traffic to the West US failover origin. When the primary recovers (passes health probes), traffic is gradually shifted back","Front Door creates a support ticket automatically when the origin fails health probes","Front Door serves cached content indefinitely until the primary recovers"],answer:1,explanation:"Azure Front Door continuously probes origin health. When an origin fails health probes (configurable threshold), Front Door removes it from the routing pool and sends traffic to healthy origins. Recovery is automatic — when the origin passes health probes again, Front Door re-adds it to the pool. Configure appropriate probe frequency and unhealthy threshold for your recovery time objectives.",difficulty:"Medium"},
{q:"Redis SCAN vs KEYS command: a developer uses KEYS * in production to find all cache entries. What is the problem?",options:["KEYS * has a maximum result limit of 1000 — use SCAN for larger datasets","KEYS is O(N) where N is the number of keys and blocks the Redis event loop during execution. On a cache with millions of keys, KEYS * can block Redis for seconds, causing timeouts for all other operations. Use SCAN for non-blocking iterative key enumeration","KEYS * requires administrator access — SCAN is the standard alternative","KEYS returns expired keys; SCAN filters them out automatically"],answer:1,explanation:"Redis is single-threaded. KEYS * scans all keyspace in one operation, blocking ALL other Redis commands for the duration. With millions of keys, this can block Redis for seconds causing cascading timeouts. Use SCAN with a count parameter (e.g., SCAN 0 MATCH pattern COUNT 100) for cursor-based iteration that yields between iterations without blocking.",difficulty:"Hard"},
{q:"Azure Cache for Redis Geo-replication (Premium tier) links two Redis instances across regions. What is the replication model?",options:["Active-active: both instances accept writes, and changes sync bidirectionally","Active-passive: one instance (primary/geo-primary) accepts writes; the other (geo-secondary) is read-only. Changes replicate asynchronously from primary to secondary — there may be replication lag","Active-passive with synchronous replication ensuring zero data loss","Geo-replication uses Azure Storage sync containers — data is eventually consistent across regions"],answer:1,explanation:"Azure Cache for Redis Geo-replication (Standard Geo-replication, not Active Geo-Replication) uses active-passive model: one geo-primary accepts writes, the geo-secondary is read-only. Replication is asynchronous — the secondary may be slightly behind the primary. Geo-replication is primarily for disaster recovery. Active Geo-Replication (Enterprise tier) supports active-active writes.",difficulty:"Hard"},
{q:"An application caches database query results in Redis with a TTL of 5 minutes. When the cache expires, all concurrent requests hit the database simultaneously (thundering herd). Which pattern prevents this?",options:["Increase TTL to 1 hour to reduce expiry frequency","Cache stampede prevention patterns: 1) Probabilistic early expiration (recompute slightly before TTL), 2) Mutex/semaphore lock on cache miss (one request refreshes, others wait), 3) Stale-while-revalidate (serve stale data while refreshing in background). Implement a lock using Redis SET NX to allow only one request to rebuild the cache","Increase database connection pool size to handle thundering herd","Use Redis clustering to distribute the thundering herd across multiple nodes"],answer:1,explanation:"Cache stampede (thundering herd) occurs when a popular cache key expires and many concurrent requests simultaneously miss and hit the database. Prevention: use a distributed lock (SETNX) so only one request rebuilds the cache while others wait or serve the slightly-stale value. StackExchange.Redis supports this with GetAndSetAsync patterns.",difficulty:"Hard"},
{q:"Azure Front Door vs Azure CDN Standard from Microsoft — what is a key advantage of Azure Front Door for dynamic content?",options:["Front Door is only for static content — CDN Standard handles dynamic content","Azure Front Door provides Anycast routing at the TCP/TLS layer — connections terminate at the nearest Front Door PoP, then data travels over Microsoft's private backbone to the origin. This reduces TCP handshake latency for dynamic (non-cacheable) content compared to CDN which provides no benefit for dynamic content","Front Door is cheaper than CDN Standard for dynamic content","Front Door supports more geographic PoPs than CDN Standard"],answer:1,explanation:"Azure Front Door uses Anycast to route TCP connections to the nearest Front Door PoP. Dynamic content (not cached) still benefits because the TCP/TLS handshake terminates at the nearest PoP (low RTT), then the request travels over Microsoft's optimized global WAN to the origin. Standard CDN provides no acceleration for cache-miss (dynamic) traffic — requests still traverse the internet to the origin.",difficulty:"Hard"},
{q:"Redis Cluster with 6 nodes (3 primary + 3 replica). One primary and one replica fail simultaneously. Is the cluster operational?",options:["The cluster becomes read-only — it can serve reads but not writes","If the failed primary had a replica that is still alive, that replica is promoted. If BOTH the primary AND its replica fail, the hash slots owned by that shard become unavailable — the cluster enters a 'cluster down' or 'CLUSTERDOWN' state for those slots depending on the cluster-require-full-coverage setting","Redis Cluster continues operating — the remaining 2 primaries redistribute the failed slots","The cluster requires manual intervention to reassign the failed slots before any operations"],answer:1,explanation:"Redis Cluster failure handling: if a primary fails and its replica is available, the replica is automatically promoted. If BOTH a primary and its only replica fail, those hash slots have no owner. With cluster-require-full-coverage=yes (default), the cluster goes into CLUSTERDOWN state refusing all operations. With cluster-require-full-coverage=no, other slots continue serving requests but the missing slots return CLUSTERDOWN errors.",difficulty:"Hard"},
{q:"An Azure CDN endpoint has caching enabled. A security fix is deployed to the origin server updating a JavaScript file. Users continue to get the old version from CDN cache. What is the fastest way to update all CDN edge nodes?",options:["Wait for the CDN TTL to expire — no immediate purge is possible","Use the CDN's Purge feature (Azure portal, CLI, or API) — specify the path to purge. The CDN immediately invalidates the cached content at all edge nodes and fetches fresh content on the next request","Update the CDN endpoint's cache TTL to 0 — this forces re-fetching","Deploy a new CDN endpoint to bypass the cache"],answer:1,explanation:"Azure CDN supports content purge (cache invalidation). You can purge by specific URL, wildcard path, or purge all content. After purge, the next request to each edge node fetches fresh content from the origin. For static assets, versioning (cache-busting) is better practice: include a version hash in the filename (bundle.abc123.js) so updates never need purging.",difficulty:"Medium"},
{q:"You store 1 million session objects in Azure Cache for Redis. Each object is 50 bytes. The cache is configured with maxmemory-policy noeviction. The cache memory reaches the limit. What happens when a new session is created?",options:["The cache evicts an old session to make room for the new one","With noeviction policy, Redis returns an OOM (out of memory) error for all write operations — including SET, LPUSH, HSET — until memory is freed. Reads continue to work","Redis automatically extends memory beyond the configured limit","The new session replaces the oldest session in a FIFO manner"],answer:1,explanation:"The 'noeviction' policy means Redis NEVER automatically evicts keys. When memory is full, all write commands return OOM error (write commands fail with 'command not allowed when used memory > maxmemory'). Read commands continue. For session caches where you need to add new sessions when full, use an LRU eviction policy instead of noeviction.",difficulty:"Hard"},
{q:"Azure Cache for Redis supports Redis modules. Which statement about the Enterprise tier is correct?",options:["Enterprise tier supports all open-source Redis modules including RediSearch and RedisBloom","Azure Cache for Redis Enterprise tier (not Standard/Premium) supports Redis modules: RediSearch (full-text search), RedisBloom (probabilistic data structures), RedisTimeSeries, and RedisJSON. Standard and Premium tiers do not support these modules","Redis modules are available in all tiers but require a license key","RediSearch is only available in the Basic tier for development scenarios"],answer:1,explanation:"Redis modules (RediSearch, RedisBloom, RedisTimeSeries, RedisJSON) are only available in the Azure Cache for Redis Enterprise tier (Enterprise and Enterprise Flash). Standard and Premium tiers run open-source Redis without module support. Enterprise tier provides SLAs of 99.99% and supports active-active geo-replication.",difficulty:"Hard"},
{q:"An application's CDN-cached content needs to be refreshed when the backend data changes. Instead of relying on TTL expiry, the application team wants to programmatically purge specific URLs when data changes. Which approach integrates this into a CI/CD pipeline?",options:["Configure CDN to poll the origin every minute for changes","Use the Azure CDN REST API or Azure CLI (az cdn endpoint purge) to purge specific content paths as part of the deployment pipeline. Trigger purge after data changes in the backend","Reduce CDN TTL to 30 seconds to minimize staleness","Use Azure Event Grid to detect data changes and trigger CDN purge via a Logic App"],answer:1,explanation:"Both approaches are valid: CI/CD pipeline (az cdn endpoint purge) for deployment-triggered purges, and Event Grid → Logic App for data-change-triggered purges. For deployment scenarios, integrate the purge command into the pipeline post-deployment step. For real-time data changes, the event-driven approach is more appropriate. Both use the CDN management plane API.",difficulty:"Medium"},
{q:"Redis Sentinel vs Redis Cluster: you need high availability for a single-shard Redis cache with automatic failover. Which architecture is appropriate?",options:["Redis Cluster — it provides automatic failover and is the only option for high availability","Redis Sentinel — monitors a primary-secondary setup, detects primary failures, performs automatic failover (promotes a replica), and provides service discovery. Redis Cluster distributes data across multiple shards and also provides HA, but for a single-shard scenario, Sentinel is simpler","Both provide identical functionality — choose based on licensing","Redis Sentinel is deprecated — use Redis Cluster for all new deployments"],answer:1,explanation:"Redis Sentinel: monitors a primary + replica(s), performs automatic failover when primary fails, provides configuration provider (tells clients the current primary address). Appropriate for single-shard HA. Redis Cluster: distributes keys across multiple shards (horizontal scaling) and includes built-in HA per shard. Azure Cache for Redis Standard tier uses Sentinel under the hood. Use Cluster (Premium) when you need horizontal scaling beyond one shard.",difficulty:"Hard"},
{q:"A web application uses Azure CDN to cache API responses. API /api/v2/products returns different content based on the Accept-Language header (localization). The CDN is caching the English response and serving it to all users. What CDN configuration fixes this?",options:["Disable CDN caching for all API endpoints","Configure the CDN to vary the cache key by the Accept-Language header using 'Vary by Headers' or 'Query string caching' rules. This creates separate cache entries per language","Add the language as a query parameter instead of using Accept-Language header","Configure the origin to return Cache-Control: no-cache for non-English responses"],answer:1,explanation:"CDN caches responses based on the URL by default, ignoring request headers. If the response varies by Accept-Language header, configure 'Vary by Headers' in the CDN rules to include Accept-Language in the cache key. This creates separate cache entries per language. Alternatively (simpler), move the language to a query parameter or URL segment (/api/v2/products?lang=fr) which CDN includes in the cache key by default with 'Cache every unique URL'.",difficulty:"Hard"},
{q:"Azure Front Door WAF policy blocks a legitimate IP address. You need to exempt it immediately without disabling the WAF. What is the correct approach?",options:["Disable the WAF policy temporarily and re-enable it after the legitimate request completes","Add an exclusion or allowlist rule in the WAF policy — create a custom rule with Action=Allow, Priority higher than the blocking rule, and match condition for the specific IP address. Allow rules take precedence over block rules","Add the IP to the CDN origin's IP allowlist","Increase the WAF's sensitivity threshold to reduce blocking"],answer:1,explanation:"Azure Front Door WAF policies support custom rules with Allow, Block, Log, and Redirect actions. Create a custom allow rule for the specific IP with a high priority (lower number = higher priority). Custom allow rules run before managed (OWASP) rules, so the IP is permitted before it can be blocked. Alternatively, WAF exclusions can be configured for specific request attributes.",difficulty:"Hard"},
{q:"You need to cache Azure Cache for Redis data to survive a full cluster restart (all nodes simultaneously). RDB persistence takes snapshots every 15 minutes. The cluster restarts at 3:00 PM. The last snapshot was at 2:45 PM. What data is available after restart?",options:["All data up to 3:00 PM — Redis writes data continuously to persistent storage","All data up to 2:45 PM (the last snapshot). Data written between 2:45 PM and 3:00 PM is lost — RDB persistence has this recovery point objective (RPO) gap","No data — Redis always starts empty after a full restart","Data up to 3:00 PM if AOF persistence is also enabled alongside RDB"],answer:3,explanation:"With RDB only: restart recovers from the 2:45 PM snapshot — data from 2:45-3:00 PM (15 minutes) is lost. With AOF (append-only file) persistence enabled alongside RDB: every write command is logged; on restart, AOF is replayed to recover all data up to the restart time. AOF RPO is typically seconds (only the last unflushed writes may be lost). Premium tier supports both RDB and AOF simultaneously.",difficulty:"Hard"}
]}

  mode: null,       // 'drill' | 'test'
  topicIdx: 0,      // for drills
  testIdx: 0,       // 0-9 for practice tests
  questions: [],    // active question array
  answers: [],      // user answers (-1 = unanswered)
  current: 0,       // current question index
  revealed: [],     // revealed[i] = true after answering
  timerSec: 0,
  timerInterval: null,
  started: false,
};

// ── Utility ────────────────────────────────────────────────────────────────
function $(id){ return document.getElementById(id); }
function el(tag, cls, html){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(html !== undefined) e.innerHTML = html;
  return e;
}
function pad(n){ return n < 10 ? '0'+n : ''+n; }
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}
function fmtTime(sec){
  const m = Math.floor(sec/60), s = sec%60;
  return pad(m)+':'+pad(s);
}
function totalCorrect(){ return state.answers.filter((a,i)=>a===state.questions[i].answer).length; }
function topicScore(tKey){
  const topic = TOPICS[tKey];
  const qs = topic.questions;
  let correct=0, total=0;
  state.questions.forEach((q,i)=>{
    if(qs.indexOf(q)>=0 && state.answers[i]>=0){
      total++;
      if(state.answers[i]===q.answer) correct++;
    }
  });
  return {correct, total};
}

// ── Nav stats ──────────────────────────────────────────────────────────────
function updateNavStats(){
  const span = document.querySelector('.nav-stats');
  if(!span) return;
  if(!state.started){ span.innerHTML=''; return; }
  const tot = state.questions.length;
  const ans = state.answers.filter(a=>a>=0).length;
  const cor = totalCorrect();
  span.innerHTML =
    `<div class="nav-stat">${ans}/${tot} <span>answered</span></div>`+
    `<div class="nav-stat">${cor} <span>correct</span></div>`;
}

// ── Timer ──────────────────────────────────────────────────────────────────
function stopTimer(){
  if(state.timerInterval){ clearInterval(state.timerInterval); state.timerInterval=null; }
}
function startTimer(){
  stopTimer();
  const badge = $('timer-badge');
  if(!badge) return;
  state.timerInterval = setInterval(()=>{
    if(state.mode==='test'){
      state.timerSec--;
      if(state.timerSec<=0){ stopTimer(); showScore(); return; }
    } else {
      state.timerSec++;
    }
    renderTimer();
  },1000);
}
function renderTimer(){
  const badge = $('timer-badge');
  if(!badge) return;
  if(state.mode==='test'){
    badge.textContent = fmtTime(state.timerSec);
    badge.className = 'timer-badge';
    if(state.timerSec<=600) badge.classList.add('danger');
    else if(state.timerSec<=1200) badge.classList.add('warn');
  } else {
    badge.textContent = fmtTime(state.timerSec);
    badge.className = 'timer-badge';
  }
}

// ── Views ──────────────────────────────────────────────────────────────────
function showView(id){
  document.querySelectorAll('.view').forEach(v=>{
    v.classList.remove('active','fade');
    v.style.display='none';
  });
  const v = $(id);
  if(v){ v.style.display='block'; requestAnimationFrame(()=>{ v.classList.add('active'); }); }
}

// ── Home View ──────────────────────────────────────────────────────────────
function renderHome(){
  stopTimer();
  state.started = false;
  updateNavStats();
  $('view-home').innerHTML = `
    <div class="hero">
      <div class="hero-inner">
        <div class="hero-icon">AZ-204</div>
        <h1>AZ-204 Exam Prep</h1>
        <p>Developing Solutions for Microsoft Azure</p>
        <div class="hero-stats">
          <div class="hstat"><div class="hstat-n">10</div><div class="hstat-l">Topics</div></div>
          <div class="hstat"><div class="hstat-n">400</div><div class="hstat-l">Questions</div></div>
          <div class="hstat"><div class="hstat-n">10</div><div class="hstat-l">Practice Tests</div></div>
          <div class="hstat"><div class="hstat-n">85 min</div><div class="hstat-l">Per Test</div></div>
        </div>
      </div>
    </div>
    <div class="home-content">
      <h2 class="sec-title">Topic Drills</h2>
      <div class="topic-grid" id="topic-grid"></div>
      <h2 class="sec-title">Practice Tests</h2>
      <p class="sec-sub">Each test contains 40 questions (4 per topic) · 85-minute countdown</p>
      <div class="test-grid" id="test-grid"></div>
    </div>`;
  // topic cards
  const tg = $('topic-grid');
  topicKeys.forEach((k,i)=>{
    const t = TOPICS[k];
    const card = el('div','topic-card');
    card.innerHTML = `<div class="topic-icon">${t.icon}</div>
      <div class="topic-name">${k}</div>
      <div class="topic-meta">${t.questions.length} questions</div>`;
    card.style.setProperty('--tc',t.color);
    card.onclick = ()=>startDrill(i);
    tg.appendChild(card);
  });
  // test cards
  const pg = $('test-grid');
  for(let i=0;i<10;i++){
    const card = el('div','test-card');
    card.innerHTML = `<div class="test-num">Test ${i+1}</div>
      <div class="test-title">Full Practice Exam</div>
      <div class="test-pills">
        <span class="pill">40 questions</span>
        <span class="pill pill-amber">85 min</span>
        <span class="pill pill-purple">10 topics</span>
      </div>`;
    card.onclick = ()=>startTest(i);
    pg.appendChild(card);
  }
  showView('view-home');
}

// ── Drill ──────────────────────────────────────────────────────────────────
function startDrill(topicIdx){
  state.mode = 'drill';
  state.topicIdx = topicIdx;
  const t = TOPICS[topicKeys[topicIdx]];
  state.questions = shuffle([...t.questions]);
  state.answers = new Array(state.questions.length).fill(-1);
  state.revealed = new Array(state.questions.length).fill(false);
  state.current = 0;
  state.timerSec = 0;
  state.started = true;
  renderQuiz();
  startTimer();
}

// ── Test ───────────────────────────────────────────────────────────────────
function startTest(testIdx){
  state.mode = 'test';
  state.testIdx = testIdx;
  const qs = [];
  const n = testIdx;
  topicKeys.forEach(k=>{
    const tqs = TOPICS[k].questions;
    for(let j=0;j<4;j++){ const q=tqs[n*4+j]; if(q) qs.push(q); }
  });
  state.questions = shuffle(qs);
  state.answers = new Array(state.questions.length).fill(-1);
  state.revealed = new Array(state.questions.length).fill(false);
  state.current = 0;
  state.timerSec = 85*60;
  state.started = true;
  renderQuiz();
  startTimer();
}

// ── Quiz Render ────────────────────────────────────────────────────────────
function renderQuiz(){
  updateNavStats();
  const q = state.questions[state.current];
  const topicName = topicKeys[state.topicIdx] || findQuestionTopic(q);
  const label = state.mode==='drill'
    ? `${TOPICS[topicKeys[state.topicIdx]].icon} ${topicKeys[state.topicIdx]}`
    : `Practice Test ${state.testIdx+1}`;

  $('view-quiz').innerHTML = `
    <div class="quiz-topbar">
      <button class="back-btn" id="back-btn">← Home</button>
      <span class="quiz-label">${label}</span>
      <span class="timer-badge" id="timer-badge">${fmtTime(state.timerSec)}</span>
    </div>
    <div class="prog-wrap">
      <div class="prog-fill" id="prog-fill" style="width:${((state.current+1)/state.questions.length*100).toFixed(1)}%"></div>
      <div class="prog-text" id="prog-text">${state.current+1} / ${state.questions.length}</div>
    </div>
    <div class="qdots" id="qdots"></div>
    <div class="q-card" id="q-card"></div>
    <div class="nav-row" id="nav-row"></div>`;

  $('back-btn').onclick = ()=>{ stopTimer(); renderHome(); };
  renderDots();
  renderQuestion();
  renderTimer();
  showView('view-quiz');
}

function findQuestionTopic(q){
  for(let k of topicKeys){
    if(TOPICS[k].questions.indexOf(q)>=0) return k;
  }
  return topicKeys[0];
}

function renderDots(){
  const wrap = $('qdots');
  if(!wrap) return;
  wrap.innerHTML='';
  const total = state.questions.length;
  const dots = Math.min(total, 40);
  const step = total > 40 ? total/40 : 1;
  for(let i=0;i<dots;i++){
    const qi = Math.round(i*step);
    const d = el('div','qdot');
    if(qi===state.current){
      d.classList.add('cur');
      d.textContent='*';
    } else if(state.answers[qi]>=0){
      const correct=state.answers[qi]===state.questions[qi].answer;
      d.classList.add(correct?'ok':'bad');
      d.textContent=correct?'O':'X';
    } else {
      d.textContent='-';
    }
    d.onclick=(()=>{ const idx=qi; return ()=>jumpTo(idx); })();
    wrap.appendChild(d);
  }
}

function jumpTo(idx){
  state.current = idx;
  renderQuestion();
  renderDots();
  updateProgress();
}

function updateProgress(){
  const pf=$('prog-fill'), pt=$('prog-text');
  if(pf) pf.style.width=((state.current+1)/state.questions.length*100).toFixed(1)+'%';
  if(pt) pt.textContent=`${state.current+1} / ${state.questions.length}`;
}

function renderQuestion(){
  const qc=$('q-card');
  if(!qc) return;
  const q = state.questions[state.current];
  const tKey = findQuestionTopic(q);
  const t = TOPICS[tKey];
  const ans = state.answers[state.current];
  const rev = state.revealed[state.current];

  let html = `<div class="q-meta">
    <span class="q-num">Q${state.current+1}</span>
    <span class="diff-badge ${q.difficulty==='Hard'?'diff-hard':'diff-medium'}">${q.difficulty}</span>
    <span class="topic-lbl">${t.icon} ${tKey}</span>
  </div>
  <div class="q-text">${q.q}</div>`;
  if(q.q_code) html+=`<pre class="q-code">${escapeHtml(q.q_code)}</pre>`;
  html+='<div class="opts">';
  q.options.forEach((opt,i)=>{
    let cls='opt';
    if(rev){
      if(i===q.answer) cls+=' correct';
      else if(i===ans && ans!==q.answer) cls+=' wrong';
      cls+=' revealed';
    } else if(ans===i){
      cls+=' correct';
    }
    let indicator='';
    if(rev){
      if(i===q.answer) indicator='<span class="opt-indicator opt-check">[Y]</span>';
      else if(i===ans && ans!==q.answer) indicator='<span class="opt-indicator opt-cross">[N]</span>';
    }
    html+=`<div class="${cls}" data-idx="${i}"><span class="opt-lbl">${String.fromCharCode(65+i)}</span>${opt}${indicator}</div>`;
  });
  html+='</div>';
  if(rev){
    const ok = ans===q.answer;
    html+=`<div class="expl show">
      <div class="expl-hdr ${ok?'ok':'bad'}">${ok?'[Y] Correct':'[N] Incorrect'}</div>
      <p>${q.explanation}</p>
    </div>`;
  }
  qc.innerHTML=html;
  // option click
  qc.querySelectorAll('.opt').forEach(o=>{
    o.addEventListener('click',()=>{
      if(state.revealed[state.current]) return;
      const i=parseInt(o.dataset.idx);
      state.answers[state.current]=i;
      state.revealed[state.current]=true;
      renderQuestion();
      renderDots();
      updateNavStats();
      renderNavRow();
    });
  });
  renderNavRow();
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderNavRow(){
  const nr=$('nav-row');
  if(!nr) return;
  const tot=state.questions.length;
  const cur=state.current;
  let html='';
  if(cur>0) html+=`<button class="btn" id="btn-prev">← Prev</button>`;
  else html+=`<span></span>`;
  html+=`<button class="btn btn-primary" id="btn-next">${cur<tot-1?'Next →':'Finish'}</button>`;
  nr.innerHTML=html;
  const bp=$('btn-prev'), bn=$('btn-next');
  if(bp) bp.onclick=()=>{ state.current--; renderQuestion(); renderDots(); updateProgress(); };
  if(bn) bn.onclick=()=>{
    if(cur<tot-1){ state.current++; renderQuestion(); renderDots(); updateProgress(); }
    else { stopTimer(); showScore(); }
  };
}

// ── Score ──────────────────────────────────────────────────────────────────
function showScore(){
  updateNavStats();
  const tot = state.questions.length;
  const cor = totalCorrect();
  const pct = Math.round(cor/tot*100);
  const pass = pct>=70;
  const elapsed = state.mode==='test' ? (85*60-state.timerSec) : state.timerSec;

  let html=`<div class="score-wrap">
    <div class="pass-banner ${pass?'pass':'fail'}">
      <div class="pb-icon">${pass?'PASS':'STUDY'}</div>
      <div class="pb-pct">${pct}%</div>
      <div class="pb-lbl">${pass?'Passed!':'Keep Practicing'}</div>
      <div class="pb-sub">${cor} of ${tot} correct · ${fmtTime(elapsed)} elapsed</div>
    </div>
    <div class="score-grid">
      <div class="sstat good"><div class="sstat-n">${cor}</div><div class="sstat-l">Correct</div></div>
      <div class="sstat bad"><div class="sstat-n">${tot-cor}</div><div class="sstat-l">Incorrect</div></div>
      <div class="sstat neu"><div class="sstat-n">${state.answers.filter(a=>a<0).length}</div><div class="sstat-l">Skipped</div></div>
      <div class="sstat neu"><div class="sstat-n">${pct}%</div><div class="sstat-l">Score</div></div>
    </div>`;

  if(state.mode==='test'){
    html+=`<div class="topic-bkdn">`;
    topicKeys.forEach(k=>{
      const t=TOPICS[k];
      const qs=t.questions;
      let tc=0,tt=0;
      const n=state.testIdx;
      for(let j=0;j<4;j++){
        const qi=state.questions.indexOf(qs[n*4+j]);
        if(qi>=0){ tt++; if(state.answers[qi]===qs[n*4+j].answer) tc++; }
      }
      if(tt===0) return;
      const tp=Math.round(tc/tt*100);
      const cls=tp>=80?'hi':tp>=60?'mid':'low';
      html+=`<div class="tbrow">
        <div class="tbrow-name">${t.icon} ${k}</div>
        <div class="tbrow-bw"><div class="tbrow-bar ${cls}" style="width:${tp}%"></div></div>
        <div class="tbrow-pct">${tc}/${tt}</div>
      </div>`;
    });
    html+=`</div>`;
  }

  html+=`<div class="score-btns">
    <button class="btn btn-primary" id="btn-retry">Retry</button>
    <button class="btn" id="btn-home">Home</button>
    <button class="btn btn-purple" id="btn-review">Review Answers</button>
  </div></div>`;

  $('view-score').innerHTML=html;
  showView('view-score');

  $('btn-home').onclick=()=>renderHome();
  $('btn-retry').onclick=()=>{
    if(state.mode==='drill') startDrill(state.topicIdx);
    else startTest(state.testIdx);
  };
  $('btn-review').onclick=()=>{
    state.current=0;
    renderQuiz();
    // mark all as revealed for review
    state.revealed=state.revealed.map(()=>true);
    renderQuestion();
    renderDots();
    updateProgress();
  };
}

// ── Init ───────────────────────────────────────────────────────────────────
(function(){
  const app = document.getElementById('app');
  ['view-home','view-quiz','view-score'].forEach(id=>{
    const d = document.createElement('div');
    d.id = id; d.className = 'view';
    app.appendChild(d);
  });
})();
function goHome(){ renderHome(); }
renderHome();
</script>

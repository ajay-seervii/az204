{q:"A Cosmos DB item has _ttl set to 3600 (1 hour). The container also has a defaultTtl of 86400 (1 day) configured. What is the effective TTL for this item?",options:["1 day — the container-level defaultTtl always takes precedence over item-level _ttl","1 hour — item-level _ttl overrides the container-level defaultTtl","The item never expires — conflicting TTL values disable expiry for that item","The shorter TTL (1 hour) takes precedence as a safety measure"],answer:1,explanation:"Item-level _ttl overrides the container-level defaultTtl. If an item has a non-null _ttl, that value is used instead of the container default. Setting an item's _ttl to -1 disables expiry for that specific item even if the container has a defaultTtl.",difficulty:"Hard"},
{q:"You need a Cosmos DB stored procedure to insert 100 documents atomically so either all succeed or none do. The procedure loops and inserts each document. During testing, you find that only the first 50 documents are inserted before a timeout. What is the issue?",options:["Stored procedures cannot perform more than 50 operations in a single execution","Stored procedures in Cosmos DB are transactional per partition, but they have a bounded execution time limit. The procedure must implement a continuation pattern to handle partial execution gracefully","Stored procedures cannot perform transactional operations — use the Transactional Batch API instead","You need to increase the RU/s on the container to accommodate the stored procedure"],answer:1,explanation:"Cosmos DB stored procedures have a bounded execution time (~5 seconds). For large-scale operations, implement a continuation pattern: return a checkpoint from the stored procedure when approaching the time limit, then re-invoke it from where it left off. The Transactional Batch API is an alternative for up to 100 operations on the same partition key.",difficulty:"Hard"},
{q:"Your Cosmos DB container uses the SQL API. Queries with ORDER BY on two properties (createdAt and category) fail with an error stating a composite index is required. What must you configure?",options:["Increase the RU/s to allow complex query execution","Add a composite index to the indexing policy including both createdAt and category in the ORDER BY direction","Enable lazy indexing mode to allow runtime index creation","Query results can be sorted client-side instead of using ORDER BY"],answer:1,explanation:"Cosmos DB requires a composite index for ORDER BY clauses with multiple properties, or when combining a range filter on one property with ORDER BY on another. Add a composite index in the container's indexing policy specifying the properties and sort order.",difficulty:"Hard"},
{q:"A developer configures Cosmos DB SDK in Direct mode for a .NET application. They observe that the first request takes 2-3 seconds but subsequent requests are fast. What is the reason?",options:["Direct mode uses TCP connections that require slow TLS negotiation on first use","In Direct mode, the SDK fetches the address routing table (partition map) on the first request. This cold start takes 1-3 seconds. Subsequent requests use the cached routing table","Direct mode requires the SDK to establish persistent connections to all replicas on startup","The Cosmos DB emulator is slower than the cloud service"],answer:1,explanation:"Cosmos DB Direct mode (TCP) provides lower latency but requires an initial 1-3 second warmup where the SDK fetches the partition map (address directory) from the gateway. Subsequent requests use the cached routing table and are much faster. Gateway mode uses HTTPS and doesn't have this cold start issue.",difficulty:"Hard"},
{q:"You set autoscale on a Cosmos DB container with a maximum of 10,000 RU/s. The workload is idle overnight. What is the minimum throughput charged?",options:["0 RU/s — autoscale scales to zero when idle","1,000 RU/s — autoscale scales down to 10% of the configured maximum","400 RU/s — the minimum provisioned throughput in Cosmos DB","10,000 RU/s — autoscale always provisions the maximum you configured"],answer:1,explanation:"Cosmos DB autoscale scales the throughput from a minimum of 10% of the configured maximum down to 10% automatically. For a 10,000 RU/s max, the minimum is 1,000 RU/s. You are always charged at least 10% of the maximum — autoscale does not scale to zero.",difficulty:"Hard"},
{q:"A Cosmos DB database has throughput provisioned at the database level (shared throughput) and contains 5 containers. One container handles a burst of requests and consumes all shared RU/s, starving the other 4 containers. What is the BEST design change?",options:["Increase the shared database throughput to handle peak load from all containers","Move the high-traffic container to dedicated (container-level) throughput to isolate its RU/s from the shared pool","Use Cosmos DB autoscale at the database level to handle variable load","Enable multi-region writes to distribute the load"],answer:1,explanation:"Database-level throughput is shared across all containers in the database. A single busy container can starve others. The solution is to move the high-traffic container to dedicated container-level throughput, isolating its RU/s. Less-active containers can remain on shared throughput.",difficulty:"Hard"},
{q:"You are deciding between Cosmos DB serverless and provisioned throughput for a new application. The app processes 10,000 requests/month with highly variable load. Which is the BEST choice?",options:["Provisioned throughput at 400 RU/s minimum — it's cheaper for consistent workloads","Serverless — no provisioned throughput, pay only per operation; ideal for low-volume or spiky workloads with a maximum of 5,000 RU/s per container","Serverless with autoscale — combines no-provision benefits with autoscale flexibility","Provisioned autoscale at 1,000 RU/s max for the variable load"],answer:1,explanation:"Cosmos DB serverless is ideal for low-traffic or highly variable workloads where provisioning RU/s would be wasteful. There's no minimum charge — you pay per RU consumed. The limit is 5,000 RU/s per container and 1 TB storage. For 10,000 requests/month, serverless is significantly cheaper than any provisioned option.",difficulty:"Hard"},
{q:"A Cosmos DB container uses Session consistency. Client A writes a document and receives a session token. Client B (different process, no session token) immediately reads that document. What does Client B see?",options:["Client B always sees the latest write regardless of consistency level","With Session consistency, Client B may see a stale version of the document — Session consistency only guarantees 'read your own writes' within the same client session","Client B sees the latest write — Session consistency guarantees strong consistency within the same region","Client B receives an error — Session consistency requires all clients to use the same session token"],answer:1,explanation:"Session consistency guarantees 'read your own writes' only within the same client session (identified by a session token). Client B, using a different session without Client A's token, is not guaranteed to see Client A's write immediately. It may see a stale version depending on replication lag.",difficulty:"Hard"},
{q:"Your Cosmos DB container has a 2 MB document size limit. An application tries to upsert a 2.5 MB document. What happens?",options:["Cosmos DB automatically compresses the document to fit the 2 MB limit","The operation fails with HTTP 413 Request Entity Too Large","The document is stored but indexed properties are truncated to 2 MB","The document is stored in a separate overflow container"],answer:1,explanation:"Cosmos DB has a hard limit of 2 MB per item (document). Attempting to store a larger item results in an HTTP 413 Request Entity Too Large error. You must redesign the data model — for example, store large binary content in Blob Storage and keep only a reference URI in Cosmos DB.",difficulty:"Hard"},
{q:"You need to partially update a specific field in a Cosmos DB document without replacing the entire document. The document is 1 MB. Which approach minimizes RU cost?",options:["Read the document, modify the field in your application, and write back the full updated document — 1 read RU + 1 write RU","Use the Patch API to update only the specific field — lower RU cost than a full document replace","Create a stored procedure to update only the field — stored procedures have zero RU cost","Use the merge operation in the Transactional Batch API"],answer:1,explanation:"The Cosmos DB Patch API (partial document update) allows updating specific fields without reading or replacing the full document. This significantly reduces RU consumption for large documents with small updates. A full read+replace of a 1 MB document costs many more RUs than a patch targeting one field.",difficulty:"Hard"},
{q:"A Cosmos DB container's indexing policy is set to include all paths ('/*'). The container stores large JSON documents with many properties that are never queried. What is the performance impact?",options:["No impact — Cosmos DB indexing is always efficient regardless of document structure","Indexing all properties increases RU consumption for writes and storage for the index, even for properties never used in queries. Exclude non-queried paths to reduce costs","Indexing all properties improves read performance so much that it outweighs any write overhead","Cosmos DB only indexes string and number properties — large binary properties are skipped automatically"],answer:1,explanation:"Cosmos DB indexes all paths by default. For each write, all included properties are indexed, consuming additional write RU and storage for the index. If many properties are never queried, configure the indexing policy to exclude those paths ('/*' exclude, then include only queried paths) to reduce write costs.",difficulty:"Hard"},
{q:"You run a Cosmos DB change feed processor across 3 application instances with a leases container. One instance crashes. What happens to the partitions it was processing?",options:["Those partitions stop being processed until the crashed instance restarts","The remaining 2 instances automatically rebalance and acquire the leases from the crashed instance after the lease expiry period","The change feed processor skips events from the crashed instance's partitions to maintain ordering","You must manually reassign the leases using the Azure portal"],answer:1,explanation:"The Change Feed Processor library uses a lease container to track which instance processes each partition. When an instance crashes, its leases expire (after a configurable lease interval). The remaining healthy instances detect the expired leases and rebalance, acquiring those partitions and resuming processing from the last checkpoint.",difficulty:"Hard"},
{q:"An application performs this Cosmos DB query frequently: SELECT * FROM c WHERE c.category='Electronics' ORDER BY c.price. The category has low cardinality (10 values). What performance issue might occur?",options:["The query executes a full container scan because category is not the partition key","If category is not the partition key, this is a cross-partition query fanning out to all physical partitions. Category's low cardinality may also cause hot partitions if used as partition key","The ORDER BY on price requires a composite index — without it, the query fails","Cosmos DB does not support ORDER BY on numeric properties"],answer:1,explanation:"A query filtering on a non-partition-key property is a cross-partition query that fans out to ALL physical partitions, costing more RU. Low-cardinality partition keys (10 values) would create hot partitions. For this access pattern, consider using category as part of a synthetic partition key, or add a composite index for category+price.",difficulty:"Hard"},
{q:"You configure Cosmos DB RBAC with a custom role for your application's managed identity. After deployment, the application receives 403 errors when reading documents. The managed identity has the built-in 'Cosmos DB Account Reader' role at the account level. What is the likely issue?",options:["The 'Cosmos DB Account Reader' role is management-plane only — it does not grant data plane read access","The 'Cosmos DB Account Reader' role is not a built-in Cosmos DB RBAC role","403 errors indicate the managed identity does not exist — re-enable it","The role must be assigned at the container level, not account level"],answer:0,explanation:"Cosmos DB has separate management plane (Azure RBAC: 'Cosmos DB Account Reader Role') and data plane (Cosmos DB RBAC: 'Cosmos DB Built-in Data Reader') roles. The management plane role grants access to manage the account (via Azure portal/ARM) but NOT to read/write documents. For data plane access, assign 'Cosmos DB Built-in Data Reader' or a custom data plane role.",difficulty:"Hard"},
{q:"Your Cosmos DB container stores sensor data with automatic TTL set to 30 days. You also run analytical queries using Azure Synapse Link. If an item expires via TTL, what happens to its data in the analytical store?",options:["The item is immediately deleted from both transactional and analytical stores","The item is deleted from the transactional store on TTL expiry, but the analytical store retains it for its configured analytical TTL (which can be set independently)","The item is never deleted from the analytical store — analytical store data is permanent","TTL cannot be used on containers that have Synapse Link enabled"],answer:1,explanation:"In Cosmos DB with Synapse Link enabled, the transactional store and analytical store have independent TTLs. When an item expires in the transactional store, it is deleted there, but the analytical store may retain it until the analytical TTL expires (which can be set to -1 for no expiry). This allows long-term analytics on data that has been purged from the live transactional store.",difficulty:"Hard"},
{q:"A Cosmos DB container uses the SQL API. A developer writes: SELECT c.name, COUNT(1) as total FROM c GROUP BY c.category. The query returns results but takes 10x longer than expected and consumes enormous RU. What is the issue?",options:["GROUP BY is not supported in the Cosmos DB SQL API","The query is a cross-partition query that fans out to all physical partitions and performs aggregation at the client side for cross-partition GROUP BY — the SDK aggregates results from all partitions","GROUP BY requires a composite index on the grouped property","The query is using the wrong API — GROUP BY requires the Gremlin API"],answer:1,explanation:"Cross-partition GROUP BY queries fan out to all physical partitions. Each partition executes the GROUP BY independently, and the SDK aggregates the partial results. This consumes RU proportional to the number of partitions and all data scanned. For frequent aggregations, consider pre-aggregating data, using Synapse Link for analytics, or ensuring queries filter by partition key to stay in-partition.",difficulty:"Hard"},
{q:"You have a Cosmos DB container with 1,000,000 items. You need to update the 'status' field on all items from 'pending' to 'active'. What is the MOST efficient approach?",options:["Write a stored procedure that updates all items in one transaction","Use the Bulk Executor library / SDK bulk operations to update items in parallel with optimized batching","Write a SQL UPDATE statement: UPDATE c SET c.status = 'active' WHERE c.status = 'pending'","Use the change feed to detect all items and update them one by one"],answer:1,explanation:"Cosmos DB SQL API does not support bulk UPDATE statements. The most efficient approach for mass updates is to use the Cosmos DB SDK's bulk operations mode, which sends concurrent requests with high parallelism and handles RU throttling automatically. A single-item loop would be too slow. Stored procedures are per-partition and have time limits.",difficulty:"Hard"},
{q:"Your application uses strong consistency in a single-region Cosmos DB account. The business decides to add a second read region for lower latency. What happens to strong consistency?",options:["Strong consistency works transparently across both regions — no configuration change needed","Adding a second region while keeping strong consistency is only supported if you also enable multi-region writes","Strong consistency is only supported for single-region accounts or multi-region accounts without multi-region writes enabled — adding a second region with strong consistency increases read latency as reads must synchronize across regions","Strong consistency automatically downgrades to bounded staleness when multiple regions are added"],answer:2,explanation:"Strong consistency is supported in multi-region accounts ONLY when all writes go to a single write region. Adding a second region with strong consistency means all reads go through the write region to get the latest committed value — increasing read latency. To get consistent reads from the second region, use a weaker consistency level.",difficulty:"Hard"},
{q:"A Cosmos DB container stores 50 billion events. Queries for the last 24 hours execute in milliseconds; queries for the last 30 days take minutes. What is the most likely cause?",options:["Cosmos DB degrades query performance for containers with more than 10 billion items","The container likely has a time-based partition key — queries for 24 hours hit a few hot partitions while 30-day queries fan out to ~30 partition key values, each requiring cross-partition query overhead","The 30-day queries are limited by network bandwidth, not Cosmos DB performance","Queries beyond 7 days are automatically redirected to cold storage"],answer:1,explanation:"If the partition key is date-based (e.g., YYYY-MM-DD), a 24-hour query hits 1-2 partitions while a 30-day query fans out to ~30 partitions, consuming proportionally more RU and time. Date-based partition keys cause hot partitions for recent data. Consider synthetic partition keys (e.g., hash of entity ID) combined with time-based secondary indexes.",difficulty:"Hard"},
{q:"You use Cosmos DB change feed to process events in order. You notice that events for the same document are sometimes processed out of order across different consumer instances. What is the cause?",options:["Change feed does not guarantee any ordering — use Cosmos DB triggers instead","Change feed guarantees ordering within a single logical partition — events for the same document (same partition key) are always in order. However, if events for the same partition key are processed by different consumer instances due to partition rebalancing, you may see out-of-order processing temporarily","Change feed ordering requires you to set the consistencyLevel to Strong","Events are out of order because you are using the push model — the pull model provides ordering guarantees"],answer:1,explanation:"Change feed events are ordered within a logical partition (same partition key). If a partition rebalances between consumer instances, there may be brief processing gaps or apparent reordering during the transition. The Change Feed Processor handles rebalancing, but your consumer code should handle idempotency for the transition period.",difficulty:"Hard"},
{q:"A Cosmos DB query uses a continuation token for pagination. The application stores the token in a user's browser session. 2 hours later, the user returns and uses the old token. What happens?",options:["The query fails — continuation tokens expire after 15 minutes","The query resumes from where it left off — continuation tokens are durable and do not expire","The token may have become stale — Cosmos DB accepts it but results may include items created after the token was issued","The query starts from the beginning because the user's session expired"],answer:1,explanation:"Cosmos DB continuation tokens are durable and do not have a time-based expiration. They can be stored and reused after arbitrary delays. The query resumes from the position encoded in the token. Note: tokens are not transferable between accounts or containers.",difficulty:"Hard"},
{q:"Your Cosmos DB container has 1,000 RU/s provisioned. During a batch import, the SDK returns HTTP 429 (Too Many Requests). The SDK's built-in retry policy attempts 9 retries with exponential backoff. What is the total elapsed time before the operation fails?",options:["9 seconds — each retry waits exactly 1 second","The total time depends on the RetryAfter header from Cosmos DB which tells the SDK how long to wait before each retry — total can range from seconds to minutes","4.5 seconds — the default backoff doubles from 100ms to 100ms × 2^9","The operation never fails — the SDK retries indefinitely by default"],answer:1,explanation:"When Cosmos DB returns 429, it includes a x-ms-retry-after-ms header indicating the recommended wait time. The SDK uses this value for each retry delay (not a fixed backoff). The default MaxRetryAttemptsOnRateLimitedRequests is 9, and MaxRetryWaitTimeInSeconds is 30 seconds. After 9 retries or 30 seconds, the SDK throws the exception.",difficulty:"Hard"},
{q:"You need to implement a Cosmos DB query that returns all orders where status='completed' AND amount > 1000. The container is partitioned by customerId. What type of query is this, and what is its cost characteristic?",options:["This is a point read — it targets a specific document by id and partition key","This is a cross-partition query — it fans out to all physical partitions since neither filter targets the partition key; cost scales with the number of partitions","This is an in-partition query — the SDK automatically routes it to the correct partition","This is a non-index query — Cosmos DB scans all documents sequentially"],answer:1,explanation:"Since neither status nor amount is the partition key (customerId is), this query cannot be routed to a specific partition. It fans out to ALL physical partitions, each executing the query independently. The total RU cost scales linearly with the number of physical partitions. To make this an in-partition query, include customerId='...' in the WHERE clause.",difficulty:"Hard"},
{q:"A Cosmos DB account has geo-redundant backups configured (periodic backup mode). The database is accidentally deleted. How do you restore it?",options:["Use the Azure portal to undo the delete operation within 5 minutes","Submit a support request to Microsoft — periodic backup restores require a support ticket; you cannot self-serve restore in periodic mode","Use the Azure CLI: az cosmosdb restore command to restore to a new account","Restore is automatic — Cosmos DB detects the deletion and restores from backup within 15 minutes"],answer:1,explanation:"Periodic backup mode restores in Cosmos DB are NOT self-service — you must submit an Azure Support request. Microsoft performs the restore to a new Cosmos DB account (not in-place). For self-service point-in-time restore, upgrade to Continuous backup mode, which supports the az cosmosdb restore command.",difficulty:"Hard"},
{q:"A Cosmos DB container has an indexing policy excluding all properties except 'id' and 'pk'. A query filters on a non-indexed 'status' property. What happens?",options:["The query fails with an error stating the property is not indexed","The query executes but performs a full partition scan (document scan), consuming more RU than an indexed query","The property is indexed dynamically when first queried","The query is automatically routed to the analytical store"],answer:1,explanation:"Cosmos DB allows querying on non-indexed properties, but the query engine cannot use the index for those properties and must scan all documents in the targeted partition(s). This is significantly more expensive in RU than indexed queries. For frequently queried properties, always ensure they are included in the indexing policy.",difficulty:"Hard"},
{q:"You use the Cosmos DB Gremlin API to store a social network graph. You execute a traversal to find all friends-of-friends for a user. The traversal times out. What is the most likely cause?",options:["Gremlin API only supports traversals up to 2 hops deep","The traversal is a complex multi-hop graph traversal that fans out exponentially. Without proper filtering (e.g., limiting hops or using .hasLabel()), the traversal may examine millions of vertices/edges, causing a timeout","Cosmos DB Gremlin API does not support friends-of-friends patterns — use the SQL API instead","The traversal requires dedicated provisioned throughput — the serverless Cosmos DB account does not support Gremlin API"],answer:1,explanation:"Graph traversals can fan out exponentially — friends-of-friends might return thousands of results. Without limits (e.g., .limit(100)), fold operations, or filtering by labels/properties, the traversal engine examines a huge number of vertices and edges, consuming excessive RU and hitting query timeout. Always add .limit() and filter conditions to deep traversals.",difficulty:"Hard"},
{q:"A Cosmos DB query reads 10,000 items across 100 pages using a continuation token. The application processes each page synchronously. How can performance be improved?",options:["Increase the page size to 1,000,000 items per page","Use async iteration and process pages concurrently using the FeedIterator with parallel tasks","Use the change feed instead of a SQL query for pagination","Enable bulk mode on the Cosmos DB client"],answer:1,explanation:"For large result sets, process pages concurrently using the FeedIterator in async mode. While the current page is being processed, the next page can be pre-fetched. Additionally, consider parallel query execution (MaxConcurrency setting) which queries multiple partitions concurrently. This significantly reduces total elapsed time for large cross-partition queries.",difficulty:"Hard"},
{q:"You want to migrate data from Azure Table Storage to the Cosmos DB Table API. Which statement about compatibility is correct?",options:["Cosmos DB Table API is 100% wire-compatible with Azure Table Storage — just change the connection string","Cosmos DB Table API supports most Azure Table Storage operations but has key differences: it provides global distribution, multiple consistency levels, and automatic indexing, but has higher per-operation cost and some operational differences","Cosmos DB Table API requires all partition keys to be GUIDs — string partition keys are not supported","You must first export data to JSON and use the Cosmos DB data migration tool"],answer:1,explanation:"Cosmos DB Table API is largely compatible with Azure Table Storage (same SDK/connection string), but differs in: it provides global distribution, multiple consistency levels, and SLA. However, it costs more per operation, has different throttling behavior (RU-based vs Azure Table Storage's elastic), and has minor API differences. Direct connection string swap works for most scenarios.",difficulty:"Hard"},
{q:"A Cosmos DB container uses bounded staleness consistency with a staleness window of 5 seconds. A client writes an item, then immediately reads it from a different region. What does the client read?",options:["Always the most recent write — bounded staleness guarantees immediate consistency","The read may return a version that is at most 5 seconds old — the client may or may not see its own write depending on replication lag","The client always sees its own write because they are using the same account","The read fails if the item was written less than 5 seconds ago"],answer:1,explanation:"Bounded staleness guarantees that reads are at most K versions or T time behind the latest write. A read from a different region may see a version that is up to the configured staleness window old. Unlike Session consistency, it does NOT guarantee 'read your own writes' from a different client/region — Session consistency is needed for that guarantee.",difficulty:"Hard"},
{q:"A Cosmos DB container stores 100 GB of data. You enable the analytical store with Synapse Link. What is the write overhead for enabling the analytical store?",options:["2x write RU cost — each write to the transactional store also writes to the analytical store consuming equal RU","No additional RU cost to the transactional store — the analytical store is populated asynchronously from the change feed without consuming provisioned RU/s","50% overhead on write RU — the analytical store uses a compressed columnar format that halves the overhead","Enabling the analytical store requires provisioning dedicated RU/s for the analytical workload"],answer:1,explanation:"The Cosmos DB analytical store is populated asynchronously from the transactional change feed. This replication does NOT consume the container's provisioned RU/s — there is no RU overhead on transactional operations. Analytical queries against the analytical store do not consume transactional RU either.",difficulty:"Hard"},
{q:"You run: SELECT c.id FROM c in a Cosmos DB container with 50 physical partitions. The query has no WHERE clause. What is the approximate query cost?",options:["Very cheap — selecting only the id field reduces RU consumption to near zero","Expensive — a full scan of all 50 partitions is performed; cost scales with total data size and partition count","Exactly 1 RU — SELECT id queries are optimized to use the id index","The query is rejected — full container scans without a partition key filter are not allowed"],answer:1,explanation:"A query without a WHERE clause (or one that doesn't filter by partition key) is a cross-partition query that fans out to ALL physical partitions, scanning all documents. Even though only the id field is projected, the query engine must touch every document to return results. Cost scales with data volume and partition count. This type of query should be avoided on large containers.",difficulty:"Hard"},
{q:"You are using the Cosmos DB .NET SDK v3. You want to ensure that a write operation is acknowledged by at least 2 replicas before returning success. Which setting controls this?",options:["Set the ConsistencyLevel to Strong on the request options","Use ItemRequestOptions with a custom ConsistencyLevel of BoundedStaleness with K=2","The SDK cannot control replica acknowledgment — use multi-region writes instead","Cosmos DB does not expose replica-level acknowledgment settings to the SDK — consistency levels are the abstraction layer for replica acknowledgment"],answer:3,explanation:"Cosmos DB abstracts replica management. You cannot directly specify 'write to N replicas' as in some other databases. Consistency levels control the number of replicas involved in reads and writes (Strong requires synchronous quorum writes), but you cannot set a specific replica count. Use Strong consistency if you need synchronous multi-replica acknowledgment.",difficulty:"Hard"},
{q:"Your Cosmos DB application receives 429 errors with a retryAfter value of 0ms during a batch import. What does this indicate?",options:["retryAfter=0ms means the throttle is not enforced and you can retry immediately","retryAfter=0ms indicates the account has exceeded the per-account request limit (not just the container RU/s) — this is a rare global account throttle","retryAfter=0ms is a bug in the Cosmos DB SDK","The container has run out of storage and is throttling writes"],answer:1,explanation:"A retryAfter value of 0ms from a 429 response typically indicates an account-level throttle (as opposed to container-level RU throttle which has a positive retryAfter). This can occur when the account exceeds global account-level limits. Contact Azure Support if this occurs during expected workloads.",difficulty:"Hard"}

{q:"An APIM policy is configured at the API level with a rate-limit-by-key policy in the inbound section and a set-header policy in the outbound section. A request comes in that triggers the rate limit. Which sections execute?",options:["All sections execute including backend and outbound","Only the inbound section executes; on-error is triggered after rate limit is exceeded","Only the inbound section executes; the request is rejected with 429 before reaching backend or outbound","The backend executes, returns an error, which triggers the on-error section"],answer:2,explanation:"When a policy in the inbound section throws (or explicitly rejects a request), pipeline execution stops at that point. The backend is NOT called, and the outbound section does NOT execute. The on-error section executes only if there is an error — rate-limit rejection uses return-response, which stops pipeline execution with the configured 429 response.",difficulty:"Hard"},
{q:"You need to rate-limit API calls per subscription key to 100 calls per minute, and additionally limit all calls in a product to 10,000 calls per month. Which policies should you use?",options:["Two rate-limit-by-key policies with different counter keys and time windows","rate-limit-by-key for per-minute limit and quota-by-key for the monthly limit","Two quota-by-key policies at different scopes","rate-limit at API scope and quota at product scope without -by-key variants"],answer:1,explanation:"rate-limit-by-key is for short-term rate limiting (calls per second or minute). quota-by-key is for longer-period limits (calls per month). Use rate-limit-by-key with counter-key=subscription key for 100/minute, and quota-by-key with counter-key=product key for 10,000/month.",difficulty:"Hard"},
{q:"An APIM policy needs to validate an OAuth 2.0 Bearer token from Azure AD. The token must have the 'api.read' scope. Which policy configuration is correct?",options:["Use the <check-header> policy to verify the Authorization header contains 'Bearer'","Use the <validate-jwt> policy with the appropriate openid-config URL and a required-claims element checking the scp or roles claim","Use the <authenticate-managed-identity> policy to validate Azure AD tokens","Use the <ip-filter> policy combined with <validate-client-certificate> for OAuth validation"],answer:1,explanation:"The <validate-jwt> policy verifies JWT tokens (including Azure AD tokens). Configure it with the openid-config URL (e.g., https://login.microsoftonline.com/{tenant}/v2.0/.well-known/openid-configuration), set require-expiration-time=true, and add a <required-claims> element checking the scp claim for 'api.read'.",difficulty:"Hard"},
{q:"You configure server-side caching in APIM using cache-lookup and cache-store policies. Requests with different query string parameters are caching the same response. How do you ensure each unique query string gets its own cache entry?",options:["Add vary-by-header for the query string headers","Add a vary-by-query-parameter element for each parameter you want to vary caching on","Set the caching-type to 'external' to use Redis for proper query string differentiation","Disable caching and implement it at the backend service"],answer:1,explanation:"By default, APIM caches without considering query string parameters. Add <vary-by-query-parameter>paramName</vary-by-query-parameter> elements inside the <cache-lookup> policy for each parameter that should result in separate cache entries.",difficulty:"Hard"},
{q:"A developer portal user reports that calling an API through APIM returns a mock response instead of the real backend response. The API has been 'published' and the backend URL is correctly configured. What policy is likely causing this?",options:["The <forward-request> policy is missing from the backend section","A <mock-response> policy is present in the inbound section — it returns a hardcoded response and never calls the backend","The backend URL uses HTTP instead of HTTPS, causing APIM to mock the response","The product subscription is not approved, causing APIM to return a mock error"],answer:1,explanation:"The <mock-response> policy short-circuits the request pipeline and returns a hardcoded response without calling the backend. If a developer accidentally left a mock-response policy in inbound during testing, it would continue to intercept all requests. Check the API's effective policy (which shows the merged policy hierarchy) for a mock-response.",difficulty:"Hard"},
{q:"You need to add a custom header 'X-Request-Id' to all outbound responses from APIM. The value should be a new GUID for each request. Which policy expression achieves this?",options:["<set-header name='X-Request-Id' exists-action='override'><value>@(context.RequestId)</value></set-header>","<set-header name='X-Request-Id' exists-action='override'><value>@(Guid.NewGuid().ToString())</value></set-header>","<set-header name='X-Request-Id' exists-action='override'><value>guid()</value></set-header>","<add-header name='X-Request-Id'><value>@(context.Request.Headers['X-Request-Id'])</value></add-header>"],answer:1,explanation:"APIM policy expressions use C# inline within @(). Guid.NewGuid().ToString() generates a new GUID per request. context.RequestId is the APIM internal correlation ID (useful but not a new GUID each time). The exists-action='override' replaces any existing header.",difficulty:"Hard"},
{q:"You need APIM to conditionally route requests to backend-v1 or backend-v2 based on a query parameter 'version'. Which policy implements conditional routing?",options:["<route> policy with path-based routing rules","<choose> policy with <when> conditions checking context.Request.OriginalUrl.Query","<forward-request> policy with a dynamic URL expression","<backend> policy with version-based URL selection"],answer:1,explanation:"The <choose> policy is APIM's conditional branching mechanism. Use <when condition=\"@(context.Request.OriginalUrl.Query.GetValueOrDefault('version') == 'v2')\"> to check the version parameter and inside use <set-backend-service> to switch the backend URL.",difficulty:"Hard"},
{q:"An APIM policy in the inbound section needs to call an external token endpoint to get a bearer token before forwarding the request to the backend. Which policy should be used?",options:["<authenticate-managed-identity> policy in the inbound section","<send-request> policy to call the token endpoint, then store the token in a variable, then use <set-header> to add the Authorization header","<forward-request> policy with an additional HTTP call to the token endpoint","<validate-jwt> policy configured to fetch the token automatically"],answer:1,explanation:"<send-request> allows APIM to make an additional HTTP call (e.g., to fetch a token) during policy processing. Store the response in a context variable using the response variable, extract the token, then add it to the request headers using <set-header> before forwarding to the backend.",difficulty:"Hard"},
{q:"You need APIM to immediately return a custom 503 response without calling the backend when a backend health check fails. Which policy achieves this?",options:["<reject-request> policy in the inbound section","<return-response> policy with a <status-code> of 503 — this terminates the pipeline immediately with the specified response","<set-status> policy with code 503 — this sets the response code without calling the backend","<mock-response> policy with status code 503"],answer:1,explanation:"<return-response> terminates the policy pipeline immediately and returns the specified response to the caller without calling the backend. It is distinct from <mock-response> which is for testing. Use <return-response> in circuit breaker patterns or health-check-based routing.",difficulty:"Hard"},
{q:"An APIM instance is in the Consumption tier. A developer wants to access the built-in developer portal to publish API documentation. What issue will they encounter?",options:["The Consumption tier does not include the developer portal — use the Developer or higher tier for the built-in portal","The Consumption tier developer portal requires Azure AD B2C integration to work","The Consumption tier developer portal only supports 10 concurrent users","The Consumption tier developer portal is available but does not support custom domains"],answer:0,explanation:"The Consumption tier of APIM is serverless and designed for lightweight scenarios. It does NOT include the built-in developer portal. For the developer portal, use the Developer, Basic, Standard, or Premium tier. The Developer tier (non-SLA) is the cheapest option that includes the developer portal.",difficulty:"Hard"},
{q:"You publish two major versions of an API in APIM: v1 (stable) and v2 (new). Existing clients use v1. You want them to continue using v1 without changes, while new clients use v2. How does APIM versioning work in this scenario?",options:["Delete v1 and set v2 as the current version — clients must update their URLs","Create a version set with URL-based versioning. v1 consumers call /v1/endpoint and v2 consumers call /v2/endpoint — both versions coexist in the same version set","Use revisions to create v2 alongside v1 — revisions support simultaneous traffic to multiple versions","Configure A/B testing in APIM to gradually migrate v1 clients to v2"],answer:1,explanation:"APIM Versioning allows multiple API versions to coexist under a version set. URL-based versioning adds a version segment (/v1/, /v2/). Consumers call the explicit version they need. Revisions are for non-breaking changes within a version, not for major version coexistence. Versions in a version set each have their own subscription requirements.",difficulty:"Hard"},
{q:"A colleague creates a new APIM revision. After testing, they want to make it the current public revision. What is the correct process?",options:["Delete the old current revision and the new revision automatically becomes current","In the Revisions tab, set the new revision as Current — this makes the non-versioned API URL point to the new revision with no downtime; the old revision remains accessible via its revision URL","Publish the new revision to a separate product, then update the product to include only the new revision","Revisions cannot be promoted to current — you must create a new API version instead"],answer:1,explanation:"APIM revisions allow non-breaking changes to be deployed and tested before going live. Setting a revision as 'Current' updates the canonical (non-revision-specific) URL to point to the new revision. Previous revisions remain accessible at their revision-specific URL (;rev=N), allowing rollback.",difficulty:"Hard"},
{q:"An APIM policy references a named value 'DatabaseConnectionString' backed by Azure Key Vault. The Key Vault secret is rotated. What must happen for APIM to use the new secret value?",options:["APIM automatically polls Key Vault every 4 hours and picks up the new value","You must manually update the named value in APIM to trigger a refresh from Key Vault","Key Vault-backed named values are refreshed automatically when the APIM service detects the secret has changed, which can take up to 4 hours","You must rotate the APIM managed identity credential to force a re-read of the secret"],answer:1,explanation:"Key Vault-backed named values in APIM use a cache with a 4-hour TTL. After rotating the Key Vault secret, you may need to manually sync the named value in APIM (via portal or API) to immediately use the new value. The automatic refresh happens within 4 hours during the normal cache expiry cycle.",difficulty:"Hard"},
{q:"You deploy APIM with an External VNet integration. APIs are callable from the internet. Internal services in the VNet should be reachable as backends. What does External VNet mode enable?",options:["APIM gateway is only accessible from within the VNet — the developer portal and management endpoints are public","APIM gateway is accessible from the internet AND can call backends within the VNet. Management endpoints are also accessible from the internet","APIM gateway is in the VNet but cannot reach the internet for outbound calls","External VNet mode only applies to the developer portal, not the API gateway"],answer:1,explanation:"APIM External VNet mode injects APIM into the VNet for outbound connectivity to VNet resources (private backends), while keeping the gateway, developer portal, and management endpoints publicly accessible from the internet. Internal VNet mode makes all APIM endpoints private (accessible only within the VNet/ExpressRoute).",difficulty:"Hard"},
{q:"An APIM policy expression needs to check whether the caller's IP address is in the 10.0.0.0/8 private range. Which expression is correct?",options:["@(context.Request.IpAddress.StartsWith('10.'))","@(System.Net.IPAddress.Parse(context.Request.IpAddress).MapToIPv4().GetAddressBytes()[0] == 10)","@(context.Request.IpAddress.Contains('10.0'))","@(context.Request.IpAddress == '10.0.0.0/8')"],answer:1,explanation:"APIM policy expressions use C# (in .NET Standard subset). To check if an IP is in the 10.x.x.x range, parse it as IPAddress, map to IPv4, check the first byte equals 10. The <ip-filter> policy is a simpler alternative for IP-based restriction without writing expression code.",difficulty:"Hard"},
{q:"An APIM instance sends API request logs to Application Insights. Under high load, you notice that only a small percentage of requests appear in Application Insights logs. What is the most likely cause?",options:["APIM has a built-in sampling rate for Application Insights diagnostics — configure the sampling rate in the diagnostics settings","Application Insights has a 5 GB/day ingestion limit causing data loss","APIM only logs failed requests to Application Insights by default","Network connectivity issues between APIM and Application Insights are dropping telemetry"],answer:0,explanation:"APIM's Application Insights integration has a built-in sampling rate (default: 100% but configurable). Under high load, sampling may be set to reduce telemetry volume and cost. Check the APIM diagnostic settings for the Application Insights logger and verify the sampling parameter is not set to a low value.",difficulty:"Hard"},
{q:"You need APIM to retry a failed backend request up to 3 times if the backend returns a 503 or connection error, with a 2-second wait between retries. Which policy is correct?",options:["<retry condition='@(context.Response.StatusCode == 503)' count='3' interval='2' />","<retry condition='@(context.Response.StatusCode == 503 || context.LastError != null)' count='3' interval='2'><forward-request /></retry>","Configure retry in the host.json of the Azure Function backing the API","Use the APIM circuit breaker policy with a retry count of 3"],answer:1,explanation:"The <retry> policy wraps any policy block (typically <forward-request>) and retries it based on a condition. The condition evaluates after each attempt using context.Response and context.LastError. Include <forward-request> inside the retry block to retry the actual backend call.",difficulty:"Hard"},
{q:"You want to transform a SOAP XML response from a legacy backend into JSON for REST clients via APIM. Which approach is correct?",options:["Enable SOAP-to-REST transformation in the APIM backend settings","Use the <xml-to-json> policy in the outbound section to convert the XML response to JSON after receiving it from the SOAP backend","Use the <convert-soap-to-rest> policy in the inbound section","APIM cannot transform SOAP responses — use Azure Logic Apps for SOAP-to-REST transformations"],answer:1,explanation:"The <xml-to-json> policy converts XML responses to JSON in the outbound section. For full SOAP-to-REST transformation, also use the <rewrite-uri> and <set-header> policies in the inbound section to map REST routes to SOAP actions. APIM has built-in SOAP support when importing WSDL.",difficulty:"Hard"},
{q:"An APIM policy needs to restrict API access to requests originating from Azure Data Factory. You do not want to use IP filtering as ADF IPs can change. What is the BEST approach?",options:["Use a validate-jwt policy to check for an ADF-specific token","Configure mutual TLS — require ADF to present a client certificate in all requests, and validate the certificate in the validate-client-certificate policy","Use the ip-filter policy with the ADF service tag IP range","Create a named value with ADF's managed identity and check it in an expression"],answer:1,explanation:"Mutual TLS with client certificates is the recommended approach for service-to-service authentication when you cannot rely on IP addresses. Configure ADF to present a client certificate, upload the trusted CA to APIM, and use the <validate-client-certificate> policy in APIM to authenticate requests from ADF.",difficulty:"Hard"},
{q:"An APIM developer portal is deployed. The API operations are visible but unauthenticated users can see all API details including sensitive endpoints. What configuration controls access to API documentation in the developer portal?",options:["Set all APIs to 'Private' to hide them from unauthenticated users","Associate APIs with Products that have the 'Requires subscription' setting enabled and mark products as 'Not published' for restricted APIs","Configure CORS on the developer portal to block external access","Use Azure AD B2C conditional access to restrict developer portal access"],answer:1,explanation:"In APIM, Products control API visibility and access. APIs in a published product with 'Requires subscription' are visible to subscribed users. To hide sensitive APIs from unauthenticated portal visitors, associate those APIs with an unpublished product or require users to sign in before accessing the portal.",difficulty:"Hard"},
{q:"You need the APIM self-hosted gateway to run on-premises to proxy traffic to internal services. The on-premises environment has no outbound internet access. What does the self-hosted gateway require to function?",options:["The self-hosted gateway requires outbound internet access to the APIM control plane to receive configuration and policy updates","The self-hosted gateway can operate in fully disconnected mode without any connection to the APIM control plane","The self-hosted gateway only needs inbound access from internet clients — no outbound connectivity needed","The self-hosted gateway requires a direct Azure ExpressRoute connection"],answer:0,explanation:"The APIM self-hosted gateway requires outbound HTTPS connectivity to the APIM control plane (Azure) to fetch API configurations, policies, certificates, and connectivity data. Without this connection, the gateway cannot receive policy updates. Local caching means brief outages are tolerated, but prolonged disconnection causes stale configuration.",difficulty:"Hard"},
{q:"A policy expression accesses context.Variables[\"userId\"] but the variable was set in the inbound section using <set-variable>. The outbound policy throws a KeyNotFoundException. What is the cause?",options:["context.Variables is read-only in the outbound section","If the request is rejected in the inbound or backend section before the set-variable executes, the variable may not be set. Alternatively, if an error occurred in inbound, on-error executes instead of outbound","Variables set in inbound are not available in outbound — use context.Request.Headers instead","The variable name is case-sensitive — 'userId' must be lowercase 'userid'"],answer:1,explanation:"Variables set with <set-variable> in inbound are available in outbound, backend, and on-error sections. However, if the pipeline execution was interrupted (e.g., by a rejected request or error in inbound), the variable may not be set by the time outbound runs. Use context.Variables.ContainsKey('userId') check or handle the KeyNotFoundException.",difficulty:"Hard"},
{q:"You want to add CORS support to an APIM API so that browser-based SPAs from https://myapp.com can call it. Where should the CORS policy be placed?",options:["In the outbound section of each individual API operation","In the inbound section at the global or product level, or on the specific API — CORS must be in the inbound section to handle preflight OPTIONS requests before they reach the backend","In the backend section to apply CORS headers to backend responses","In the on-error section to add CORS headers to error responses"],answer:1,explanation:"CORS policy must be in the inbound section because browser preflight OPTIONS requests must be handled before reaching the backend. APIM's <cors> policy responds to OPTIONS requests with appropriate headers. Place it at the global level (all APIs policy) to apply uniformly, or at the individual API level for specific origins.",difficulty:"Hard"},
{q:"An APIM instance has the request trace feature enabled. A developer sends a request with the Ocp-Apim-Trace: true header but does not receive trace information in the response. What is the issue?",options:["Ocp-Apim-Trace is only supported in the Developer tier, not Standard or Premium","Starting with APIM API version 2023-05-01, tracing requires generating a trace token via the debug session API — the Ocp-Apim-Trace header alone no longer works without this token","The trace header must be sent with the subscription key header as well","APIM only traces requests that result in an error"],answer:1,explanation:"In newer APIM API versions (2023-05-01+), the tracing model changed. You must first create a debug session via the APIM management API to get a trace token, then include that token in the Ocp-Apim-Trace header. The old approach of just setting Ocp-Apim-Trace:true no longer returns trace data in the response.",difficulty:"Hard"},
{q:"An APIM policy needs to add a response header 'X-Cache' with value 'HIT' when the response is served from cache. How can the policy detect if a cache hit occurred?",options:["Check context.Response.Headers['X-Cache'] for the value set by the cache-lookup policy","Use context.Variables['isCachingOn'] which is automatically set by the cache-lookup policy","In the outbound section, check context.Response.Headers.ContainsKey('Age') — a cache hit response includes an Age header","Check the context.Request.IsForward property — it is false for cache hits"],answer:2,explanation:"When APIM serves a cached response, it does not call the backend (the forward-request policy is skipped). The response will have headers set by the cache-store policy on the original request, including Age. You can use a <choose> policy to check for the Age header or other cache indicators to conditionally set custom headers.",difficulty:"Hard"},
{q:"You have APIM configured with an API that calls a backend taking 5-10 seconds per request. Under high load, callers receive 504 Gateway Timeout errors. What is the APIM configuration to increase the backend timeout?",options:["Set the max-timeout attribute on the <forward-request> policy: <forward-request timeout='30' />","Increase the 'Backend service timeout' setting in the APIM product settings","Configure an Azure Application Gateway with a longer idle timeout in front of APIM","Backend timeout is hardcoded to 10 seconds in APIM Consumption tier — upgrade to Standard tier"],answer:0,explanation:"The <forward-request> policy has a timeout attribute (in seconds) that controls how long APIM waits for the backend to respond. The default is 240 seconds for most tiers. If you see 504 errors, check if there's a custom forward-request with a low timeout, or configure it explicitly: <forward-request timeout='30' />.",difficulty:"Hard"},
{q:"You want to version an APIM API using HTTP headers (Accept-Version: v1 or v2) rather than URL paths. Which versioning scheme should you choose when creating the version set?",options:["URL path versioning — it is the only supported scheme","Header versioning — specify the header name to use for version selection in the version set configuration","Query string versioning with a custom header name","Fragment-based versioning using the URL hash"],answer:1,explanation:"APIM version sets support three versioning schemes: URL path (/v1/), query string (?version=v1), and header (Accept-Version: v1). Header versioning allows API consumers to specify the version in a request header. The header name is configurable in the version set.",difficulty:"Medium"},
{q:"An APIM Consumption tier instance needs to use a managed identity to call Azure Key Vault for a secret used in a policy. What is required?",options:["Consumption tier does not support managed identities — use a service principal","Enable system-assigned managed identity on the APIM instance and grant the identity 'Key Vault Secrets User' role on the Key Vault","Managed identities in APIM only work for outbound backend calls, not policy expressions","You must provide the Key Vault client ID and secret as named values"],answer:1,explanation:"APIM supports system-assigned and user-assigned managed identities across all tiers including Consumption. Enable the managed identity on the APIM instance, grant it 'Key Vault Secrets User' role (or access policy Get permission) on the Key Vault, then reference the Key Vault in a named value or use it directly in the <authentication-managed-identity> policy.",difficulty:"Hard"},
{q:"You create a product in APIM with 'Requires subscription' set to true and 'Requires approval' set to true. A developer signs up for the product in the developer portal. What happens?",options:["The developer immediately receives a subscription key","The developer's subscription request is placed in a pending state and must be approved by an APIM administrator before a subscription key is issued","The developer receives a temporary 24-hour key pending approval","The subscription is rejected automatically — 'Requires approval' blocks all new subscriptions"],answer:1,explanation:"When 'Requires approval' is enabled on a product, subscriptions are placed in a 'Pending' state. An APIM administrator or publisher must explicitly approve the subscription in the publisher portal before the developer receives an active subscription key.",difficulty:"Medium"},
{q:"An API imported into APIM from an OpenAPI 3.0 specification has a backend URL of https://internal-api.company.com. You want APIM to strip the /api/v1 path prefix before forwarding to the backend. Which policy achieves this?",options:["<strip-prefix> policy in the inbound section","<rewrite-uri> policy: <rewrite-uri template='/' copy-unmatched-params='true' /> combined with <set-backend-service base-url='https://internal-api.company.com' />","<url-encode> policy to transform the path","<set-variable> to modify context.Request.Url"],answer:1,explanation:"The <rewrite-uri> policy changes the URL path forwarded to the backend. By setting the template to a different path, you strip or rewrite the API prefix. Combined with <set-backend-service>, you have full control over what URL APIM calls on the backend.",difficulty:"Hard"},
{q:"APIM has a soft-delete feature. An APIM service instance is accidentally deleted. How long do you have to recover it?",options:["APIM instances cannot be recovered once deleted — recreate it from ARM templates","You have 48 hours to restore a soft-deleted APIM instance using the az apim deletedservice restore CLI command","Soft delete is not enabled by default — you must have opted in when creating the instance","Azure Backup is required for APIM recovery — soft delete does not protect API configurations"],answer:1,explanation:"APIM has a soft-delete mechanism (enabled by default for API versions 2020-06-01 and above). Deleted APIM instances are retained for 48 hours and can be restored using: az apim deletedservice restore --location {location} --service-name {name}. After 48 hours, the instance is permanently deleted.",difficulty:"Hard"},
{q:"A developer calls an APIM endpoint and receives a 401 Unauthorized response before any policy executes. What is the most likely cause?",options:["A validate-jwt policy in the global policy scope is rejecting the request","The subscription key is missing or invalid — APIM validates subscription keys before executing policies","The APIM gateway is in maintenance mode and rejecting all requests","The developer's IP address is blocked by an IP filter policy at the global scope"],answer:1,explanation:"APIM validates subscription keys before executing any policy pipeline. If an API or product requires a subscription key (Ocp-Apim-Subscription-Key header or api-key query parameter) and the key is missing or invalid, APIM returns 401 before any policy code executes. Check that the correct subscription key is being sent.",difficulty:"Medium"},
{q:"You need APIM to call a backend that requires mutual TLS (mTLS). The backend validates the client certificate. Where do you configure the client certificate in APIM?",options:["Add the certificate in the 'Certificates' section of the APIM instance and reference it in the backend entity's credentials","Configure the client certificate directly in the <forward-request> policy header","Add the certificate to the APIM gateway's TLS settings under the Security blade","The backend must add APIM's auto-generated certificate to its trust store — no APIM configuration needed"],answer:0,explanation:"For mTLS to backend services: upload the client certificate to APIM (Certificates section), then configure the backend entity in APIM to use that certificate as the client credential. APIM presents this certificate when establishing TLS connections to the backend. The backend must trust the certificate's CA.",difficulty:"Hard"},
{q:"An APIM policy expression uses a Liquid template to transform a JSON request body. The template accesses {{body.user.name}}. During testing, the response contains empty values for all Liquid variables. What is the most likely cause?",options:["Liquid templates in APIM only work for XML — use xsl-transform for JSON","The request body must be buffered before Liquid transformation — add <set-body> policy with a buffer option, or ensure the body content type is application/json and the body has been read","Liquid templates are only available in Premium tier APIM","The double curly brace syntax is incorrect — APIM Liquid uses single curly braces"],answer:1,explanation:"Liquid templates require the request body to be available as a parsed object. Ensure the Content-Type is application/json and the body has been read into context.Request.Body. If the body was already consumed (e.g., by a previous policy), the Liquid template finds empty data. Use @(context.Request.Body.As<JObject>()) or ensure proper body buffering.",difficulty:"Hard"},
{q:"You need APIM to serve as a gateway for a gRPC backend service. Which APIM tier supports gRPC API proxying?",options:["All APIM tiers support gRPC natively","gRPC is only supported in APIM Premium tier due to HTTP/2 requirements","As of 2023, APIM supports gRPC pass-through in Developer, Basic v2, Standard v2, and Premium tiers — gRPC APIs can be imported from protobuf definitions","gRPC is not supported in APIM — use Azure API Gateway for gRPC workloads"],answer:2,explanation:"Azure APIM added gRPC API support in 2023 for Developer, Basic v2, Standard v2, and Premium tiers. You can import a .proto file to create a gRPC API, and APIM proxies gRPC requests to the backend. The Consumption tier does not support gRPC due to HTTP/2 limitations in its serverless architecture.",difficulty:"Hard"},
{q:"An APIM global policy contains a <set-header> policy. An API-level policy also contains a conflicting <set-header> for the same header name. Which value takes precedence?",options:["The global policy always takes precedence — lower-level policies cannot override it","The API-level policy takes precedence — more specific scopes override less specific scopes in APIM's policy inheritance","The header is set twice — both values appear in a multi-value header","APIM merges both policies — the last set-header in the evaluation order wins"],answer:1,explanation:"In APIM, policies execute in order of specificity: Global → Product → API → Operation. By default, all scopes are merged using <base /> tags. If a more specific scope (API-level) sets a header after the global policy's set-header, the API-level value takes effect. Control merge behavior using the <base /> tag placement in each scope's policy.",difficulty:"Hard"}
]},
"Event Grid, Service Bus & Event Hubs":{icon:"<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><path d='M5 12.55a11 11 0 0114.08 0M1.42 9a16 16 0 0121.16 0M8.53 16.11a6 6 0 016.95 0M12 20h.01'/></svg>",color:"#ca5010",questions:[
{q:"An IoT solution needs to ingest 1 million telemetry events per second from devices worldwide and replay historical data for a new analytics pipeline. Which Azure service is BEST suited?",options:["Azure Service Bus Premium tier with partitioned queues","Azure Event Hubs with Capture enabled — designed for high-throughput event streaming with built-in event replay via offset management","Azure Event Grid with a webhook endpoint for each device","Azure Queue Storage with 64 KB message support for telemetry payloads"],answer:1,explanation:"Event Hubs is designed for high-throughput telemetry ingestion (millions of events/sec). Consumer groups allow multiple independent readers. Capture writes events to Azure Blob Storage or Data Lake for historical replay. Service Bus is for message queuing with ordering guarantees, not high-volume streaming.",difficulty:"Hard"},
{q:"A Service Bus queue has a message with a Time-To-Live (TTL) of 5 minutes. The message is not consumed within 5 minutes. What happens?",options:["The message is permanently deleted from the queue","If a Dead Letter Queue (DLQ) is enabled and the queue's dead-lettering-on-message-expiration property is true, the message is moved to the DLQ; otherwise it is deleted","The message TTL resets to the default TTL","The message remains in the queue but is invisible to consumers"],answer:1,explanation:"Service Bus can be configured with 'dead-lettering on message expiration.' If enabled, expired messages move to the DLQ with a reason of TTLExpiredException. If not enabled, expired messages are silently deleted. The DLQ must be drained separately to prevent accumulation.",difficulty:"Hard"},
{q:"An Event Grid subscription filters events based on a subject ending with '.jpg'. The source publishes events for images (.jpg, .png, .gif). How does Event Grid handle events for .png and .gif files?",options:["Events for .png and .gif are delivered to the subscription with a warning flag","Events not matching the filter are silently dropped — they are not delivered to the subscription","Events not matching the filter are sent to a dead letter destination if configured","Event Grid delivers all events and the subscriber must filter them"],answer:1,explanation:"Event Grid filtering happens at the event grid subscription level. Events that do not match the configured subject or advanced filters are NOT delivered to that subscription — they are silently dropped (or sent to dead letter storage if configured). This reduces unnecessary network traffic to the subscriber.",difficulty:"Medium"},
{q:"A Service Bus topic has 3 subscriptions. Message A is published to the topic. How many times is Message A delivered?",options:["Once — Service Bus delivers each message to only one subscription","Three times — once to each subscription independently; each subscription has its own copy of the message","Three times — but only to the subscription that receives it first, the others get a notification","Once — to the subscription with the most pending messages"],answer:1,explanation:"Service Bus topics implement a pub/sub pattern. Each subscription that matches the message's filter receives an independent copy of the message. With 3 subscriptions and no filters (default: all messages), Message A is delivered 3 times — once to each subscription. This is the core difference between queues (competing consumers) and topics (fan-out).",difficulty:"Medium"},
{q:"Event Hubs Capture stores events as Avro files in Azure Blob Storage. You need to query the captured data using SQL. Which service can query Avro files in Blob Storage directly?",options:["Azure SQL Database with OPENROWSET function","Azure Synapse Analytics serverless SQL pool — it can query Avro files in Blob Storage using OPENROWSET","Azure Stream Analytics with a Blob Storage input","Azure Data Factory with a SQL transform activity"],answer:1,explanation:"Azure Synapse Analytics serverless SQL pool supports querying Avro files in Azure Data Lake/Blob Storage using T-SQL OPENROWSET with FORMAT = 'AVRO'. This allows SQL queries over captured Event Hubs data without loading it into a database.",difficulty:"Hard"},
{q:"You configure an Event Grid subscription with a dead-letter destination to an Azure Blob Storage container. An event delivery attempt fails 30 times over the configured retry period. What happens?",options:["Event Grid retries indefinitely until the subscriber recovers","Event Grid stops retrying and drops the event if no dead-letter destination is configured; otherwise, it moves the event to the dead-letter Blob Storage container","Event Grid moves the event to a Service Bus dead letter queue","Event Grid marks the subscription as failed and stops all delivery to it"],answer:1,explanation:"Event Grid has a retry policy with configurable max delivery attempts (default 30) and event time-to-live (default 1440 minutes). If all retries are exhausted, the event is either dropped (if no dead-letter destination is configured) or moved to the dead-letter destination (Blob Storage container) for later analysis.",difficulty:"Hard"},
{q:"A Service Bus namespace has Geo-disaster recovery (geo-DR) configured. The primary region fails. What is the failover behavior?",options:["Automatic failover occurs within 5 minutes — no action required","Geo-DR failover is manual — you must initiate the failover using the Azure CLI, SDK, or portal. After failover, the secondary namespace becomes the primary and you must update connection strings in applications","Geo-DR is only for metadata replication — message data is NOT replicated and is lost on failover","The secondary namespace automatically becomes primary and messages are automatically migrated"],answer:1,explanation:"Service Bus Geo-DR replicates namespace metadata (queues, topics, subscriptions, entities) to the secondary, but does NOT replicate message data (messages in the queues). Failover is manual. After failover, the alias connection string works, but in-flight messages in the primary are lost. For message replication, use Service Bus Premium with message replication jobs.",difficulty:"Hard"},
{q:"An Event Hubs consumer group has 5 consumer instances. The event hub has 3 partitions. How many partitions can each consumer instance read from?",options:["Each consumer instance reads all 3 partitions","At most 1 partition per consumer instance — but with 5 consumers and 3 partitions, 2 consumers will be idle","The 3 partitions are distributed as evenly as possible; 2 consumers receive 1 partition each and 1 consumer receives the remaining partition — the other 2 consumers are idle","All 5 consumer instances read from all 3 partitions in a round-robin fashion"],answer:1,explanation:"In Event Hubs, each partition can be read by at most ONE consumer within a consumer group at a time. With 3 partitions and 5 consumers, only 3 consumers are active (one per partition); 2 are idle. To utilize all 5 consumers concurrently, you need at least 5 partitions. Partition count cannot be decreased after creation.",difficulty:"Hard"},
{q:"You use Service Bus sessions to process messages in order per customer. Each customer's messages must be processed sequentially by a single consumer. What property must be set on messages?",options:["Set the CorrelationId to the customer ID","Set the SessionId to the customer ID — Service Bus assigns all messages with the same SessionId to the same session, ensuring sequential processing by a single session-aware receiver","Set the PartitionKey to the customer ID","Set the MessageId to the customer ID for deduplication-based ordering"],answer:1,explanation:"Service Bus sessions (FIFO per group) use the SessionId property. All messages with the same SessionId are part of the same logical session and are guaranteed to be processed in order by a single session-aware receiver at a time. Enable sessions on the queue/topic subscription at creation time.",difficulty:"Hard"},
{q:"Event Grid is configured to deliver events to an Azure Function via a webhook. The Function takes 45 seconds to process each event. Event Grid starts retrying the event delivery. Why?",options:["Azure Functions have a 30-second timeout — the function is killed after 30 seconds","Event Grid requires an HTTP 200-202 response within 30 seconds. If the Function takes 45 seconds, Event Grid times out the delivery attempt and marks it as failed, triggering retries","Event Grid rate-limits Function endpoints to 30 seconds","Event Grid only supports asynchronous delivery — synchronous functions cannot receive events"],answer:1,explanation:"Event Grid expects an HTTP 2xx response within 30 seconds of delivering an event to a webhook. If the endpoint doesn't respond in time, Event Grid considers the delivery attempt failed and retries. For long-running processing, immediately return 200 OK and process the event asynchronously (e.g., enqueue to Storage Queue or Service Bus).",difficulty:"Hard"},
{q:"An application sends 1,000 Service Bus messages and then processes them. Occasionally, duplicate messages appear to be processed. What Service Bus feature prevents duplicate processing?",options:["Set the message TimeToLive to a short duration to prevent redelivery","Enable duplicate detection on the queue — Service Bus maintains a message history and discards messages with duplicate MessageIds within the detection window","Use Service Bus sessions to ensure each message is processed exactly once","Enable AutoDeleteOnIdle on the queue to prevent accumulation"],answer:1,explanation:"Service Bus duplicate detection is configured at queue/topic creation by enabling the DuplicateDetectionHistoryTimeWindow. Service Bus stores a hash of each MessageId for the configured window (up to 7 days). If a message with the same MessageId is sent again within the window, it is silently discarded.",difficulty:"Hard"},
{q:"Event Hubs Kafka surface allows Kafka applications to use Event Hubs without code changes. Which Event Hubs tier supports the Kafka endpoint?",options:["Basic tier — the Kafka surface is available in all tiers","Standard and Premium tiers only — the Basic tier does not support the Kafka-compatible endpoint","Premium and Dedicated tiers only — Kafka requires dedicated infrastructure","All tiers including Consumption tier support Kafka-compatible endpoints"],answer:1,explanation:"The Event Hubs Kafka-compatible endpoint is available in the Standard, Premium, and Dedicated tiers. The Basic tier does not support the Kafka surface. Kafka applications can use Event Hubs by pointing the Kafka bootstrap server to the Event Hubs namespace endpoint — no code changes required beyond configuration.",difficulty:"Hard"},
{q:"A Service Bus message fails processing and is dead-lettered. The DLQ message has a DeadLetterReason of 'MaxDeliveryCountExceeded'. What does this mean?",options:["The message exceeded the maximum allowed size (256 KB for Standard tier)","The message was delivered and NACKed the maximum number of times (MaxDeliveryCount), indicating the consumer cannot process it","The message exceeded the maximum TTL duration","The message was dead-lettered manually by the consumer using DeadLetter() API"],answer:1,explanation:"Service Bus tracks the delivery count for each message. When a consumer receives a message and calls Abandon() (or the lock expires), the delivery count increments. When it reaches the MaxDeliveryCount (configurable per queue/subscription, default 10), Service Bus automatically moves the message to the DLQ with reason 'MaxDeliveryCountExceeded'.",difficulty:"Medium"},
{q:"You need to correlate Event Grid events back to your application request. Which event property should you use?",options:["subject — it identifies the resource that raised the event","id — a unique identifier for the event, but not tied to application requests","dataVersion — identifies the schema version of the event data","You must include your correlation ID in the event data payload — Event Grid schema fields are managed by the event source"],answer:3,explanation:"Event Grid's built-in schema fields (id, subject, eventType, etc.) are controlled by the event source. To correlate events back to your application requests, include your correlation ID in the event's data payload (the custom data object). When filtering events, use advanced filters on the data.correlationId field.",difficulty:"Hard"},
{q:"An Event Hubs consumer reads from partition 0. The consumer crashes and restarts. How does it resume reading from where it left off?",options:["Event Hubs automatically tracks the last-read offset and resumes automatically","The consumer must checkpoint the offset to Azure Blob Storage (using EventProcessorClient) — on restart, it reads the checkpoint and resumes from the saved offset","Event Hubs delivers all unread events after the consumer reconnects without any checkpoint needed","The consumer must re-read all events from the beginning of the retention window"],answer:1,explanation:"The EventProcessorClient (or old EventProcessorHost) checkpoints the last processed offset to Azure Blob Storage. On restart, the processor reads the checkpoint and resumes from the saved offset rather than the beginning. Without checkpointing, the consumer restarts from the beginning or the earliest available event.",difficulty:"Hard"},
{q:"A Service Bus topic subscription has a SQL filter: sys.label = 'order' AND amount > 100. A message with label='order' and amount=50 is published. What happens?",options:["The message is delivered to the subscription with a low-priority flag","The message is not delivered to this subscription because it does not match the filter; it may be delivered to other subscriptions with matching filters","The message is delivered to the subscription's dead letter queue","The message is delivered as a filtered copy without the amount property"],answer:1,explanation:"Service Bus subscription filters determine which messages are routed to that subscription. A message that doesn't match the subscription's filter rule is simply not delivered to that subscription. It may still be delivered to other subscriptions on the same topic if their filters match. Unmatched messages are not dead-lettered — they are just not routed to non-matching subscriptions.",difficulty:"Medium"},
{q:"You configure Event Grid to deliver events to Azure Event Hubs as an endpoint. What is the primary use case for this topology?",options:["Use Event Grid's rich filtering and Event Hubs' high-throughput streaming together — events are filtered by Event Grid and then streamed to Event Hubs for high-volume analytics consumers","Route events to a dead letter queue when the primary endpoint is unavailable","Use Event Hubs as a backup endpoint when the primary webhook fails","Reduce costs by avoiding Azure Functions webhook overhead"],answer:0,explanation:"Connecting Event Grid to Event Hubs creates an event pipeline: Event Grid provides filtering, fan-out, and source abstraction; Event Hubs provides high-throughput ingestion, multiple consumer groups, and event replay. Downstream systems like Stream Analytics or Azure Data Explorer consume from Event Hubs.",difficulty:"Hard"},
